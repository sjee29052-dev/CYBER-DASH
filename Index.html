// ── Particles & Floats ─────────────────────────────────
function burst(x,y,color,n=12){
  if(!S.settings.particles)return;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=R(1.2,4.8);
    PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:R(.01,.03),color,size:R(1.5,4)});
  }
}
function spawnFloat(x,y,color,text){
  FLOATS.push({x,y,vy:-1.8,life:1,decay:.02,color,text});
}

    case 'saw':   drawSaw(o,col,glo,t);   break;

      if(bl>.05){ X.fillStyle=`rgba(255,255,160,${b.winAlpha*bl})`; X.fillRect(b.x+w.rx,by+w.ry,5,4); }
    });
    if(b.hasSign&&b.h>120){ X.shadowColor=b.neon||z.gnd; X.shadowBlur=8+4*Math.sin(gFrame*.04); X.strokeStyle=b.neon||z.gnd; X.lineWidth=2; X.strokeRect(b.x+(b.w-b.signW)/2,by-6,b.signW,4); X.shadowBlur=0; }
    if(b.h>160){ X.strokeStyle='rgba(255,255,255,.2)'; X.lineWidth=1; X.beginPath(); X.moveTo(b.x+b.w/2,by); X.lineTo(b.x+b.w/2,by-12); X.stroke(); X.fillStyle='rgba(255,0,0,.6)'; X.beginPath(); X.arc(b.x+b.w/2,by-12,2,0,Math.PI*2); X.fill(); }
  })});
  // ground
  const gg=X.createLinearGradient(0,GND,0,H);
  gg.addColorStop(0,z.gnd+'20'); gg.addColorStop(.4,z.gnd+'08'); gg.addColorStop(1,'rgba(0,0,10,1)');
  X.fillStyle=gg; X.fillRect(0,GND,W,H-GND);
  X.shadowColor=z.gnd; X.shadowBlur=22; X.strokeStyle=z.gnd; X.lineWidth=3; X.beginPath(); X.moveTo(0,GND); X.lineTo(W,GND); X.stroke(); X.shadowBlur=0;
}

// ── Game loop (spawn, update, collide) ───────────────────
function spawnObstacle(){
  const z=ZONES[Math.min(gZone,ZONES.length-1)];
  const types=['spike','saw','wall','laser','crystal','gate','mine','barrier'];
  const type=types[RI(0,types.length)], col=z.obs[RI(0,2)];
  let w=60,h=50,y=GND-50;
  switch(type){ case'spike':w=60;h=50;y=GND-50;break; case'saw':w=40;h=40;y=GND-50;break; case'laser':w=120;h=20;y=GND-40;break; case'wall':w=30;h=90;y=GND-90;break; case'crystal':w=50;h=70;y=GND-70;break; case'gate':w=80;h=90;y=GND-90;break; case'mine':w=36;h=36;y=GND-36;break; case'barrier':w=60;h=80;y=GND-80;break; }
  GOBS.push({x:W+10,y,w,h,type,color:col,glow:col,r:type==='saw'?Math.min(w,h)/2:undefined,spin:R(-1,1)});
}
function spawnCoin(){ COINS.push({x:W+10,y:GND-R(40,160),r:10,rot:0,life:1}); }
function spawnPU(){
  const names=Object.keys(PUS).filter(k=>!PUS[k].on);
  if(!names.length)return;
  const name=names[RI(0,names.length-1)];
  GPUS.push({x:W+10,y:GND-R(60,180),name,r:14});
}

function update(){
  if(gState!=='playing')return;
  const s=sk();
  gSpeed=ZONES[Math.min(gZone,ZONES.length-1)].spd;
  if(hasBon('slowramp')) gSpeed*=.85;
  // player physics
  P.vy+=0.8; P.y+=P.vy;
  if(P.y>=GND){ P.y=GND; P.jumping=false; P.jumpCount=0; if(P.sliding) P.slideT--; }
  if(P.sliding){ P.slideT--; if(P.slideT<=0)P.sliding=false; }
  // trail
  if(S.settings.trails&&gFrame%3===0){ P.trail.push({x:P.x+P.w/2,y:P.y+P.h/2,life:1}); if(P.trail.length>15)P.trail.shift(); }
  P.trail.forEach(t=>t.life-=0.04);
  // spawning
  gSpawnT++; const sr=Math.max(8,55-gSpeed*2);
  if(gSpawnT>sr){gSpawnT=0; spawnObstacle();}
  gCoinT++; if(gCoinT>40){gCoinT=0; if(Math.random()<0.65)spawnCoin();}
  gPuT++; if(gPuT>180){gPuT=0; if(Math.random()<0.35)spawnPU();}
  // move objects
  const mx=speed=>obj=>obj.x-=speed;
  GOBS.forEach(o=>{o.x-=gSpeed; if(o.type==='saw')o.r=o.r||24; if(o.type==='mine')o.x-=gSpeed*.8;});
  COINS.forEach(c=>{c.x-=gSpeed; c.rot+=0.08;});
  GPUS.forEach(p=>p.x-=gSpeed);
  // collisions
  const px=P.x+8,py=P.y+8,pw=P.w-16,ph=P.h-16;
  GOBS.forEach(o=>{
    if(o.type==='saw'){ const cx=o.x,cy=o.y,r=o.r||24; if(hit(px,py,pw,ph,cx-r,cy-r,r*2,r*2)) die(); }
    else if(hit(px,py,pw,ph,o.x,o.y,o.w,o.h)) die();
  });
  COINS.forEach((c,i)=>{ if(hit(px,py,pw,ph,c.x-c.r,c.y-c.r,c.r*2,c.r*2)){ COINS.splice(i,1); const v=hasBon('x2coin')||hasBon('mega')||hasBon('crystal')?2:1; gCoins+=v; gRunCoins+=v; gScore+=10*v; burst(c.x,c.y,'#ffd700',8); } });
  GPUS.forEach((p,i)=>{ if(hit(px,py,pw,ph,p.x-p.r,p.y-p.r,p.r*2,p.r*2)){ PUS[p.name].on=true; PUS[p.name].t=PUS[p.name].max; document.getElementById('pu'+PUS[p.name].i).classList.add('on'); GPUS.splice(i,1); burst(p.x,p.y,PU_COL[p.name],10); spawnFloat(p.x,p.y,PU_COL[p.name],PU_EM[p.name]); } });
  // power‑up timers
  Object.values(PUS).forEach(pu=>{ if(pu.on){ pu.t--; if(pu.t<=0){ pu.on=false; document.getElementById('pu'+pu.i).classList.remove('on'); } } });
  // combo
  gComboT--; if(gComboT<=0)gCombo=1;
  gScore+=gSpeed*0.1; gDist+=gSpeed*0.2;
  gPrevZ=gZone; gZone=Math.min(Math.floor(gDist/1800),ZONES.length-1);
  if(gZone>gPrevZ){ gRunZ++; spawnFloat(P.x,P.y,'#fff','ZONE '+ZONES[gZone].name); }
  // cleanup
  GOBS=GOBS.filter(o=>o.x>-300); COINS=COINS.filter(c=>c.x>-50); GPUS=GPUS.filter(p=>p.x>-50);
  FLOATS=FLOATS.filter(f=>{f.y+=f.vy;f.life-=f.decay;return f.life>0;});
  PARTS=PARTS.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;return p.life>0;});
}

function die(){
  if(gState!=='playing')return;
  if(PUS.shield.on){ PUS.shield.on=false; document.getElementById('pu0').classList.remove('on'); return; }
  gState='dead';
  burst(P.x+P.w/2,P.y+P.h/2,'#ff2d78',30);
  endGame();
}

// ── Game flow ────────────────────────────────────────────
function startGameMode(mode){
  gState='playing'; gFrame=0;
  gScore=0; gCoins=0; gDist=0; gSpeed=ZONES[0].spd;
  gCombo=1; gMaxCombo=1; gComboT=0;
  gJumps=0; gRunCoins=0; gRunPU=0; gRunZ=0;
  gZone=0; gBossOn=false; gBossHP=0;
  gReviveUsed=false;
  GOBS=[]; COINS=[]; GPUS=[]; PARTS=[]; FLOATS=[];
  P.y=GND; P.vy=0; P.jumping=false; P.sliding=false; P.slideT=0;
  document.getElementById('hud').style.display='block';
  showScr(null);
  updateHUD();
}
function endGame(){
  document.getElementById('hud').style.display='none';
  S.totalRuns++; S.totalDist+=Math.floor(gDist); S.totalCoins+=gRunCoins;
  if(gScore>S.best) S.best=Math.floor(gScore);
  if(gMaxCombo>S.bestCombo) S.bestCombo=gMaxCombo;
  S.coins+=gRunCoins;
  // add to run log
  S.runLog.unshift({score:Math.floor(gScore),kills:0,coins:gRunCoins,dist:Math.floor(gDist),mode:'endless'});
  if(S.runLog.length>20) S.runLog.length=20;
  sv();
  document.getElementById('go-sc').textContent=Math.floor(gScore);
  document.getElementById('go-bs').textContent='BEST: '+S.best.toLocaleString();
  document.getElementById('go-new').style.display=gScore>S.best?'block':'none';
  document.getElementById('rv-cost').textContent=30;
  showScr('s-over');
}

function drawMenuBG(){
  const grd=BX.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#010612');grd.addColorStop(.55,'#040b1a');grd.addColorStop(1,'#070f24');
  BX.fillStyle=grd;BX.fillRect(0,0,W,H);
  BX.strokeStyle='rgba(0,245,255,0.035)';BX.lineWidth=1;
  const go=(bgF*.28)%44;
  for(let x=go;x<W;x+=44){BX.beginPath();BX.moveTo(x,0);BX.lineTo(x,H);BX.stroke();}
  for(let y=go;y<H;y+=44){BX.beginPath();BX.moveTo(0,y);BX.lineTo(W,y);BX.stroke();}
  [[W*.3,H*.3,160,'#00f5ff'],[W*.7,H*.55,130,'#ff2d78'],[W*.5,H*.7,110,'#b44fff']].forEach(([cx,cy,cr,col],bi)=>{
    const ox=Math.sin(bgF*.005+bi*1.2)*25,oy=Math.cos(bgF*.005+bi*1.4)*18;
    const g=BX.createRadialGradient(cx+ox,cy+oy,0,cx,cy,cr);
    g.addColorStop(0,col+'09');g.addColorStop(1,'transparent');
    BX.fillStyle=g;BX.fillRect(0,0,W,H);
  });
  bgPts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;});
  for(let i=0;i<bgPts.length;i++){
    const p=bgPts[i]; BX.globalAlpha=.1+.3*Math.sin(bgF*.02+p.a);
    BX.fillStyle='#00f5ff';BX.beginPath();BX.arc(p.x,p.y,p.r,0,Math.PI*2);BX.fill();
    for(let j=i+1;j<bgPts.length;j++){
      const q=bgPts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<75){BX.strokeStyle=`rgba(0,245,255,${.04*(1-d/75)})`;BX.lineWidth=.8;BX.beginPath();BX.moveTo(p.x,p.y);BX.lineTo(q.x,q.y);BX.stroke();}
    }
  }
  BX.globalAlpha=1;
  bgF++;
}

// ── Main loop ────────────────────────────────────────────
function draw(){
  X.clearRect(0,0,W,H);
  if(gState==='playing'||gState==='dead'){
    drawGameBackground();
    GOBS.forEach(drawObstacle);
    COINS.forEach(c=>{ X.save(); X.translate(c.x,c.y); X.rotate(c.rot); X.fillStyle='#ffd700'; X.shadowColor='#ffd700'; X.shadowBlur=10; X.beginPath(); X.ellipse(0,0,c.r,c.r*.4,0,0,Math.PI*2); X.fill(); X.fillStyle='#ffffff66'; X.beginPath(); X.ellipse(0,0,c.r*.6,c.r*.25,0,0,Math.PI*2); X.fill(); X.shadowBlur=0; X.restore(); });
    GPUS.forEach(p=>{ X.fillStyle=PU_COL[p.name]; X.shadowColor=PU_COL[p.name]; X.shadowBlur=14; X.beginPath(); X.arc(p.x,p.y,p.r,0,Math.PI*2); X.fill(); X.shadowBlur=0; X.fillStyle='#fff'; X.font='12px Bebas Neue'; X.textAlign='center'; X.fillText(PU_EM[p.name],p.x,p.y+4); X.textAlign='left'; });
    FLOATS.forEach(f=>{ X.globalAlpha=f.life*.8; X.fillStyle=f.color; X.font='bold 12px Bebas Neue'; X.textAlign='center'; X.fillText(f.text,f.x,f.y); X.textAlign='left'; X.globalAlpha=1; });
    PARTS.forEach(p=>{ X.globalAlpha=p.life*.7; X.fillStyle=p.color; X.beginPath(); X.arc(p.x,p.y,p.size,0,Math.PI*2); X.fill(); X.globalAlpha=1; });
    drawCharacter();
    if(gState==='dead'){ X.fillStyle='rgba(255,0,0,.2)'; X.fillRect(0,0,W,H); }
  }
  updateHUD();
}

function gameLoop(){
  if(gState==='playing') update();
  draw();
  if(gState==='playing') gFrame++;
  requestAnimationFrame(gameLoop);
}

// ── Init ─────────────────────────────────────────────────
initBGPts();
initCityLayers();
updateHome();
showScr('s-home');
checkDaily();
gameLoop();
</script>
