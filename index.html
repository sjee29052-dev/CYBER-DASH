<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#010610">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SHADOW DASH ULTRA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
html,body{touch-action:manipulation;width:100%;height:100%;overflow:hidden;background:#000;margin:0;padding:0;box-sizing:border-box;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--n:#00f5ff;--a:#ff2d78;--g:#ffd700;--p:#b44fff;--gr:#00ff88;--o:#ff8c00;--gl:rgba(255,255,255,.04);--gln:rgba(255,255,255,.08);}
body{display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;user-select:none;}
#app{position:relative;width:480px;height:820px;overflow:hidden;border:1px solid rgba(0,245,255,.3);box-shadow:0 0 120px rgba(0,245,255,.18),0 0 280px rgba(0,0,80,.9),inset 0 0 120px rgba(0,0,0,.95);transform-origin:top center;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#gc{z-index:2;}
#bg{z-index:1;}
#app::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:90;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.028) 3px,rgba(0,0,0,.028) 6px);}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;z-index:10;transition:opacity .32s,transform .32s;background:transparent;}
.scr.hide{display:none!important;}
.si{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;height:100%;overflow-y:auto;padding:22px 18px 80px;scrollbar-width:thin;scrollbar-color:rgba(0,245,255,.3) transparent;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
.si::-webkit-scrollbar{width:3px;}
.si::-webkit-scrollbar-thumb{background:rgba(0,245,255,.3);border-radius:2px;}
.logo{font-family:'Bebas Neue',cursive;font-size:80px;line-height:.88;letter-spacing:6px;text-align:center;background:linear-gradient(155deg,#fff 0%,#00f5ff 45%,#ff2d78 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,245,255,.45));}
.logo-tag{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:7px;color:rgba(0,245,255,.4);margin:3px 0 2px;}
.logo-ver{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:5px;color:var(--g);text-shadow:0 0 18px var(--g);}
.bp{background:transparent;border:2px solid var(--n);color:var(--n);font-size:22px;padding:15px 62px;overflow:hidden;font-family:'Bebas Neue',cursive;letter-spacing:4px;cursor:pointer;border:none;outline:none;position:relative;transition:all .18s;}
.bp::before{content:'';position:absolute;inset:0;background:var(--n);transform:translateX(-105%);transition:transform .2s;}
.bp:hover::before,.bp:active::before{transform:none;}
.bp:hover,.bp:active{color:#000;}
.bp.gold{border-color:var(--g);color:var(--g);}
.bp.gold::before{background:var(--g);}
.bp.red{border-color:var(--a);color:var(--a);}
.bp.red::before{background:var(--a);}
.bp.sm{font-size:14px;padding:9px 26px;}
.bp.xs{font-size:11px;padding:6px 16px;}
#hud{position:absolute;inset:0;pointer-events:none;z-index:15;display:none;}
#hs-wrap{position:absolute;top:11px;left:14px;}
#hb-wrap{position:absolute;top:11px;right:14px;text-align:right;}
.hv{font-family:'Bebas Neue',cursive;font-size:38px;color:#fff;text-shadow:0 0 18px var(--n);line-height:1;}
.hl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;}
#hb-wrap .hv{font-size:21px;color:var(--g);text-shadow:0 0 11px var(--g);}
#combo-hud{position:absolute;top:66px;right:13px;font-family:'Bebas Neue',cursive;font-size:20px;color:var(--a);text-shadow:0 0 13px var(--a);transition:opacity .25s;opacity:0;}
.gowrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:28px 18px;text-align:center;}
.gotag{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:var(--a);margin-bottom:5px;}
.goscore{font-family:'Bebas Neue',cursive;font-size:92px;color:#fff;line-height:1;text-shadow:0 0 55px rgba(255,45,120,.5);}
.gobest{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--g);letter-spacing:3px;}
.gonew{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:5px;color:var(--gr);animation:gp 1s infinite;}
@keyframes gp{0%,100%{opacity:1}50%{opacity:.4}}
.godiv{width:230px;height:1px;margin:16px 0;background:linear-gradient(90deg,transparent,rgba(0,245,255,.28),transparent);}
.gostats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;margin-bottom:16px;}
.gostat{background:var(--gl);border:1px solid var(--gln);border-radius:7px;padding:9px 5px;text-align:center;}
.gosv{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--n);}
.gosl{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.28);}
#toast{position:absolute;top:88px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:3px;color:#000;background:var(--g);padding:9px 24px;border-radius:4px;z-index:200;opacity:0;transition:opacity .28s;pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <canvas id="bg"></canvas>
  <canvas id="gc"></canvas>
  <div id="hud">
    <div id="hs-wrap">
      <div class="hv" id="score-display">0</div>
      <div class="hl">SCORE</div>
    </div>
    <div id="hb-wrap">
      <div class="hv" id="coins-display">0</div>
      <div class="hl">COINS</div>
    </div>
    <div id="combo-hud" style="display:none;">x<span id="combo-display">0</span></div>
  </div>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="scr">
    <div class="si">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;width:100%;margin-top:40px;">
        <div class="logo">CYBER</div>
        <div class="logo" style="font-size:60px;margin-top:-10px;">DASH</div>
        <div class="logo-tag">V 6.0 ULTRA</div>
        <div class="logo-ver">━━━━━━</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;margin-bottom:40px;">
        <button class="bp gold" onclick="startGame()">PLAY NOW</button>
        <button class="bp red" onclick="showScreen('screen-leaderboard')">LEADERBOARD</button>
        <button class="bp" onclick="showScreen('screen-settings')">SETTINGS</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="scr hide"></div>

  <!-- GAME OVER SCREEN -->
  <div id="screen-gameover" class="scr hide">
    <div class="si">
      <div class="gowrap">
        <div class="gotag">GAME OVER</div>
        <div class="goscore" id="final-score">0</div>
        <div class="gobest" id="best-text" style="display:none;">NEW BEST!</div>
        <div class="gobest" id="best-score">Best: 0</div>
        <div class="godiv"></div>
        <div class="gostats">
          <div class="gostat">
            <div class="gosv" id="go-coins">0</div>
            <div class="gosl">COINS</div>
          </div>
          <div class="gostat">
            <div class="gosv" id="go-time">0s</div>
            <div class="gosl">TIME</div>
          </div>
          <div class="gostat">
            <div class="gosv" id="go-enemies">0</div>
            <div class="gosl">DEFEATED</div>
          </div>
          <div class="gostat">
            <div class="gosv" id="go-combo">0</div>
            <div class="gosl">COMBO</div>
          </div>
        </div>
        <div style="width:100%;max-width:280px;gap:8px;display:flex;flex-direction:column;margin-top:20px;">
          <button class="bp gold" onclick="startGame()">PLAY AGAIN</button>
          <button class="bp" onclick="showScreen('screen-home')">MENU</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="screen-leaderboard" class="scr hide">
    <div class="si">
      <div style="font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:5px;color:var(--g);text-shadow:0 0 24px var(--g);margin-bottom:20px;margin-top:20px;">LEADERBOARD</div>
      <div id="leaderboard-list" style="width:100%;max-width:400px;"></div>
      <button class="bp gold" onclick="showScreen('screen-home')" style="margin-top:20px;">BACK</button>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="screen-settings" class="scr hide">
    <div class="si">
      <div style="font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:5px;color:var(--g);text-shadow:0 0 24px var(--g);margin-bottom:20px;margin-top:20px;">SETTINGS</div>
      <div style="width:100%;max-width:400px;gap:12px;display:flex;flex-direction:column;">
        <div style="background:var(--gl);border:1px solid var(--gln);padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
          <span style="color:#fff;font-size:13px;">SOUND</span>
          <input type="checkbox" id="sound-toggle" checked style="width:20px;height:20px;cursor:pointer;">
        </div>
        <div style="background:var(--gl);border:1px solid var(--gln);padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;">
          <span style="color:#fff;font-size:13px;">VIBRATION</span>
          <input type="checkbox" id="vibration-toggle" checked style="width:20px;height:20px;cursor:pointer;">
        </div>
        <button class="bp" onclick="localStorage.clear();alert('Data cleared!');" style="margin-top:10px;">CLEAR DATA</button>
      </div>
      <button class="bp gold" onclick="showScreen('screen-home')" style="margin-top:40px;">BACK</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CYBER DASH - GAME ENGINE
// ═══════════════════════════════════════════════════════════════

const APP_WIDTH = 480;
const APP_HEIGHT = 820;

let gameState = {
  isRunning: false,
  score: 0,
  coins: 0,
  combo: 0,
  time: 0,
  enemiesDefeated: 0,
  playerX: APP_WIDTH / 2,
  playerY: APP_HEIGHT - 100,
  playerSize: 25,
  enemies: [],
  particles: [],
  bestScore: parseInt(localStorage.getItem('bestScore')) || 0
};

const canvas = document.getElementById('gc');
const bgCanvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const bgCtx = bgCanvas.getContext('2d');

canvas.width = APP_WIDTH;
canvas.height = APP_HEIGHT;
bgCanvas.width = APP_WIDTH;
bgCanvas.height = APP_HEIGHT;

let mouseX = APP_WIDTH / 2;
let mouseY = APP_HEIGHT - 100;

// ───────────────────────────────────────────────────────────────
// EVENT LISTENERS
// ───────────────────────────────────────────────────────────────

document.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(gameState.playerSize, Math.min(APP_WIDTH - gameState.playerSize, e.clientX - rect.left));
  mouseY = Math.max(gameState.playerSize, Math.min(APP_HEIGHT - gameState.playerSize, e.clientY - rect.top));
});

document.addEventListener('touchmove', (e) => {
  if (!gameState.isRunning) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  mouseX = Math.max(gameState.playerSize, Math.min(APP_WIDTH - gameState.playerSize, touch.clientX - rect.left));
  mouseY = Math.max(gameState.playerSize, Math.min(APP_HEIGHT - gameState.playerSize, touch.clientY - rect.top));
}, { passive: false });

// ───────────────────────────────────────────────────────────────
// SCREEN MANAGEMENT
// ───────────────────────────────────────────────────────────────

function showScreen(screenId) {
  document.querySelectorAll('.scr').forEach(s => s.classList.add('hide'));
  document.getElementById(screenId).classList.remove('hide');
  
  if (screenId === 'screen-leaderboard') {
    updateLeaderboard();
  }
}

function startGame() {
  gameState = {
    isRunning: true,
    score: 0,
    coins: 0,
    combo: 0,
    time: 0,
    enemiesDefeated: 0,
    playerX: APP_WIDTH / 2,
    playerY: APP_HEIGHT - 100,
    playerSize: 25,
    enemies: [],
    particles: [],
    bestScore: gameState.bestScore
  };
  
  showScreen('screen-game');
  document.getElementById('hud').style.display = 'block';
  gameLoop();
}

function endGame() {
  gameState.isRunning = false;
  document.getElementById('hud').style.display = 'none';
  
  if (gameState.score > gameState.bestScore) {
    gameState.bestScore = gameState.score;
    localStorage.setItem('bestScore', gameState.bestScore);
    document.getElementById('best-text').style.display = 'block';
  } else {
    document.getElementById('best-text').style.display = 'none';
  }
  
  document.getElementById('final-score').textContent = gameState.score;
  document.getElementById('best-score').textContent = `Best: ${gameState.bestScore}`;
  document.getElementById('go-coins').textContent = gameState.coins;
  document.getElementById('go-time').textContent = `${Math.floor(gameState.time / 1000)}s`;
  document.getElementById('go-enemies').textContent = gameState.enemiesDefeated;
  document.getElementById('go-combo').textContent = gameState.combo;
  
  showScreen('screen-gameover');
  gameState.enemies = [];
  gameState.particles = [];
}

// ───────────────────────────────────────────────────────────────
// GAME OBJECTS
// ───────────────────────────────────────────────────────────────

class Enemy {
  constructor() {
    this.x = Math.random() * (APP_WIDTH - 30) + 15;
    this.y = -30;
    this.size = 20;
    this.speed = 2 + Math.random() * 3;
    this.health = 1;
  }
  
  update() {
    this.y += this.speed;
  }
  
  draw(ctx) {
    ctx.fillStyle = '#ff2d78';
    ctx.shadowColor = 'rgba(255,45,120,0.6)';
    ctx.shadowBlur = 12;
    ctx.fillRect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
    ctx.shadowColor = 'transparent';
  }
  
  isOffScreen() {
    return this.y > APP_HEIGHT + 30;
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8 - 2;
    this.life = 30;
    this.maxLife = 30;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2;
    this.life--;
  }
  
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
    ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
  }
}

// ───────────────────────────────────────────────────────────────
// GAME LOOP
// ───────────────────────────────────────────────────────────────

let lastSpawn = 0;
let lastComboReset = 0;

function gameLoop() {
  if (!gameState.isRunning) return;
  
  // Update time
  gameState.time += 16;
  
  // Spawn enemies
  if (Date.now() - lastSpawn > 1000) {
    gameState.enemies.push(new Enemy());
    lastSpawn = Date.now();
  }
  
  // Update enemies
  gameState.enemies = gameState.enemies.filter(enemy => {
    enemy.update();
    return !enemy.isOffScreen();
  });
  
  // Player movement
  gameState.playerX += (mouseX - gameState.playerX) * 0.15;
  gameState.playerY += (mouseY - gameState.playerY) * 0.15;
  
  // Collision detection
  for (let i = gameState.enemies.length - 1; i >= 0; i--) {
    const enemy = gameState.enemies[i];
    const dx = gameState.playerX - enemy.x;
    const dy = gameState.playerY - enemy.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < gameState.playerSize + enemy.size) {
      // Hit!
      gameState.score += 100;
      gameState.coins += 1;
      gameState.combo++;
      gameState.enemiesDefeated++;
      lastComboReset = Date.now();
      
      // Particles
      for (let p = 0; p < 10; p++) {
        gameState.particles.push(new Particle(enemy.x, enemy.y));
      }
      
      gameState.enemies.splice(i, 1);
    }
  }
  
  // Combo reset
  if (Date.now() - lastComboReset > 3000) {
    gameState.combo = 0;
  }
  
  // Update particles
  gameState.particles = gameState.particles.filter(p => {
    p.update();
    return p.life > 0;
  });
  
  // Game over condition
  if (gameState.enemies.some(e => e.y > APP_HEIGHT)) {
    endGame();
    return;
  }
  
  // Update HUD
  document.getElementById('score-display').textContent = gameState.score;
  document.getElementById('coins-display').textContent = gameState.coins;
  
  if (gameState.combo > 0) {
    document.getElementById('combo-display').textContent = gameState.combo;
    document.getElementById('combo-hud').style.opacity = '1';
  } else {
    document.getElementById('combo-hud').style.opacity = '0';
  }
  
  // Draw
  draw();
  requestAnimationFrame(gameLoop);
}

function draw() {
  // Clear canvas
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, APP_WIDTH, APP_HEIGHT);
  
  // Draw enemies
  gameState.enemies.forEach(e => e.draw(ctx));
  
  // Draw particles
  gameState.particles.forEach(p => p.draw(ctx));
  
  // Draw player
  ctx.fillStyle = '#00f5ff';
  ctx.shadowColor = 'rgba(0,245,255,0.8)';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw player inner circle
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(gameState.playerX, gameState.playerY, gameState.playerSize / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
}

function updateLeaderboard() {
  const bestScore = localStorage.getItem('bestScore') || '0';
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = `
    <div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);padding:15px;border-radius:8px;text-align:center;margin-bottom:10px;">
      <div style="font-family:'Bebas Neue',cursive;font-size:30px;color:var(--g);">${bestScore}</div>
      <div style="font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;">YOUR BEST SCORE</div>
    </div>
  `;
}

// Initialize
showScreen('screen-home');
updateLeaderboard();
</script>
</body>
</html>
