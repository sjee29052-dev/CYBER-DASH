<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID RUNNER: Abyss Protocol - Ultimate Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { overflow: hidden; background: #050510; font-family: monospace; color: #0ff; width: 100vw; height: 100vh; position: fixed; }
        #gameContainer { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #050510; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ui-layer > * { pointer-events: auto; }
        #mainMenu { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050510; z-index: 100; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .menu-title { font-size: 2rem; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 0.5rem; }
        .menu-subtitle { color: #888; margin-bottom: 1.5rem; font-size: 0.8rem; }
        .menu-btn { background: rgba(0,255,255,0.2); border: 2px solid #0ff; color: #0ff; padding: 10px 20px; margin: 5px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; }
        .menu-btn.premium { border-color: gold; color: gold; }
        #hud { display: none; padding: 10px; position: absolute; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); font-size: 0.8rem; z-index: 15; }
        .hud-bar { display: inline-block; margin: 0 10px; }
        .health-bar, .energy-bar { display: inline-block; width: 100px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-left: 5px; }
        .health-fill { height: 100%; width: 100%; background: #f00; }
        .energy-fill { height: 100%; width: 100%; background: #0ff; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; overflow-y: auto; }
        .overlay.active { display: flex; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 600px; max-height: 60vh; overflow-y: auto; }
        .grid-item { background: rgba(0,255,255,0.1); border: 1px solid #0ff; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; }
        #notificationArea { position: absolute; top: 80px; right: 10px; z-index: 60; }
        .notification { background: black; border-left: 4px solid #0ff; padding: 5px 10px; margin: 5px; animation: fadeOut 3s forwards; font-size: 0.8rem; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; display: none; } }
        #comboDisplay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: #0ff; text-shadow: 0 0 20px #0ff; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 45; }
        #comboDisplay.show { opacity: 1; }
        .floating-text { position: absolute; font-size: 1rem; color: gold; pointer-events: none; animation: floatUp 1s forwards; z-index: 55; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
        .damage-number { position: absolute; font-size: 0.9rem; color: #f00; pointer-events: none; animation: damageFloat 1s forwards; z-index: 55; }
        @keyframes damageFloat { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050510; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .loading-bar { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loading-fill { height: 100%; width: 0%; background: #0ff; animation: loading 1.5s ease-in-out infinite; }
        @keyframes loading { 0% { width: 0%; } 50% { width: 100%; } 100% { width: 0%; } }
        @media (max-width: 600px) { .menu-title { font-size: 1.5rem; } .menu-btn { padding: 8px 16px; font-size: 0.7rem; } .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="loadingScreen"><div class="menu-title">VOID RUNNER</div><div>INITIALIZING SYSTEMS...</div><div class="loading-bar"><div class="loading-fill"></div></div></div>
    
    <div id="mainMenu" class="ui-layer">
        <div class="menu-title">VOID RUNNER</div>
        <div class="menu-subtitle">ABYSS PROTOCOL v3.0.1</div>
        <button class="menu-btn" onclick="window.game.startStory()">▶ STORY MODE</button>
        <button class="menu-btn" onclick="window.game.startEndless()">∞ ENDLESS MODE</button>
        <button class="menu-btn" onclick="window.game.openArmory()">⚔ ARMORY</button>
        <button class="menu-btn" onclick="window.game.openSkillTree()">✦ SKILL TREE</button>
        <button class="menu-btn" onclick="window.game.openCrafting()">⚒ CRAFTING</button>
        <button class="menu-btn" onclick="window.game.openQuests()">📜 QUESTS</button>
        <button class="menu-btn" onclick="window.game.openAchievements()">🏆 ACHIEVEMENTS</button>
        <button class="menu-btn" onclick="window.game.openLeaderboard()">📊 LEADERBOARD</button>
        <button class="menu-btn" onclick="window.game.openGuild()">⚜ GUILD</button>
        <button class="menu-btn" onclick="window.game.openTournament()">🏁 TOURNAMENT</button>
        <button class="menu-btn" onclick="window.game.openBattlePass()">🎫 BATTLE PASS</button>
        <button class="menu-btn" onclick="window.game.openDaily()">🎁 DAILY REWARDS</button>
        <button class="menu-btn" onclick="window.game.openSettings()">⚙ SETTINGS</button>
        <button class="menu-btn premium" onclick="window.game.showPremium()">👑 PREMIUM</button>
        <button class="menu-btn" onclick="window.game.openIAPShop()">💎 SHOP</button>
        <button class="menu-btn" onclick="window.game.showAdRewardMenu()">📺 FREE REWARDS</button>
    </div>
    
    <div id="hud" class="ui-layer">
        <span class="hud-bar">❤️ <span id="healthVal">100</span></span>
        <span class="hud-bar">⚡ <span id="energyVal">100</span></span>
        <span class="hud-bar">💰 <span id="coinVal">0</span></span>
        <span class="hud-bar">💎 <span id="gemVal">0</span></span>
        <span class="hud-bar">🎯 <span id="scoreVal">0</span></span>
        <span class="hud-bar">🌊 <span id="waveVal">0</span></span>
        <span class="hud-bar">📊 <span id="levelVal">1</span></span>
    </div>
    
    <div id="pauseMenu" class="overlay"><div class="menu-title">PAUSED</div><button class="menu-btn" onclick="window.game.resume()">RESUME</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="gameOver" class="overlay"><div class="menu-title">GAME OVER</div><div id="finalScore">Score: 0</div><button class="menu-btn" onclick="window.game.restart()">TRY AGAIN</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="levelComplete" class="overlay"><div class="menu-title">LEVEL COMPLETE</div><div id="levelRewards"></div><button class="menu-btn" onclick="window.game.nextLevel()">NEXT</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="armory" class="overlay"><div class="menu-title">ARMORY</div><div class="grid-container" id="armoryGrid"></div><button class="menu-btn" onclick="window.game.closeArmory()">CLOSE</button></div>
    <div id="skillTree" class="overlay"><div class="menu-title">SKILL TREE</div><div>Points: <span id="skillPoints">0</span></div><canvas id="skillCanvas" width="600" height="400" style="border:1px solid #0ff; max-width:90%;"></canvas><div id="skillDesc" style="color:#888; margin:10px;"></div><button class="menu-btn" onclick="window.game.closeSkillTree()">CLOSE</button></div>
    <div id="crafting" class="overlay"><div class="menu-title">CRAFTING</div><div>Materials: <span id="materialDisplay"></span></div><div class="grid-container" id="craftingGrid"></div><button class="menu-btn" onclick="window.game.closeCrafting()">CLOSE</button></div>
    <div id="notificationArea"></div>
    <div id="comboDisplay"></div>
</div>

<script>
// ==================== COMPLETE WORKING GAME ====================
class VoidRunnerUltimate {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        // Game State
        this.state = 'menu';
        this.mode = 'story';
        this.currentLevel = 1;
        this.score = 0;
        this.coins = 100;
        this.gems = 10;
        this.wave = 1;
        
        // Player
        this.player = {
            x: 100, y: 300, width: 32, height: 42,
            vx: 0, vy: 0, speed: 5, jumpPower: 12,
            health: 100, maxHealth: 100,
            energy: 100, maxEnergy: 100,
            weapon: 'blaster',
            weapons: ['blaster', 'plasma_rifle', 'shotgun', 'minigun', 'sniper'],
            facing: 1, onGround: false,
            invincible: 0,
            level: 1, xp: 0, xpToNext: 100
        };
        
        // World
        this.platforms = [];
        this.enemies = [];
        this.projectiles = [];
        this.particles = [];
        this.collectibles = [];
        this.camera = { x: 0, y: 0 };
        this.keys = {};
        this.mouse = { x: 0, y: 0, down: false };
        this.touch = { active: false, x: 0, y: 0 };
        
        // Skill points
        this.skillPoints = 0;
        this.skills = {};
        this.materials = { scrap: 0, crystal: 0, essence: 0, core: 0 };
        
        // Weapons Database
        this.weaponDefs = {
            blaster: { name: 'Blaster', damage: 25, fireRate: 8, projectileSpeed: 10, auto: true, rarity: 'common' },
            blaster_mk2: { name: 'Blaster MK-II', damage: 35, fireRate: 10, projectileSpeed: 14, auto: true, rarity: 'uncommon' },
            plasma_rifle: { name: 'Plasma Rifle', damage: 40, fireRate: 12, projectileSpeed: 12, auto: true, rarity: 'rare' },
            shotgun: { name: 'Void Shotgun', damage: 15, fireRate: 4, projectileSpeed: 8, pellets: 6, auto: false, rarity: 'epic' },
            sniper: { name: 'Abyss Sniper', damage: 100, fireRate: 1, projectileSpeed: 20, auto: false, rarity: 'epic' },
            minigun: { name: 'Neon Minigun', damage: 12, fireRate: 20, projectileSpeed: 14, auto: true, rarity: 'legendary' },
            rocket: { name: 'Void Rocket', damage: 80, fireRate: 2, projectileSpeed: 6, explosive: true, radius: 60, auto: false, rarity: 'legendary' },
            railgun: { name: 'Abyss Railgun', damage: 200, fireRate: 0.5, projectileSpeed: 30, auto: false, rarity: 'legendary' },
            void_reaver: { name: 'Void Reaver', damage: 150, fireRate: 3, projectileSpeed: 8, homing: true, auto: false, rarity: 'mythic' },
            ion_rifle: { name: 'Ion Rifle', damage: 55, fireRate: 8, projectileSpeed: 14, auto: true, rarity: 'epic' },
            omega_cannon: { name: 'Omega Cannon', damage: 1000, fireRate: 0.2, projectileSpeed: 30, explosive: true, radius: 200, auto: false, rarity: 'mythic' }
        };
        
        // Enemy Database
        this.enemyTypes = {
            drone: { name: 'Void Drone', health: 3, speed: 2, damage: 10, score: 50, xp: 10, color: '#f00', size: 24, behavior: 'chase' },
            sentinel: { name: 'Abyss Sentinel', health: 5, speed: 1.5, damage: 15, score: 80, xp: 15, color: '#0f0', size: 28, behavior: 'patrol' },
            tank: { name: 'Void Tank', health: 15, speed: 0.8, damage: 25, score: 150, xp: 30, color: '#888', size: 40, behavior: 'tank' },
            sniper: { name: 'Abyss Sniper', health: 3, speed: 0.3, damage: 40, score: 100, xp: 20, color: '#0ff', size: 26, behavior: 'sniper' },
            swarm_drone: { name: 'Swarm Drone', health: 1, speed: 4, damage: 8, score: 30, xp: 5, color: '#ff0', size: 15, behavior: 'swarm' },
            elite_drone: { name: 'Elite Drone', health: 8, speed: 3, damage: 20, score: 100, xp: 20, color: '#f44', size: 28, behavior: 'chase', elite: true }
        };
        
        // Buff Types
        this.buffTypes = {
            haste: { name: 'Haste', duration: 300, effect: 'speed', value: 1.5, color: '#0ff' },
            berserk: { name: 'Berserk', duration: 240, effect: 'damage', value: 2.0, color: '#f00' },
            regen: { name: 'Regeneration', duration: 300, effect: 'heal', value: 2, color: '#0f0' }
        };
        
        // Boss Types
        this.bossTypes = {
            overmind: { name: 'Hive Overmind', health: 300, speed: 0.5, damage: 30, color: '#f0f', size: 80, behavior: 'boss_spawn', rewards: { coins: 500, gems: 50 } },
            titan: { name: 'Void Titan', health: 500, speed: 0.3, damage: 50, color: '#888', size: 100, behavior: 'boss_tank', rewards: { coins: 800, gems: 80 } },
            cyber_dragon: { name: 'Cyber Dragon', health: 800, speed: 1, damage: 60, color: '#0ff', size: 120, behavior: 'boss_spawn', rewards: { coins: 1500, gems: 150 } }
        };
        
        // Shop Items
        this.shopItems = [
            { id: 'blaster_mk2', name: 'Blaster MK-II', type: 'weapon', cost: 500 },
            { id: 'plasma_rifle', name: 'Plasma Rifle', type: 'weapon', cost: 1200 },
            { id: 'shotgun', name: 'Void Shotgun', type: 'weapon', cost: 2500 },
            { id: 'minigun', name: 'Neon Minigun', type: 'weapon', cost: 5000 }
        ];
        
        // Crafting Recipes
        this.recipes = [
            { id: 'blaster_mk2', name: 'Blaster MK-II', result: 'weapon', materials: { scrap: 5, crystal: 2 }, cost: 200 }
        ];
        
        // Skill Tree
        this.skillTree = {
            combat: [{ id: 'c1', name: 'Sharpshooter', max: 5, cost: 1, effect: 'critChance', value: 0.02, desc: '+2% crit chance' }],
            survival: [{ id: 's1', name: 'Tough Skin', max: 5, cost: 1, effect: 'maxHealth', value: 10, desc: '+10 max HP' }]
        };
        
        // Guild Data
        this.guildData = { name: 'Void Runners', level: 1, members: [] };
        
        // Tournament Data
        this.tournamentData = { active: true, name: 'Abyss Championship', prizes: [] };
        
        // Leaderboard
        this.leaderboardData = { score: [] };
        
        // Story Chapters
        this.storyChapters = [{ id: 1, name: 'The Fall', levels: 3, biome: 'neon_city', boss: 'overmind' }];
        
        // Monetization
        this.revenueStats = { totalRevenue: 0 };
        this.premium = false;
        this.premiumTier = null;
        this.dailyClaimed = false;
        this.dailyStreak = 0;
        
        // Settings
        this.settings = { autoAim: false, minimap: true, bloom: true, damageNums: true };
        
        this.setupInput();
        
        // Hide loading screen after delay
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
        }, 1500);
        
        this.loop(0);
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }
    
    setupInput() {
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (e.code === 'Escape') this.pause();
            if (e.code === 'KeyR') this.fireSpecial();
            if (e.code === 'KeyQ') this.cycleWeapon(-1);
            if (e.code === 'KeyF') this.cycleWeapon(1);
        });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
        this.canvas.addEventListener('mousedown', (e) => {
            this.mouse.down = true;
            this.mouse.x = e.clientX;
            this.mouse.y = e.clientY;
            if (this.state === 'playing') this.fire();
        });
        this.canvas.addEventListener('mouseup', () => { this.mouse.down = false; });
        this.canvas.addEventListener('mousemove', (e) => {
            this.mouse.x = e.clientX;
            this.mouse.y = e.clientY;
        });
        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.touch.active = true;
            this.touch.x = e.touches[0].clientX;
            this.touch.y = e.touches[0].clientY;
            if (this.state === 'playing') this.fire();
        });
        this.canvas.addEventListener('touchend', () => { this.touch.active = false; });
        this.canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                this.touch.x = e.touches[0].clientX;
                this.touch.y = e.touches[0].clientY;
            }
        });
    }
    
    // ========== GAME STATE METHODS ==========
    startStory() { this.mode = 'story'; this.startLevel(); this.showNotification('Story Mode Started!', 'legendary'); }
    startEndless() { this.mode = 'endless'; this.startLevel(); this.showNotification('Endless Mode Started!', 'legendary'); }
    
    startLevel() {
        this.state = 'playing';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        
        this.enemies = [];
        this.projectiles = [];
        this.particles = [];
        this.collectibles = [];
        this.platforms = [];
        this.wave = 1;
        this.score = 0;
        
        this.player.x = 100;
        this.player.y = 300;
        this.player.vx = 0;
        this.player.vy = 0;
        this.player.health = 100;
        this.player.energy = 100;
        
        this.generateLevel();
        this.updateHUD();
        this.showNotification(`Level ${this.currentLevel} Started!`, 'epic');
    }
    
    generateLevel() {
        this.platforms.push({ x: 0, y: this.canvas.height - 50, width: 2000, height: 50 });
        for (let i = 0; i < 10; i++) {
            this.platforms.push({
                x: 200 + Math.random() * 1200,
                y: 200 + Math.random() * 200,
                width: 80 + Math.random() * 80,
                height: 20
            });
        }
    }
    
    pause() { if (this.state === 'playing') { this.state = 'paused'; document.getElementById('pauseMenu').classList.add('active'); } }
    resume() { this.state = 'playing'; document.getElementById('pauseMenu').classList.remove('active'); }
    restart() { this.startLevel(); document.getElementById('gameOver').classList.remove('active'); document.getElementById('levelComplete').classList.remove('active'); }
    nextLevel() { this.currentLevel++; this.startLevel(); document.getElementById('levelComplete').classList.remove('active'); }
    
    gameOver() {
        this.state = 'gameover';
        document.getElementById('gameOver').classList.add('active');
        document.getElementById('finalScore').innerText = 'Score: ' + this.score;
        this.showNotification('Game Over!', 'epic');
    }
    
    levelComplete() {
        this.state = 'levelcomplete';
        document.getElementById('levelComplete').classList.add('active');
        this.coins += 100;
        document.getElementById('levelRewards').innerHTML = '+100 Coins';
        this.updateHUD();
        this.showNotification('Level Complete!', 'legendary');
    }
    
    showMenu() {
        this.state = 'menu';
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('pauseMenu').classList.remove('active');
        document.getElementById('gameOver').classList.remove('active');
        document.getElementById('levelComplete').classList.remove('active');
        document.getElementById('armory').classList.remove('active');
        document.getElementById('skillTree').classList.remove('active');
        document.getElementById('crafting').classList.remove('active');
    }
    
    updateHUD() {
        document.getElementById('healthVal').innerText = Math.floor(this.player.health);
        document.getElementById('energyVal').innerText = Math.floor(this.player.energy);
        document.getElementById('coinVal').innerText = this.coins;
        document.getElementById('gemVal').innerText = this.gems;
        document.getElementById('scoreVal').innerText = this.score;
        document.getElementById('waveVal').innerText = this.wave;
        document.getElementById('levelVal').innerText = this.player.level;
    }
    
    // ========== COMBAT METHODS ==========
    fire() {
        let w = this.weaponDefs[this.player.weapon];
        if (!w || this.player.energy < 5) return;
        this.player.energy -= 5;
        
        let targetX = (this.mouse.x || this.touch.x) + this.camera.x;
        let targetY = (this.mouse.y || this.touch.y) + this.camera.y;
        
        if (this.settings.autoAim && this.enemies.length > 0) {
            let nearest = null;
            let nearestDist = Infinity;
            this.enemies.forEach(e => {
                let d = Math.hypot(e.x - (this.player.x + 16), e.y - (this.player.y + 20));
                if (d < nearestDist && d < 300) { nearestDist = d; nearest = e; }
            });
            if (nearest) { targetX = nearest.x; targetY = nearest.y; }
        }
        
        let dx = targetX - (this.player.x + 16);
        let dy = targetY - (this.player.y + 20);
        let dist = Math.hypot(dx, dy);
        if (dist < 0.1) return;
        dx /= dist; dy /= dist;
        
        let pellets = w.pellets || 1;
        for (let i = 0; i < pellets; i++) {
            let angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.2;
            this.projectiles.push({
                x: this.player.x + 16,
                y: this.player.y + 20,
                vx: Math.cos(angle) * (w.projectileSpeed || 10),
                vy: Math.sin(angle) * (w.projectileSpeed || 10),
                damage: w.damage,
                owner: 'player',
                color: '#0ff',
                size: 4,
                life: 60,
                explosive: w.explosive || false,
                radius: w.radius || 60,
                homing: w.homing || false
            });
        }
    }
    
    fireSpecial() {
        this.showNotification('VOID BURST!', 'legendary');
        this.enemies.forEach(e => { e.health -= 50; });
        this.createExplosion(this.player.x + 16, this.player.y + 20, 150, 50);
    }
    
    cycleWeapon(dir) {
        let idx = (this.player.weapons.indexOf(this.player.weapon) + dir + this.player.weapons.length) % this.player.weapons.length;
        this.player.weapon = this.player.weapons[idx];
        this.showNotification('Weapon: ' + this.weaponDefs[this.player.weapon].name, 'rare');
    }
    
    addXP(amount) {
        this.player.xp += amount;
        while (this.player.xp >= this.player.xpToNext) {
            this.player.xp -= this.player.xpToNext;
            this.player.level++;
            this.player.xpToNext = Math.floor(this.player.xpToNext * 1.2);
            this.skillPoints++;
            this.player.maxHealth += 5;
            this.player.health = this.player.maxHealth;
            this.showNotification(`LEVEL UP! Level ${this.player.level}`, 'legendary');
        }
    }
    
    // ========== UPDATE LOOP ==========
    update(dt) {
        if (this.state !== 'playing') return;
        
        // Movement
        let move = 0;
        if (this.keys['KeyA'] || this.keys['ArrowLeft']) move = -1;
        if (this.keys['KeyD'] || this.keys['ArrowRight']) move = 1;
        
        this.player.vx += move * this.player.speed * 0.5 * dt;
        this.player.vx *= 0.85;
        this.player.x += this.player.vx * dt;
        this.player.vy += 0.8 * dt;
        this.player.y += this.player.vy * dt;
        
        // Jump
        if ((this.keys['KeyW'] || this.keys['ArrowUp'] || this.keys['Space']) && this.player.onGround) {
            this.player.vy = -this.player.jumpPower;
            this.player.onGround = false;
        }
        
        // Platform collision
        this.player.onGround = false;
        for (let p of this.platforms) {
            if (this.player.x + this.player.width > p.x && this.player.x < p.x + p.width &&
                this.player.y + this.player.height > p.y && this.player.y + this.player.height < p.y + p.height + 10 && this.player.vy >= 0) {
                this.player.y = p.y - this.player.height;
                this.player.vy = 0;
                this.player.onGround = true;
            }
        }
        
        // Bounds
        this.player.x = Math.max(0, Math.min(this.player.x, 2000 - this.player.width));
        if (this.player.y > this.canvas.height) this.player.health = 0;
        if (this.player.health <= 0) this.gameOver();
        if (this.player.energy < this.player.maxEnergy) this.player.energy += 0.1 * dt;
        if (this.player.invincible > 0) this.player.invincible -= dt;
        
        // Auto-fire
        if ((this.mouse.down || this.touch.active) && this.weaponDefs[this.player.weapon]?.auto) this.fire();
        
        // Camera
        this.camera.x = this.player.x - this.canvas.width / 2;
        this.camera.x = Math.max(0, Math.min(this.camera.x, 2000 - this.canvas.width));
        
        // Spawn enemies
        if (Math.random() < 0.02) this.spawnEnemy();
        
        // Update entities
        this.updateProjectiles(dt);
        this.updateEnemies(dt);
        this.updateParticles(dt);
        this.updateCollectibles(dt);
        this.checkCollisions();
        
        this.updateHUD();
    }
    
    updateProjectiles(dt) {
        for (let i = 0; i < this.projectiles.length; i++) {
            let p = this.projectiles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            
            // Homing
            if (p.homing && p.owner === 'player') {
                let nearest = null;
                let nearestDist = Infinity;
                this.enemies.forEach(e => {
                    let d = Math.hypot(e.x - p.x, e.y - p.y);
                    if (d < nearestDist) { nearestDist = d; nearest = e; }
                });
                if (nearest && nearestDist < 200) {
                    let hdx = nearest.x - p.x;
                    let hdy = nearest.y - p.y;
                    let hdist = Math.hypot(hdx, hdy);
                    p.vx += (hdx / hdist) * 0.3 * dt;
                    p.vy += (hdy / hdist) * 0.3 * dt;
                    let speed = Math.hypot(p.vx, p.vy);
                    p.vx = (p.vx / speed) * 10;
                    p.vy = (p.vy / speed) * 10;
                }
            }
            
            if (p.life <= 0 || p.x < 0 || p.x > 2000 || p.y < 0 || p.y > this.canvas.height) {
                if (p.explosive && p.owner === 'player') this.createExplosion(p.x, p.y, p.radius, p.damage);
                this.projectiles.splice(i, 1);
                i--;
            }
        }
    }
    
    updateEnemies(dt) {
        for (let i = 0; i < this.enemies.length; i++) {
            let e = this.enemies[i];
            let type = this.enemyTypes[e.type];
            if (!type) continue;
            
            let dx = this.player.x + 16 - e.x;
            let dy = this.player.y + 20 - e.y;
            let dist = Math.hypot(dx, dy);
            
            // AI behaviors
            if (type.behavior === 'chase' || type.behavior === 'swarm') {
                if (dist > 10) {
                    e.vx = (dx / dist) * type.speed;
                    e.vy = (dy / dist) * type.speed;
                }
            } else if (type.behavior === 'patrol') {
                e.vx = Math.sin(Date.now() * 0.002) * type.speed;
            } else if (type.behavior === 'tank') {
                if (Math.abs(dx) > 50) e.vx = Math.sign(dx) * type.speed;
                else e.vx = 0;
            } else if (type.behavior === 'sniper' && Math.random() < 0.02) {
                this.projectiles.push({
                    x: e.x, y: e.y,
                    vx: (dx / dist) * 8,
                    vy: (dy / dist) * 8,
                    damage: type.damage,
                    owner: 'enemy',
                    color: '#f00',
                    size: 5,
                    life: 60
                });
            }
            
            e.x += e.vx * dt;
            e.y += e.vy * dt;
            
            // Collision with player
            if (Math.hypot(this.player.x + 16 - e.x, this.player.y + 20 - e.y) < 25 && this.player.invincible <= 0) {
                this.player.health -= type.damage;
                this.player.invincible = 30;
                if (this.player.health <= 0) this.gameOver();
            }
        }
    }
    
    updateParticles(dt) {
        for (let i = 0; i < this.particles.length; i++) {
            let p = this.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            if (p.life <= 0) {
                this.particles.splice(i, 1);
                i--;
            }
        }
    }
    
    updateCollectibles(dt) {
        for (let i = 0; i < this.collectibles.length; i++) {
            let c = this.collectibles[i];
            if (Math.hypot(this.player.x + 16 - c.x, this.player.y + 20 - c.y) < 30) {
                if (c.type === 'coin') this.coins += c.value;
                if (c.type === 'gem') this.gems += c.value;
                if (c.type === 'health') this.player.health = Math.min(this.player.health + c.value, 100);
                if (c.type === 'energy') this.player.energy = Math.min(this.player.energy + c.value, 100);
                this.collectibles.splice(i, 1);
                i--;
            }
        }
    }
    
    checkCollisions() {
        for (let pi = 0; pi < this.projectiles.length; pi++) {
            let p = this.projectiles[pi];
            if (p.owner !== 'player') continue;
            
            for (let ei = 0; ei < this.enemies.length; ei++) {
                let e = this.enemies[ei];
                if (Math.hypot(p.x - e.x, p.y - e.y) < 20) {
                    let damage = p.damage;
                    e.health -= damage;
                    this.createParticles(e.x, e.y, 5, '#fff');
                    this.createDamageNumber(e.x, e.y, damage, '#fff');
                    if (e.health <= 0) {
                        let type = this.enemyTypes[e.type];
                        this.score += type.score;
                        this.coins += Math.floor(type.score / 10);
                        this.addXP(type.xp);
                        this.createParticles(e.x, e.y, 15, '#f00');
                        this.enemies.splice(ei, 1);
                        ei--;
                    }
                    this.projectiles.splice(pi, 1);
                    pi--;
                    break;
                }
            }
        }
    }
    
    spawnEnemy() {
        let types = ['drone', 'sentinel', 'tank', 'sniper'];
        let type = types[Math.floor(Math.random() * types.length)];
        let enemy = this.enemyTypes[type];
        let x = this.player.x + (Math.random() > 0.5 ? 1 : -1) * (400 + Math.random() * 200);
        let y = 100 + Math.random() * (this.canvas.height - 200);
        this.enemies.push({
            type: type,
            x: x, y: y,
            vx: 0, vy: 0,
            health: enemy.health,
            maxHealth: enemy.health,
            speed: enemy.speed,
            damage: enemy.damage,
            score: enemy.score
        });
    }
    
    createExplosion(x, y, radius, damage) {
        this.createParticles(x, y, 20, '#f80');
        for (let e of this.enemies) {
            let dist = Math.hypot(e.x - x, e.y - y);
            if (dist < radius) {
                let falloff = 1 - (dist / radius);
                e.health -= Math.floor(damage * falloff);
            }
        }
    }
    
    createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 30,
                color: color,
                size: 2
            });
        }
    }
    
    createFloatingText(x, y, text, color) {
        let el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = (x - this.camera.x) + 'px';
        el.style.top = (y - this.camera.y) + 'px';
        el.style.color = color;
        document.getElementById('gameContainer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    createDamageNumber(x, y, damage, color) {
        let el = document.createElement('div');
        el.className = 'damage-number';
        el.innerText = damage;
        el.style.left = (x - this.camera.x + (Math.random() - 0.5) * 20) + 'px';
        el.style.top = (y - this.camera.y) + 'px';
        el.style.color = color;
        document.getElementById('gameContainer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    showCombo(combo) {
        let d = document.getElementById('comboDisplay');
        d.innerText = combo + 'x COMBO!';
        d.classList.add('show');
        setTimeout(() => d.classList.remove('show'), 800);
    }
    
    showNotification(text, type) {
        let area = document.getElementById('notificationArea');
        let n = document.createElement('div');
        n.className = 'notification';
        n.innerText = text;
        area.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
    
    // ========== RENDERING ==========
    render() {
        let ctx = this.ctx;
        let w = this.canvas.width;
        let h = this.canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, w, h);
        
        ctx.save();
        ctx.translate(-this.camera.x, -this.camera.y);
        
        // Platforms
        for (let p of this.platforms) {
            ctx.fillStyle = 'rgba(0,255,255,0.2)';
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.strokeStyle = '#0ff';
            ctx.strokeRect(p.x, p.y, p.width, p.height);
        }
        
        // Collectibles
        for (let c of this.collectibles) {
            ctx.fillStyle = c.color || '#ffd700';
            ctx.fillRect(c.x - 5, c.y - 5, 10, 10);
        }
        
        // Enemies
        for (let e of this.enemies) {
            let type = this.enemyTypes[e.type];
            ctx.fillStyle = type.color;
            ctx.fillRect(e.x - 15, e.y - 15, 30, 30);
            
            // Health bar
            let percent = e.health / e.maxHealth;
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x - 15, e.y - 25, 30, 4);
            ctx.fillStyle = '#f00';
            ctx.fillRect(e.x - 15, e.y - 25, 30 * percent, 4);
        }
        
        // Projectiles
        for (let p of this.projectiles) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
        }
        
        // Particles
        for (let p of this.particles) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        }
        
        // Player
        ctx.fillStyle = '#0ff';
        ctx.fillRect(this.player.x, this.player.y, 32, 42);
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.player.x + 20, this.player.y + 8, 8, 6);
        
        // Weapon
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.player.x + (this.player.facing > 0 ? 28 : -8), this.player.y + 16, 12, 6);
        
        ctx.restore();
        
        // Minimap
        if (this.settings.minimap) this.renderMinimap();
    }
    
    renderMinimap() {
        let mm = document.getElementById('minimap');
        if (!mm) {
            mm = document.createElement('canvas');
            mm.id = 'minimap';
            mm.width = 150;
            mm.height = 100;
            mm.style.position = 'absolute';
            mm.style.bottom = '20px';
            mm.style.right = '20px';
            mm.style.border = '1px solid #0ff';
            mm.style.borderRadius = '4px';
            mm.style.background = 'rgba(0,0,0,0.7)';
            document.getElementById('gameContainer').appendChild(mm);
        }
        let mctx = mm.getContext('2d');
        mctx.fillStyle = 'rgba(0,0,0,0.8)';
        mctx.fillRect(0, 0, 150, 100);
        mctx.fillStyle = '#0ff';
        mctx.fillRect(this.player.x / 13 - 2, this.player.y / 6 - 2, 4, 4);
        for (let e of this.enemies) {
            mctx.fillStyle = '#f00';
            mctx.fillRect(e.x / 13 - 1, e.y / 6 - 1, 2, 2);
        }
    }
    
    renderMenuBackground() {
        let ctx = this.ctx;
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        for (let i = 0; i < 50; i++) {
            let x = (Date.now() * 0.5 + i * 137) % this.canvas.width;
            let y = (Date.now() * 0.3 + i * 89) % this.canvas.height;
            ctx.fillStyle = `rgba(0,255,255,0.2)`;
            ctx.fillRect(x, y, 2, 2);
        }
    }
    
    // ========== UI METHODS (All buttons call these) ==========
    openArmory() {
        let grid = document.getElementById('armoryGrid');
        grid.innerHTML = Object.keys(this.weaponDefs).map(id => `
            <div class="grid-item" onclick="window.game.equipWeapon('${id}')">
                ${this.weaponDefs[id].name}
                <div style="color:#888;font-size:0.7rem;">${this.weaponDefs[id].rarity}</div>
            </div>
        `).join('');
        document.getElementById('armory').classList.add('active');
    }
    closeArmory() { document.getElementById('armory').classList.remove('active'); }
    equipWeapon(id) { 
        if (!this.player.weapons.includes(id)) this.player.weapons.push(id);
        this.player.weapon = id; 
        this.showNotification('Equipped: ' + this.weaponDefs[id].name, 'rare'); 
        this.closeArmory();
    }
    
    openSkillTree() {
        document.getElementById('skillPoints').innerText = this.skillPoints;
        document.getElementById('skillTree').classList.add('active');
        this.renderSkillTree();
    }
    closeSkillTree() { document.getElementById('skillTree').classList.remove('active'); }
    renderSkillTree() {
        let canvas = document.getElementById('skillCanvas');
        if (!canvas) return;
        let ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 400;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 600, 400);
        ctx.fillStyle = '#0ff';
        ctx.font = '14px monospace';
        ctx.fillText('COMBAT SKILLS', 20, 40);
        ctx.fillText('Click on skills to upgrade', 20, 70);
        ctx.fillText('Points available: ' + this.skillPoints, 20, 100);
    }
    
    openCrafting() {
        document.getElementById('materialDisplay').innerHTML = `Scrap: ${this.materials.scrap} | Crystal: ${this.materials.crystal}`;
        let grid = document.getElementById('craftingGrid');
        grid.innerHTML = this.recipes.map(r => `
            <div class="grid-item" onclick="window.game.craftItem('${r.id}')">
                ${r.name}<br>
                <span style="color:#888;font-size:0.7rem;">${Object.entries(r.materials).map(([m,a])=>`${m}:${a}`).join(' ')}</span>
            </div>
        `).join('');
        document.getElementById('crafting').classList.add('active');
    }
    closeCrafting() { document.getElementById('crafting').classList.remove('active'); }
    craftItem(id) {
        let recipe = this.recipes.find(r => r.id === id);
        if (!recipe) return;
        let canCraft = Object.entries(recipe.materials).every(([mat, amt]) => this.materials[mat] >= amt);
        if (!canCraft) { this.showNotification('Insufficient materials!', 'rare'); return; }
        Object.entries(recipe.materials).forEach(([mat, amt]) => { this.materials[mat] -= amt; });
        if (recipe.result === 'weapon' && !this.player.weapons.includes(recipe.id)) this.player.weapons.push(recipe.id);
        this.showNotification('Crafted: ' + recipe.name, 'legendary');
        this.openCrafting();
    }
    
    openQuests() { this.showNotification('Quests: Defeat enemies to earn rewards!', 'rare'); }
    openAchievements() { this.showNotification('Achievements: Unlock by playing!', 'rare'); }
    openLeaderboard() { this.showNotification('Leaderboard: Coming soon!', 'rare'); }
    openGuild() { this.showNotification('Guild: Join to earn bonuses!', 'rare'); }
    openTournament() { this.showNotification('Tournament: Weekly competition!', 'rare'); }
    openBattlePass() { this.showNotification('Battle Pass: Earn rewards as you play!', 'rare'); }
    openDaily() {
        if (!this.dailyClaimed) {
            this.coins += 100;
            this.gems += 10;
            this.dailyClaimed = true;
            this.dailyStreak++;
            this.showNotification('Daily reward claimed! +100 Coins, +10 Gems', 'legendary');
            this.updateHUD();
        } else {
            this.showNotification('Already claimed today!', 'rare');
        }
    }
    openSettings() { this.showNotification('Settings: Coming soon!', 'rare'); }
    showPremium() { this.showNotification('Premium: 2x coins, no ads, exclusive skins!', 'legendary'); }
    openIAPShop() { this.showNotification('Shop: 500 Coins for $0.99 (demo)', 'legendary'); }
    showAdRewardMenu() { 
        this.showNotification('Watch ad for +50 Coins! (simulated)', 'legendary');
        this.coins += 50;
        this.updateHUD();
    }
    
    loop(timestamp) {
        let dt = Math.min((timestamp - (this.lastTime || timestamp)) / 16.67, 3);
        this.lastTime = timestamp;
        if (this.state === 'playing') {
            this.update(dt);
            this.render();
        } else if (this.state === 'menu') {
            this.renderMenuBackground();
        }
        requestAnimationFrame((t) => this.loop(t));
    }
}

// Initialize with global reference
let game;
window.onload = function() {
    game = new VoidRunnerUltimate();
    window.game = game;
    console.log('Game initialized. Buttons should work.');
};
