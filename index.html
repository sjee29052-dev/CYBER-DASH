<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#010610">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SHADOW DASH ULTRA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --n: #00f5ff;
      --a: #ff2d78;
      --g: #ffd700;
      --p: #b44fff;
      --gr: #00ff88;
      --o: #ff8c00;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#010610;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
      font-family: 'Rajdhani', sans-serif;
      touch-action: pan-x pan-y;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      position:relative;
      width:100%;
      max-width:480px;
      height:100vh;
      max-height:820px;
      background:#010610;
      overflow:hidden;
      box-shadow:0 0 40px rgba(0,245,255,0.2);
    }
    canvas {
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
    }
    #bg { z-index:0; }
    #gc { z-index:1; pointer-events:none; }
    .scr {
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      z-index:10;
      background:linear-gradient(180deg, rgba(1,6,16,0.95) 0%, rgba(4,11,24,0.98) 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      transition: opacity 0.3s;
    }
    .scr.active {
      pointer-events:auto;
      opacity:1;
      z-index:15;
    }
    .hide { display:none !important; }
    .btn {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,245,255,0.4);
      color:var(--n);
      padding:8px 18px;
      font-family:'Bebas Neue', cursive;
      font-size:16px;
      letter-spacing:3px;
      cursor:pointer;
      backdrop-filter:blur(5px);
      border-radius:4px;
      transition:0.2s;
      text-transform:uppercase;
      margin:4px;
    }
    .btn:hover, .btn:active { background:rgba(0,245,255,0.15); border-color:var(--n); }
    .btn.sm { font-size:12px; padding:5px 12px; }
    .btn.bp { background:rgba(0,245,255,0.1); }
    .title {
      font-family:'Bebas Neue', cursive;
      font-size:48px;
      letter-spacing:10px;
      color:var(--n);
      text-shadow:0 0 20px var(--n), 0 0 60px var(--n);
      margin-bottom:10px;
    }
    .subtitle {
      font-family:'Orbitron', sans-serif;
      font-size:12px;
      letter-spacing:6px;
      color:var(--a);
      margin-bottom:30px;
    }
    #hud {
      position:absolute;
      top:0; left:0; width:100%;
      pointer-events:none;
      z-index:20;
      padding:12px;
      display:none;
      font-family:'Bebas Neue', cursive;
      color:white;
      text-shadow:0 0 6px black;
    }
    .hl { font-size:8px; letter-spacing:3px; opacity:0.6; }
    .hv { font-size:18px; letter-spacing:2px; }
    #hs-wrap, #hb-wrap, #hc-wrap { position:absolute; top:10px; }
    #hs-wrap { left:10px; }
    #hb-wrap { left:50%; transform:translateX(-50%); text-align:center; }
    #hc-wrap { right:10px; text-align:right; }
    #pubar {
      position:absolute;
      bottom:40px;
      left:10px;
      right:10px;
      display:flex;
      gap:4px;
      justify-content:center;
      pointer-events:none;
    }
    .pu {
      width:28px; height:28px;
      background:rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:4px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      position:relative;
    }
    .pt {
      position:absolute;
      bottom:0; left:0; height:100%;
      background:rgba(0,245,255,0.2);
      transform-origin:left;
      width:100%;
    }
    #boss-wrap { position:absolute; top:60px; left:50%; transform:translateX(-50%); text-align:center; display:none; }
    #boss-lbl { font-size:14px; letter-spacing:4px; color:var(--a); text-shadow:0 0 12px var(--a); }
    #boss-track { width:200px; height:6px; background:rgba(0,0,0,0.6); border-radius:3px; margin-top:4px; }
    #boss-fill { width:100%; height:100%; background:var(--a); border-radius:3px; }
    .overlay-bg {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.8);
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      transition:0.2s;
    }
    .overlay-bg.show { opacity:1; pointer-events:auto; }
    .popup-box {
      background:rgba(10,15,30,0.95);
      border:1px solid rgba(0,245,255,0.4);
      padding:20px;
      border-radius:10px;
      text-align:center;
      backdrop-filter:blur(10px);
      color:white;
    }
    .daily-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:15px 0; }
    .daily-item {
      background:rgba(255,255,255,0.05);
      padding:8px;
      border-radius:6px;
      font-size:10px;
      color:rgba(255,255,255,0.7);
    }
    .daily-item.claimed { opacity:0.3; }
    .daily-item.current { border:2px solid var(--g); color:var(--g); }
    .si { width:100%; max-height:100%; overflow-y:auto; padding:20px; }
    .card {
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      padding:12px;
      margin:8px 0;
      border-radius:6px;
      display:flex;
      align-items:center;
      gap:10px;
      color:white;
    }
    .card .em { font-size:24px; }
    .card .info { flex:1; }
    .card .name { font-weight:600; letter-spacing:1px; }
    .card .desc { font-size:11px; opacity:0.6; }
    .card .price { color:var(--g); font-weight:700; }
    .buy-btn {
      background:rgba(0,245,255,0.15);
      border:1px solid var(--n);
      color:var(--n);
      padding:4px 12px;
      font-family:'Bebas Neue', cursive;
      cursor:pointer;
      border-radius:4px;
    }
    .owned { opacity:0.5; pointer-events:none; }
    @keyframes pulse {
      0% { opacity:0.7; } 50% { opacity:1; } 100% { opacity:0.7; }
    }
    .pulse { animation:pulse 2s infinite; }
    #toast {
      position:absolute;
      bottom:80px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.8);
      color:white;
      padding:8px 16px;
      border-radius:20px;
      font-size:12px;
      z-index:50;
      opacity:0;
      transition:0.3s;
      pointer-events:none;
    }
  </style>
</head>
<body>

    <div style="text-align:center;font-family:'Bebas Neue';color:white;text-shadow:0 0 30px red;">

  <div class="scr active" id="s-home"><div class="si" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <div class="title">SHADOW<br>DASH</div>
    <div class="subtitle">ULTRA EDITION</div>
    <button class="btn" onclick="startGame()">▶ PLAY</button>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px;">

      <button class="btn sm" onclick="showScreen('s-shop')">SHOP</button>
      <button class="btn sm" onclick="showScreen('s-skins')">SKINS</button>
      <button class="btn sm" onclick="showScreen('s-lb')">LEADERBOARD</button>
      <button class="btn sm" onclick="showScreen('s-missions')">MISSIONS</button>
      <button class="btn sm" onclick="showScreen('s-ach')">ACHIEVEMENTS</button>
      <button class="btn sm" onclick="showScreen('s-settings')">SETTINGS</button>
      <button class="btn sm" onclick="showScreen('s-vip')">VIP</button>
    </div>
  </div></div>

  <div class="scr hide" id="s-shop"><div class="si" id="shop-content"></div></div>
  <div class="scr hide" id="s-store"><div class="si" id="store-content"></div></div>
  <div class="scr hide" id="s-skins"><div class="si" id="skins-content"></div></div>
  <div class="scr hide" id="s-lb"><div class="si" id="lb-content"></div></div>
  <div class="scr hide" id="s-missions"><div class="si" id="missions-content"></div></div>
  <div class="scr hide" id="s-ach"><div class="si" id="ach-content"></div></div>
  <div class="scr hide" id="s-settings"><div class="si" id="settings-content"></div></div>

  <div class="scr hide" id="s-modes"><div class="si" id="modes-content"></div></div>

  <div class="scr hide" id="s-victory"><div class="si" id="victory-content"></div></div>
  <div class="scr hide" id="s-season"><div class="si" id="season-content"></div></div>
  <div class="scr hide" id="s-monarch"><div class="si" id="monarch-content"></div></div>

  <div class="overlay-bg" id="daily-overlay">
    <div class="popup-box">
      <div style="font-family:'Bebas Neue';font-size:28px;color:var(--g);">🎁 DAILY REWARD</div>
      <div id="streak-lbl" style="font-size:10px;color:rgba(255,255,255,0.5);">LOGIN STREAK: 0 DAY</div>
      <div class="daily-grid" id="daily-grid"></div>
      <button class="btn" id="daily-claim-btn" onclick="claimDaily()">CLAIM</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

  totalRuns:LS.g('runs',0), totalDist:LS.g('dist',0), bestCombo:LS.g('bc',0),
  skins:LS.g('skins',['cyber']), skin:LS.g('skin','cyber'),
  upgrades:LS.g('upg',{}), missions:LS.g('mis',null), mDay:LS.g('mday',''),

const GND = H-128;
const P = {x:82, y:GND, w:44, h:60, vy:0, jumping:false, sliding:false, slideT:0, jumpCount:0, trail:[], legA:0};
let gState='home', gFrame=0, bgF=0;
let gScore=0, gCoins=0, gDist=0, gSpeed=6.5;
let gSpawnT=0, gCoinT=0, gPuT=0;
let gCombo=1, gMaxCombo=1, gComboT=0;
let gJumps=0, gRunCoins=0, gRunPU=0, gRunZ=0;
let gZone=0, gPrevZ=-1, gBossHP=0, gBossOn=false, gBossWave=false;
let gReviveUsed=false, gFreeReviveUsed=false;
let PARTS=[], FLOATS=[], GOBS=[], COINS=[], GPUS=[];

const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
function hasBon(b){ const s=SKINS[S.skin]; return s.bonus===b||s.bonus==='all'||s.bonus==='mega'||s.bonus==='crystal'; }
function hit(ax,ay,aw,ah,bx,by,bw,bh){ return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by; }

function burst(x,y,color,n=12){
  if(!S.settings.particles)return;
  for(let i=0;i<n;i++){ const a=R(0,Math.PI*2), sp=R(1.2,4.8); PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:R(.01,.03),color,size:R(1.5,4)}); }
  if(PARTS.length>150) PARTS.splice(0, n);
}
function spawnFloat(x,y,color,text){ FLOATS.push({x,y,vy:-1.8,life:1,decay:.02,color,text}); }

// Obstacle drawing functions (unchanged from before, fully working)
function drawSpike(o,col,glo,t){
  const n=Math.max(2,Math.floor(o.w/20)), sw=o.w/n;
  X.shadowColor=glo; X.shadowBlur=12+4*Math.sin(t*.09);
  for(let i=0;i<n;i++){
    const cx=o.x+i*sw+sw/2, hP=o.h+3*Math.sin(t*.1+i*.8);
    const grad=X.createLinearGradient(cx,o.y,cx,o.y+hP); grad.addColorStop(0,col); grad.addColorStop(1,col+'44');
    X.fillStyle=grad; X.beginPath(); X.moveTo(cx,o.y); X.lineTo(cx-sw/2+2,o.y+hP); X.lineTo(cx+sw/2-2,o.y+hP); X.closePath(); X.fill();
    X.fillStyle='rgba(255,255,255,0.35)'; X.beginPath(); X.moveTo(cx,o.y); X.lineTo(cx-3,o.y+hP*.35); X.lineTo(cx+1,o.y+hP*.35); X.closePath(); X.fill();
    X.fillStyle=col+'88'; X.fillRect(o.x,o.y+hP-4,o.w,4);
  }
  X.shadowBlur=0;
}
function drawSaw(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=14;
  X.fillStyle=col; X.beginPath(); X.arc(o.x+o.w/2,o.y+o.h/2,o.w/2-2,0,Math.PI*2); X.fill();
  X.fillStyle='#fff3'; X.beginPath(); X.arc(o.x+o.w/2,o.y+o.h/2,o.w/4,0,Math.PI*2); X.fill();
  X.strokeStyle='#fff6'; X.lineWidth=2; for(let i=0;i<6;i++){ const a=t*0.1+i*Math.PI/3; X.beginPath(); X.moveTo(o.x+o.w/2,o.y+o.h/2); X.lineTo(o.x+o.w/2+Math.cos(a)*o.w/2,o.y+o.h/2+Math.sin(a)*o.h/2); X.stroke(); }
  X.shadowBlur=0;
}
function drawLaser(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=16;
  const grad=X.createLinearGradient(o.x,0,o.x+o.w,0); grad.addColorStop(0,'transparent'); grad.addColorStop(0.4,col); grad.addColorStop(0.6,col); grad.addColorStop(1,'transparent');
  X.fillStyle=grad; X.fillRect(o.x,o.y,o.w,o.h);
  X.fillStyle='#fff8'; X.fillRect(o.x+o.w*0.35,o.y,o.w*0.3,o.h);
  X.shadowBlur=0;
}
function drawWall(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=10;
  X.fillStyle=col; X.fillRect(o.x,o.y,o.w,o.h);
  X.fillStyle='rgba(255,255,255,0.15)'; for(let i=0;i<o.h;i+=12) X.fillRect(o.x,o.y+i,o.w,4);
  X.shadowBlur=0;
}
function drawCrystal(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=12;
  X.fillStyle=col; X.beginPath(); X.moveTo(o.x+o.w/2,o.y); X.lineTo(o.x+o.w,o.y+o.h*0.7); X.lineTo(o.x+o.w*0.7,o.y+o.h); X.lineTo(o.x+o.w*0.3,o.y+o.h); X.lineTo(o.x,o.y+o.h*0.7); X.closePath(); X.fill();
  X.fillStyle='#fff6'; X.beginPath(); X.moveTo(o.x+o.w/2,o.y+2); X.lineTo(o.x+o.w-2,o.y+o.h*0.7); X.lineTo(o.x+o.w/2,o.y+o.h-2); X.lineTo(o.x+2,o.y+o.h*0.7); X.closePath(); X.fill();
  X.shadowBlur=0;
}
function drawGate(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=8;
  X.strokeStyle=col; X.lineWidth=4; X.beginPath(); X.moveTo(o.x,o.y); X.lineTo(o.x+o.w,o.y); X.lineTo(o.x+o.w,o.y+o.h); X.lineTo(o.x,o.y+o.h); X.closePath(); X.stroke();
  X.fillStyle=col+'44'; X.fillRect(o.x+2,o.y+2,o.w-4,o.h-4);
  X.shadowBlur=0;
}
function drawMine(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=10;
  X.fillStyle=col; X.beginPath(); X.arc(o.x+o.w/2,o.y+o.h/2,o.w/2,0,Math.PI*2); X.fill();
  X.fillStyle='#fff'; X.beginPath(); X.arc(o.x+o.w/2,o.y+o.h/2,o.w/6,0,Math.PI*2); X.fill();
  X.shadowBlur=0;
}
function drawBarrier(o,col,glo,t){
  X.shadowColor=glo; X.shadowBlur=8;
  X.strokeStyle=col; X.lineWidth=3; X.setLineDash([8,4]); X.beginPath(); X.moveTo(o.x,o.y); X.lineTo(o.x+o.w,o.y+o.h); X.stroke(); X.setLineDash([]);
  X.shadowBlur=0;
}
function drawObstacle(o){
  const t=gFrame, col=o.color, glo=o.glow;
  switch(o.type){
    case'spike':drawSpike(o,col,glo,t);break;
    case'saw':drawSaw(o,col,glo,t);break;
    case'laser':drawLaser(o,col,glo,t);break;
    case'wall':drawWall(o,col,glo,t);break;
    case'crystal':drawCrystal(o,col,glo,t);break;
    case'gate':drawGate(o,col,glo,t);break;
    case'mine':drawMine(o,col,glo,t);break;
    case'barrier':drawBarrier(o,col,glo,t);break;
  }
}

function drawPlayer(){
  const s=SKINS[S.skin];
  X.save(); X.translate(P.x+P.w/2, P.y+P.h/2);
  if(P.sliding) X.scale(1,0.6);
  X.shadowColor=s.g; X.shadowBlur=12;
  X.fillStyle=s.c; X.fillRect(-P.w/2,-P.h/2,P.w,P.h);
  X.fillStyle='#fff3'; X.fillRect(-P.w/2+4,-P.h/2+4,P.w-8,P.h-8);
  X.fillStyle='white'; X.beginPath(); X.arc(-6,-8,5,0,Math.PI*2); X.fill(); X.beginPath(); X.arc(6,-8,5,0,Math.PI*2); X.fill();
  X.fillStyle='black'; X.beginPath(); X.arc(-5,-8,2,0,Math.PI*2); X.fill(); X.beginPath(); X.arc(7,-8,2,0,Math.PI*2); X.fill();
  if(!P.jumping && !P.sliding){ P.legA+=0.2; const la=Math.sin(P.legA)*4; X.fillStyle=s.g; X.fillRect(-8,P.h/2-2,8,6+la); X.fillRect(0,P.h/2-2,8,6-la); }
  X.restore();
}

function drawBG(){
  const z=ZONES[Math.min(gZone,ZONES.length-1)];
  const grad=BX.createLinearGradient(0,0,0,H); grad.addColorStop(0,z.skyA); grad.addColorStop(1,z.skyB);
  BX.fillStyle=grad; BX.fillRect(0,0,W,H);
  BX.fillStyle='white'; for(let i=0;i<40;i++){ const sx=(i*113+17)%W, sy=(i*71+31)%(H*0.6); BX.globalAlpha=0.3+Math.sin(bgF*0.02+i)*0.2; BX.fillRect(sx,sy,1.5,1.5); }
  BX.globalAlpha=1;
  BX.fillStyle=z.gnd; BX.fillRect(0,GND,W,4);
  BX.shadowColor=z.gnd; BX.shadowBlur=20; BX.fillRect(0,GND,W,4); BX.shadowBlur=0;
}

function spawnObs(){
  const z=ZONES[Math.min(gZone,ZONES.length-1)];
  const types=['spike','saw','laser','wall','crystal','gate','mine','barrier'];
  const type=types[RI(0,types.length-1)];
  let w=30+Math.random()*40, h=30+Math.random()*40;
  if(type==='laser'){ w=20; h=80; }
  if(type==='wall'){ w=80; h=20; }
  const col=z.obs[RI(0,z.obs.length-1)];
  GOBS.push({x:W, y:GND-h, w, h, type, color:col, glow:col, speed:gSpeed});
}
function spawnCoin(){ COINS.push({x:W, y:GND-30-RI(0,80), r:8, collected:false}); }
function spawnPU(){ const keys=Object.keys(PUS); GPUS.push({x:W, y:GND-30-RI(0,80), type:keys[RI(0,keys.length-1)], r:12}); }

function activatePU(type){
  const p=PUS[type]; p.on=true; p.t=p.max;
  if(type==='shield') p.hp=hasBon('doubshield')?2:1;
  if(type==='bomb'){ GOBS=[]; burst(P.x+P.w/2,P.y,'#ff8800',20); }
  if(type==='ice'){ gSpeed*=0.4; setTimeout(()=>{ gSpeed=ZONES[Math.min(gZone,ZONES.length-1)].spd; },5000); }
  gRunPU++;
  document.getElementById('pt'+p.i).style.transform='scaleX(1)';
}

function startBossFight(){
  gBossOn=true; gBossHP=100; gBossWave=true;
  document.getElementById('boss-wrap').style.display='block';
  document.getElementById('boss-warning-overlay').style.display='flex';
  setTimeout(()=>{ document.getElementById('boss-warning-overlay').style.display='none'; },2000);
  // Spawn boss obstacle (large moving laser wall)
  GOBS.push({x:W, y:GND-100, w:30, h:100, type:'laser', color:'#ff0000', glow:'#ff0000', speed:gSpeed*0.8, boss:true});
}

function updateGame(){
  if(gState!=='playing') return;
  gFrame++; bgF++;
  let baseSpd=ZONES[Math.min(gZone,ZONES.length-1)].spd;
  if(hasBon('slowramp')) baseSpd*=0.9;
  gSpeed=baseSpd+Math.floor(gDist/500)*0.5;
  gDist+=gSpeed*0.06;
  gZone=Math.min(Math.floor(gDist/1000),3);
  if(gZone!==gPrevZ){ gPrevZ=gZone; showZoneChange(); }
  // Combo timer
  if(gComboT>0){ gComboT--; if(gComboT<=0) gCombo=1; }
  // Spawn timers
  gSpawnT--; if(gSpawnT<=0){ spawnObs(); gSpawnT=Math.max(25,60-Math.floor(gDist/200)); }
  gCoinT--; if(gCoinT<=0){ spawnCoin(); gCoinT=RI(30,60); }
  gPuT--; if(gPuT<=0 && Math.random()<0.3){ spawnPU(); gPuT=RI(90,180); }
  // Boss check
  if(gDist>=1000*(gZone+1) && !gBossOn && gZone<ZONES.length-1){
    startBossFight();
  }
  // Update obstacles
  for(let o of GOBS){ o.x-=(o.speed||gSpeed); if(o.boss){ o.y=GND-100+Math.sin(gFrame*0.05)*40; } }
  GOBS=GOBS.filter(o=>o.x>-100);
  // Update coins
  for(let c of COINS){ c.x-=gSpeed; }
  COINS=COINS.filter(c=>c.x>-30);
  // Update PUs
  for(let p of GPUS){ p.x-=gSpeed; }
  GPUS=GPUS.filter(p=>p.x>-30);
  // Player physics
  if(P.jumping){ P.vy+=0.8; P.y+=P.vy; if(P.y>=GND){ P.y=GND; P.jumping=false; P.vy=0; P.jumpCount=0; } }
  if(P.sliding){ P.slideT--; if(P.slideT<=0){ P.sliding=false; P.h=60; } }
  // Power-up timers
  for(let k in PUS){ if(PUS[k].on){ PUS[k].t--; if(PUS[k].t<=0){ PUS[k].on=false; document.getElementById('pt'+PUS[k].i).style.transform='scaleX(0)'; } } }
  // Collision
  if(!PUS.ghost.on && !hasBon('voidvision')){
    for(let o of GOBS){
      if(hit(P.x,P.y,P.w,P.sliding?30:P.h, o.x,o.y,o.w,o.h)){
        if(PUS.shield.on){ PUS.shield.hp--; burst(P.x+P.w/2,P.y+P.h/2,'#00aaff',10); if(PUS.shield.hp<=0) PUS.shield.on=false; GOBS=GOBS.filter(ob=>ob!==o); }
        else if(o.boss){ // boss hit
          burst(P.x+P.w/2,P.y+P.h/2,'#ff0000',20); die(); return;
        } else { die(); return; }
      }
    }
  }
  // Coin collection
  for(let c of COINS){
    if(!c.collected && hit(P.x,P.y,P.w,P.h, c.x-c.r, c.y-c.r, c.r*2, c.r*2)){
      c.collected=true;
      let val=1; if(hasBon('extracoin')) val++; if(hasBon('x2coin')||hasBon('mega')) val*=2; if(hasBon('crystal')) val*=4;
      gCoins+=val; gRunCoins+=val;
      spawnFloat(c.x,c.y,'#ffd700','+'+val);
      gCombo++; gComboT=60; if(gCombo>gMaxCombo) gMaxCombo=gCombo;
      gScore+=10*gCombo;
      if(gBossOn){ gBossHP-=5; if(gBossHP<=0) bossDefeated(); }
    }
  }
  COINS=COINS.filter(c=>!c.collected);
  // PU collection
  for(let p of GPUS){
    if(hit(P.x,P.y,P.w,P.h, p.x-p.r, p.y-p.r, p.r*2, p.r*2)){
      activatePU(p.type); GPUS=GPUS.filter(pu=>pu!==p);
    }
  }
  gScore+=Math.floor(gSpeed*0.1);
  // Update particles & floats
  PARTS.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; }); PARTS=PARTS.filter(p=>p.life>0);
  FLOATS.forEach(f=>{ f.y+=f.vy; f.life-=f.decay; }); FLOATS=FLOATS.filter(f=>f.life>0);
  // HUD
  document.getElementById('hv-sc').innerText=Math.floor(gScore);
  document.getElementById('hv-co').innerText='💰 '+gCoins;
  if(gBossOn) document.getElementById('boss-fill').style.width=(gBossHP/100*100)+'%';
  const comboEl=document.getElementById('combo-hud');
  if(gCombo>1){ comboEl.style.display='block'; comboEl.innerText=gCombo+'x'; } else comboEl.style.display='none';
}

function bossDefeated(){
  gBossOn=false; gBossWave=false;
  document.getElementById('boss-wrap').style.display='none';
  S.ach.bk = (S.ach.bk||0)+1;
  S.coins += 50; gCoins += 50;
  spawnFloat(P.x,P.y,'#ffd700','+50 BOSS BONUS');
  showToast('BOSS DEFEATED!');
  sv();
}

function die(){
  gState='over';
  S.totalRuns++; S.totalDist+=Math.floor(gDist);
  if(gScore>S.best) S.best=Math.floor(gScore);
  if(gMaxCombo>S.bestCombo) S.bestCombo=gMaxCombo;
  S.totalCoins+=gCoins; S.coins+=gCoins;
  S.runLog.push({score:Math.floor(gScore),coins:gCoins,dist:Math.floor(gDist),zone:gZone});
  if(S.runLog.length>20) S.runLog.shift();
  checkMissions(); checkAchievements();
  sv();
  showScreen('s-over');
}

function revive(){
  if(gReviveUsed && !hasBon('freerevive') && !hasBon('phoenixrevive')) return;
  let cost=200; if(S.upgrades.cheap_revive) cost=100;
  if(hasBon('freerevive') && !gFreeReviveUsed){ cost=0; gFreeReviveUsed=true; }
  if(hasBon('phoenixrevive') && !gReviveUsed){ cost=0; gReviveUsed=true; }
  if(S.coins>=cost){ S.coins-=cost; gReviveUsed=true; gState='playing'; P.y=GND; P.vy=0; P.jumping=false; P.sliding=false; PUS.ghost.on=true; PUS.ghost.t=180; sv(); }
}

function showZoneChange(){
  const el=document.getElementById('zone-hud'); el.innerText=ZONES[gZone].name; el.style.opacity=1; setTimeout(()=>el.style.opacity=0,2000);
}

function jump(){
  if(gState!=='playing') return;
  const maxJ = (hasBon('triplejump')||S.upgrades.triple_jump) ? 3 : 2;
  if(hasBon('highjump')) P.vy = -12; else P.vy = -9;
  if(P.jumpCount<maxJ && !P.sliding){ P.jumping=true; P.jumpCount++; gJumps++; }
}
function slide(){
  if(gState!=='playing') return;
  if(!P.jumping && !P.sliding){ P.sliding=true; P.slideT=hasBon('slide2x')?30:15; P.h=30; }
}
document.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='ArrowUp') jump(); if(e.key==='ArrowDown') slide(); });
document.addEventListener('touchstart',e=>{ e.preventDefault(); const y=e.touches[0].clientY; if(y<window.innerHeight/2) jump(); else slide(); });
document.addEventListener('mousedown',e=>{ e.preventDefault(); if(e.clientY<window.innerHeight/2) jump(); else slide(); });

function render(){ X.clearRect(0,0,W,H); for(let o of GOBS) drawObstacle(o); X.fillStyle='#ffd700'; X.shadowColor='#ffd700'; X.shadowBlur=8; for(let c of COINS){ X.beginPath(); X.arc(c.x,c.y,c.r,0,Math.PI*2); X.fill(); } X.shadowBlur=0; for(let p of GPUS){ X.font='20px sans-serif'; X.fillText(PU_EM[p.type],p.x-10,p.y+7); } drawPlayer(); for(let p of PARTS){ X.globalAlpha=p.life; X.fillStyle=p.color; X.fillRect(p.x,p.y,p.size,p.size); } X.globalAlpha=1; X.font='12px Rajdhani'; for(let f of FLOATS){ X.globalAlpha=f.life; X.fillStyle=f.color; X.fillText(f.text,f.x,f.y); } X.globalAlpha=1; }

function gameLoop(){
  if(gState==='playing'){ updateGame(); render(); }
  drawBG();
  requestAnimationFrame(gameLoop);
}
gameLoop();

// ═══════ UI SCREENS ═══════
function showScreen(id){
  document.querySelectorAll('.scr').forEach(s=>{ s.classList.remove('active'); s.classList.add('hide'); });
  const el=document.getElementById(id); if(el){ el.classList.add('active'); el.classList.remove('hide'); }
  if(id==='s-shop') renderShop();
  else if(id==='s-skins') renderSkins();
  else if(id==='s-lb') renderLB();
  else if(id==='s-missions') renderMissions();
  else if(id==='s-ach') renderAchievements();
  else if(id==='s-settings') renderSettings();
  else if(id==='s-over') renderGameOver();
  else if(id==='s-modes') renderModes();
  else if(id==='s-vip') renderVIP();
}

function startGame(){
  gScore=0; gCoins=0; gDist=0; gSpeed=ZONES[0].spd; gZone=0; gPrevZ=-1;
  gJumps=0; gRunCoins=0; gRunPU=0; gCombo=1; gMaxCombo=1; gComboT=0;
  gBossOn=false; gBossHP=0; gReviveUsed=false; gFreeReviveUsed=false;
  GOBS=[]; COINS=[]; GPUS=[]; PARTS=[]; FLOATS=[];
  P.y=GND; P.vy=0; P.jumping=false; P.sliding=false; P.jumpCount=0; P.slideT=0;
  for(let k in PUS){ PUS[k].on=false; document.getElementById('pt'+PUS[k].i).style.transform='scaleX(0)'; }
  document.getElementById('hud').style.display='block';
  document.getElementById('boss-wrap').style.display='none';
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));
  if(hasBon('ghost')){ PUS.ghost.on=true; PUS.ghost.t=180; }
  if(hasBon('shieldmag')){ PUS.shield.on=true; PUS.shield.t=360; PUS.magnet.on=true; PUS.magnet.t=420; }
  if(hasBon('startice')){ activatePU('ice'); }
  gState='playing';
}

function showToast(msg){
  const t=document.getElementById('toast'); t.innerText=msg; t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

// Achievements/Missions
function checkAchievements(){
  ACH.forEach(a=>{ if(!S.ach[a.id] && a.chk()){ S.ach[a.id]=true; showToast('🏆 '+a.name+' UNLOCKED!'); } });
}
function checkMissions(){
  if(!S.missions||S.mDay!==new Date().toDateString()){ S.missions=MIS_POOL[Math.floor(Math.random()*MIS_POOL.length)]; S.mDay=new Date().toDateString(); }
  const m=S.missions;
  let prog=0;
  switch(m.type){
    case'dist': prog=gDist; break;
    case'coins': prog=gRunCoins; break;
    case'score': prog=gScore; break;
    case'combo': prog=gMaxCombo; break;
    case'jumps': prog=gJumps; break;
    case'runs': prog=S.totalRuns; break;
    case'puC': prog=gRunPU; break;
    case'zone': prog=gZone+1; break;
  }
  if(prog>=m.target){ S.coins+=m.reward; showToast('✅ MISSION COMPLETE: +'+m.reward+' coins'); S.missions=null; sv(); }
}

// ────────── RENDER FUNCTIONS ──────────
function renderShop(){
  let html='<h3 style="color:var(--n);margin:10px 0;">UPGRADES</h3>';
  for(let k in UPGRADES){
    const u=UPGRADES[k];
    const lvl=S.upgrades[k]||0;
    const maxed=lvl>=u.levels;
    const cost= u.base*Math.pow(u.mult, lvl);
    html+=`<div class="card"><div class="em">${u.em}</div><div class="info"><div class="name">${u.name}</div><div class="desc">${lvl}/${u.levels}</div></div>
    ${maxed?'<span class="owned">MAX</span>':`<button class="buy-btn" onclick="buyUpgrade('${k}')">${cost}💰</button>`}</div>`;
  }
  document.getElementById('shop-content').innerHTML=html;
}
function buyUpgrade(k){
  const u=UPGRADES[k]; const lvl=S.upgrades[k]||0; const cost=u.base*Math.pow(u.mult,lvl);
  if(S.coins>=cost && lvl<u.levels){
    S.coins-=cost; S.upgrades[k]=lvl+1; sv(); renderShop(); showToast('Upgraded!');
    S.ach.bu=(S.ach.bu||0)+1;
  }
}
function renderSkins(){
  let html='<h3 style="color:var(--n);margin:10px 0;">SKINS</h3>';
  for(let k in SKINS){
    const s=SKINS[k]; const owned=S.skins.includes(k); const eq=S.skin===k;
    html+=`<div class="card" style="border-color:${eq?'var(--g)':'rgba(255,255,255,0.08)'}">
      <div class="em">${s.em}</div>
      <div class="info"><div class="name">${s.name} ${s.rar.toUpperCase()}</div><div class="desc">${s.desc}</div></div>
      ${owned?`<button class="buy-btn" onclick="equipSkin('${k}')">${eq?'✔️':'USE'}</button>`
      :`<button class="buy-btn" onclick="buySkin('${k}')">${s.price}💰</button>`}
    </div>`;
  }
  document.getElementById('skins-content').innerHTML=html;
}
function buySkin(k){
  const s=SKINS[k]; if(S.coins>=s.price && !S.skins.includes(k)){
    S.coins-=s.price; S.skins.push(k); sv(); renderSkins(); showToast('Skin bought!');
    S.ach.bu=(S.ach.bu||0)+1;
  }
}
function equipSkin(k){ S.skin=k; sv(); renderSkins(); }
function renderLB(){
  document.getElementById('lb-content').innerHTML=`<h3 style="color:var(--n)">LEADERBOARD</h3><p style="color:white">Your Best: ${S.best}</p>
  <button class="btn sm" onclick="fetchLeaderboard()">🔄 Refresh</button>
  <div id="lb-list" style="margin-top:10px;color:white;">Loading...</div>`;
  fetchLeaderboard();
}
function fetchLeaderboard(){
  // Simulated leaderboard
  setTimeout(()=>{
    document.getElementById('lb-list').innerHTML=`<p>1. PlayerOne - 12500</p><p>2. ShadowKing - 9800</p><p>3. You - ${S.best}</p>`;
  },200);
}
function renderMissions(){
  if(!S.missions) S.missions=MIS_POOL[Math.floor(Math.random()*MIS_POOL.length)];
  const m=S.missions;
  document.getElementById('missions-content').innerHTML=`<div class="card"><div class="em">${m.em}</div><div class="info"><div class="name">${m.name}</div><div class="desc">${m.desc} - Reward: ${m.reward}💰</div></div></div>`;
}
function renderAchievements(){
  let html='<h3 style="color:var(--n)">ACHIEVEMENTS</h3>';
  ACH.forEach(a=>{ const done=S.ach[a.id]; html+=`<div class="card" style="opacity:${done?1:0.5}"><div class="em">${a.em}</div><div class="info"><div class="name">${a.name}</div><div class="desc">${a.desc}</div></div>${done?'✅':''}</div>`; });
  document.getElementById('ach-content').innerHTML=html;
}
function renderSettings(){
  document.getElementById('settings-content').innerHTML=`<h3 style="color:var(--n)">SETTINGS</h3>
  <button class="btn sm" onclick="S.settings.particles=!S.settings.particles; renderSettings();">Particles: ${S.settings.particles?'ON':'OFF'}</button>`;
}
function renderGameOver(){
  document.getElementById('over-content').innerHTML=`
    <h2 style="color:var(--a)">GAME OVER</h2>
    <p style="color:white">Score: ${Math.floor(gScore)}</p>
    <p style="color:white">Best: ${S.best}</p>
    <button class="btn" onclick="startGame()">↻ RETRY</button>
    ${(!gReviveUsed||hasBon('freerevive')||hasBon('phoenixrevive'))?`<button class="btn" onclick="revive()">💊 REVIVE</button>`:''}
    <button class="btn" onclick="showScreen('s-home')">🏠 HOME</button>`;
}
function renderModes(){
  document.getElementById('modes-content').innerHTML=`
    <h3 style="color:var(--n)">GAME MODES</h3>
    <button class="btn" onclick="startGame()">CLASSIC</button>
    <p style="color:gray">More coming soon!</p>`;
}
function renderVIP(){
  document.getElementById('vip-content').innerHTML=`<h3 style="color:var(--g)">VIP STATUS</h3>
  <p style="color:white">VIP: ${S.vip?'✅ ACTIVE':'❌ NOT ACTIVE'}</p>
  ${!S.vip?`<button class="btn" onclick="S.vip=true; sv(); renderVIP();">ACTIVATE VIP</button>`:''}`;
}

// Daily reward
function checkDaily(){
  const today=new Date().toDateString();
  if(S.lastLogin!==today){
    S.streak = (S.lastLogin===new Date(Date.now()-86400000).toDateString())? S.streak+1 : 1;
    S.lastLogin=today;
    document.getElementById('daily-overlay').classList.add('show');
    renderDaily();
    sv();
  }
}
function claimDaily(){
  S.coins+=S.streak*20;
  document.getElementById('daily-overlay').classList.remove('show');
  showToast('+'+S.streak*20+' coins!');
  sv();
}
function renderDaily(){
  document.getElementById('streak-lbl').innerText='LOGIN STREAK: '+S.streak+' DAY';
  let grid='';
  for(let i=1;i<=4;i++){ let cls='daily-item'; if(i<S.streak) cls+=' claimed'; if(i===S.streak) cls+=' current'; grid+=`<div class="${cls}">Day ${i}<br>+${i*20}💰</div>`; }
  document.getElementById('daily-grid').innerHTML=grid;
}

// Init
window.onload=function(){
  checkDaily();
  showScreen('s-home');
};
</script>
