<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aether Chase — Celestial Pursuit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0f1e 0%, #03050a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', 'Poppins', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(90, 180, 255, 0.2);
            border-radius: 32px;
            background: rgba(5, 12, 25, 0.6);
            backdrop-filter: blur(2px);
            padding: 16px 20px 20px 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #2c3f66, 0 18px 30px rgba(0,0,0,0.6);
            cursor: none;
            background: #03070f;
        }

        .info-panel {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 20px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid rgba(100, 180, 255, 0.4);
        }

        .stats {
            display: flex;
            gap: 28px;
            font-weight: bold;
        }

        .score-box, .high-box {
            background: #010a1a;
            padding: 5px 18px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 2px 5px rgba(0,255,255,0.2);
        }

        .score-box span, .high-box span {
            color: #8dc9ff;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .score-value, .high-value {
            color: #f2ea7a;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 5px #ffd966;
        }

        .restart-btn {
            background: linear-gradient(135deg, #1f3b5c, #0a1a2f);
            border: none;
            color: #c0e0ff;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        .restart-btn:hover {
            background: linear-gradient(135deg, #2c5580, #132c44);
            color: white;
            transform: scale(1.02);
            box-shadow: 0 0 10px #3f9eff;
        }

        .controls {
            font-size: 0.7rem;
            color: #8aaec0;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 48px;
            display: flex;
            gap: 20px;
            font-family: monospace;
        }

        .controls i {
            font-style: normal;
            background: #0e1a28;
            padding: 2px 10px;
            border-radius: 30px;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 2px #ffd966; }
            100% { text-shadow: 0 0 12px #ffb347; }
        }

        .gameover-tag {
            animation: pulse 0.8s infinite alternate;
        }
        
        @media (max-width: 880px) {
            .score-value, .high-value { font-size: 1.4rem; }
            .info-panel { padding: 6px 16px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="score-box"><span>⚡ AETHER</span><span class="score-value" id="scoreValue">0</span></div>
                <div class="high-box"><span>🏆 RECORD</span><span class="high-value" id="highScoreValue">0</span></div>
            </div>
            <button class="restart-btn" id="restartButton">⟳ CHASE AGAIN</button>
            <div class="controls">
                <span>🡄 🡅 🡆 🡇</span>
                <span>W A S D</span>
                <span>⚡ R = RESTART</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- GAME DIMENSIONS ----------
        const W = 900, H = 650;
        canvas.width = W;
        canvas.height = H;
        
        // ---------- GAME OBJECTS ----------
        let player = {
            x: W/2,
            y: H/2,
            radius: 16
        };
        
        let enemy = {
            x: 180,
            y: 180,
            radius: 22
        };
        
        let aetherList = [];
        const AETHER_COUNT = 9;
        const AETHER_RADIUS = 8;
        
        // particles for juicy feedback
        let particles = [];
        
        // game state
        let playing = true;
        let score = 0;
        let highScore = 0;
        
        // dynamic enemy speed (units per second)
        let enemyBaseSpeed = 210;    // will be scaled by score
        
        // player movement speed (units per second)
        const PLAYER_SPEED = 420;
        
        // key tracking
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        // load highscore from storage
        try {
            const saved = localStorage.getItem('aetherChaseHigh');
            if(saved && !isNaN(parseInt(saved))) highScore = parseInt(saved);
        } catch(e) { /* quiet */ }
        updateScoreUI();
        
        // ---------- HELPER FUNCTIONS ----------
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('highScoreValue').innerText = highScore;
        }
        
        // check collision with player and enemy (strict)
        function isCollidingWithPlayer(objX, objY, objRad) {
            const dx = player.x - objX;
            const dy = player.y - objY;
            const dist = Math.hypot(dx, dy);
            return dist < player.radius + objRad;
        }
        
        function isCollidingWithEnemy(objX, objY, objRad) {
            const dx = enemy.x - objX;
            const dy = enemy.y - objY;
            const dist = Math.hypot(dx, dy);
            return dist < enemy.radius + objRad;
        }
        
        // safe random position for aether (avoid overlap with player, enemy, and other aether)
        function getSafeAetherPosition(avoidOtherAether = true, existingAether = null) {
            let safe = false;
            let attempts = 0;
            let newX, newY;
            const minDistToPlayer = player.radius + AETHER_RADIUS + 8;
            const minDistToEnemy = enemy.radius + AETHER_RADIUS + 8;
            
            while(!safe && attempts < 200) {
                newX = AETHER_RADIUS + Math.random() * (W - AETHER_RADIUS * 2);
                newY = AETHER_RADIUS + Math.random() * (H - AETHER_RADIUS * 2);
                let conflict = false;
                
                // check player / enemy
                const distToPlayer = Math.hypot(newX - player.x, newY - player.y);
                const distToEnemy = Math.hypot(newX - enemy.x, newY - enemy.y);
                if(distToPlayer < minDistToPlayer) conflict = true;
                if(distToEnemy < minDistToEnemy) conflict = true;
                
                // check other aether positions to avoid stacking
                if(!conflict && avoidOtherAether && aetherList) {
                    for(let a of aetherList) {
                        if(a && Math.hypot(newX - a.x, newY - a.y) < AETHER_RADIUS * 2 + 5) {
                            conflict = true;
                            break;
                        }
                    }
                }
                if(!conflict) safe = true;
                attempts++;
            }
            return { x: newX, y: newY };
        }
        
        // spawn or respawn a specific aether by index
        function respawnAether(index) {
            const safePos = getSafeAetherPosition(true);
            aetherList[index].x = safePos.x;
            aetherList[index].y = safePos.y;
            aetherList[index].active = true;
        }
        
        // initialize all aether orbs
        function initAether() {
            const newAether = [];
            for(let i = 0; i < AETHER_COUNT; i++) {
                newAether.push({ x: 0, y: 0, radius: AETHER_RADIUS, active: true });
            }
            aetherList = newAether;
            // manually assign positions with safe avoidance
            for(let i = 0; i < AETHER_COUNT; i++) {
                const safePos = getSafeAetherPosition(true);
                aetherList[i].x = safePos.x;
                aetherList[i].y = safePos.y;
            }
        }
        
        // add sparkling particles on collection
        function addCollectionParticles(px, py) {
            const count = 14;
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 140 + 60;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push({
                    x: px, y: py,
                    vx: vx, vy: vy,
                    life: 0.7,
                    maxLife: 0.7,
                    size: Math.random() * 4 + 2,
                    color: `hsl(${45 + Math.random() * 30}, 100%, 65%)`
                });
            }
        }
        
        // game reset function
        function fullReset() {
            playing = true;
            score = 0;
            updateScoreUI();
            // reset positions
            player.x = W/2;
            player.y = H/2;
            enemy.x = 180;
            enemy.y = 180;
            // avoid initial overlap
            if(Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius + 15) {
                enemy.x = 120;
                enemy.y = 140;
            }
            // reinitialize aether
            initAether();
            // extra safety: make sure no aether overlaps player/enemy on reset
            for(let i=0; i<aetherList.length; i++) {
                let a = aetherList[i];
                if(isCollidingWithPlayer(a.x, a.y, AETHER_RADIUS) || isCollidingWithEnemy(a.x, a.y, AETHER_RADIUS)) {
                    const safePos = getSafeAetherPosition(true);
                    a.x = safePos.x;
                    a.y = safePos.y;
                }
            }
            particles = [];
            // update high score display
            if(highScore < 0) highScore = 0;
            document.getElementById('highScoreValue').innerText = highScore;
        }
        
        // COLLECTION & SCORE LOGIC
        function handleAetherCollection(deltaTime) {
            for(let i = 0; i < aetherList.length; i++) {
                const a = aetherList[i];
                if(!a.active) continue;
                const distToPlayer = Math.hypot(player.x - a.x, player.y - a.y);
                if(distToPlayer < player.radius + AETHER_RADIUS) {
                    // collect !
                    score += 10;
                    updateScoreUI();
                    // spawn particles for VFX
                    addCollectionParticles(a.x, a.y);
                    // respawn aether at new safe location
                    respawnAether(i);
                    
                    // update highscore
                    if(score > highScore) {
                        highScore = score;
                        updateScoreUI();
                        try {
                            localStorage.setItem('aetherChaseHigh', highScore);
                        } catch(e) {}
                    }
                }
            }
        }
        
        // enemy movement (chase player) + dynamic speed based on score
        function updateEnemy(deltaTime) {
            if(!playing) return;
            // dynamic speed: base 210 + 0.45 per point, capped at 470
            let dynamicSpeed = Math.min(470, 210 + score * 0.42);
            // Ensure at least 200
            if(dynamicSpeed < 200) dynamicSpeed = 200;
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const len = Math.hypot(dx, dy);
            if(len > 0.01) {
                const move = dynamicSpeed * deltaTime;
                const stepX = (dx / len) * move;
                const stepY = (dy / len) * move;
                enemy.x += stepX;
                enemy.y += stepY;
            }
            // boundary clamp for enemy (with radius)
            enemy.x = Math.min(Math.max(enemy.x, enemy.radius), W - enemy.radius);
            enemy.y = Math.min(Math.max(enemy.y, enemy.radius), H - enemy.radius);
        }
        
        // player movement (keyboard)
        function updatePlayer(deltaTime) {
            if(!playing) return;
            let moveX = 0, moveY = 0;
            if(keys.ArrowUp || keys.w) moveY -= 1;
            if(keys.ArrowDown || keys.s) moveY += 1;
            if(keys.ArrowLeft || keys.a) moveX -= 1;
            if(keys.ArrowRight || keys.d) moveX += 1;
            
            if(moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
                const step = PLAYER_SPEED * deltaTime;
                let newX = player.x + moveX * step;
                let newY = player.y + moveY * step;
                // boundaries
                newX = Math.min(Math.max(newX, player.radius), W - player.radius);
                newY = Math.min(Math.max(newY, player.radius), H - player.radius);
                player.x = newX;
                player.y = newY;
            }
        }
        
        // collision player vs enemy -> game over
        function checkGameOver() {
            if(!playing) return true;
            const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if(dist < player.radius + enemy.radius) {
                playing = false;
                return true;
            }
            return false;
        }
        
        // ---------- PARTICLE SYSTEM ----------
        function updateParticles(deltaTime) {
            for(let i=0; i<particles.length; i++) {
                particles[i].x += particles[i].vx * deltaTime;
                particles[i].y += particles[i].vy * deltaTime;
                particles[i].life -= deltaTime * 1.8;
                if(particles[i].life <= 0 || particles[i].x < -50 || particles[i].x > W+50 || particles[i].y < -50 || particles[i].y > H+50) {
                    particles.splice(i,1);
                    i--;
                }
            }
        }
        
        // ---------- GRAPHICS (stunning aether chase visual) ----------
        function drawBackground() {
            // deep cosmic gradient
            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, '#03071e');
            grad.addColorStop(0.5, '#0a1128');
            grad.addColorStop(1, '#03050f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            // stars
            for(let i=0; i<300; i++) {
                if(i%2 === 0) continue; // random but cached positions
                let sx = (i * 131) % W;
                let sy = (i * 253) % H;
                ctx.fillStyle = `rgba(255,240,200,${0.3+Math.sin(Date.now()*0.001+i)*0.2})`;
                ctx.beginPath();
                ctx.arc(sx, sy, 1+ (i%3), 0, Math.PI*2);
                ctx.fill();
            }
            // subtle nebula effect
            ctx.globalCompositeOperation = 'lighter';
            for(let i=0;i<6;i++) {
                ctx.beginPath();
                ctx.arc(W*0.3 + Math.sin(Date.now()*0.0005)*20, H*0.6, 120, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(70, 130, 200, 0.03)';
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        
        function drawPlayer() {
            // glowing orb + runic traces
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#5bd6ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-1, 0, Math.PI*2);
            const grad = ctx.createRadialGradient(player.x-4, player.y-4, 3, player.x, player.y, player.radius);
            grad.addColorStop(0, '#ebf5ff');
            grad.addColorStop(0.7, '#3c9eff');
            grad.addColorStop(1, '#0f2b55');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius-4, 0, Math.PI*2);
            ctx.fillStyle = "#aaffdd";
            ctx.fill();
            // eye of the chaser
            ctx.beginPath();
            ctx.arc(player.x-4, player.y-3, 3, 0, Math.PI*2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.fillStyle = "#010a2a";
            ctx.beginPath();
            ctx.arc(player.x-5, player.y-4, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawEnemy() {
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ff2266";
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius-2, 0, Math.PI*2);
            const grad = ctx.createRadialGradient(enemy.x-5, enemy.y-5, 4, enemy.x, enemy.y, enemy.radius);
            grad.addColorStop(0, '#b01b5e');
            grad.addColorStop(1, '#3a061f');
            ctx.fillStyle = grad;
            ctx.fill();
            // menacing eye
            ctx.beginPath();
            ctx.arc(enemy.x+3, enemy.y-2, 5, 0, Math.PI*2);
            ctx.fillStyle = "#f02266";
            ctx.fill();
            ctx.fillStyle = "#030000";
            ctx.beginPath();
            ctx.arc(enemy.x+5, enemy.y-3, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawAether() {
            for(let a of aetherList) {
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#f0c674";
                ctx.beginPath();
                // diamond shape / star crystal
                for(let i=0;i<4;i++) {
                    let angle = Date.now() * 0.008 + i * Math.PI/2;
                    let rad = AETHER_RADIUS + Math.sin(Date.now() * 0.015 + i) * 2;
                    let xOff = Math.cos(angle) * rad;
                    let yOff = Math.sin(angle) * rad;
                    if(i===0) ctx.moveTo(a.x + xOff, a.y + yOff);
                    else ctx.lineTo(a.x + xOff, a.y + yOff);
                }
                ctx.closePath();
                const glow = `hsl(${45 + Math.sin(Date.now()*0.01)*10}, 90%, 65%)`;
                ctx.fillStyle = glow;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(a.x, a.y, AETHER_RADIUS-2, 0, Math.PI*2);
                ctx.fillStyle = "#ffe6aa";
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.globalAlpha = p.life / p.maxLife * 0.9;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function drawGameOverlay() {
            if(!playing) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, W, H);
                ctx.font = "bold 42px 'Orbitron', monospace";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ffbc6e";
                ctx.textAlign = "center";
                ctx.fillText("✦ GAME OVER ✦", W/2, H/2 - 50);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#b9e2ff";
                ctx.fillText("press [ R ]  or click  ⟳  to chase again", W/2, H/2 + 40);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#d0eaff";
                ctx.fillText("the shadow consumes the light... reclaim the aether", W/2, H/2 + 100);
                ctx.textAlign = "left";
            }
        }
        
        // main update logic with delta time
        let lastTimestamp = 0;
        function gameUpdate(now) {
            if(!lastTimestamp) {
                lastTimestamp = now;
                requestAnimationFrame(gameUpdate);
                return;
            }
            let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
            if(dt <= 0) {
                lastTimestamp = now;
                requestAnimationFrame(gameUpdate);
                return;
            }
            lastTimestamp = now;
            
            if(playing) {
                updatePlayer(dt);
                updateEnemy(dt);
                handleAetherCollection(dt);
                checkGameOver();
                updateParticles(dt);
            } else {
                updateParticles(dt);
            }
            
            // RENDER EVERYTHING
            drawBackground();
            drawAether();
            drawEnemy();
            drawPlayer();
            drawParticles();
            drawGameOverlay();
            
            // extra UI hint (speed/energy)
            if(playing) {
                ctx.font = "12px monospace";
                ctx.fillStyle = "#aad4ff";
                ctx.shadowBlur = 0;
                ctx.fillText("✦ evade the crimson shadow | gather luminous aether ✦", 20, 35);
                let enemySpeedValue = Math.min(470, 210 + score * 0.42).toFixed(0);
                ctx.fillText(`pursuit intensity: ${enemySpeedValue}`, W-150, 35);
            }
            requestAnimationFrame(gameUpdate);
        }
        
        // ---------- KEYBOARD HANDLING ----------
        function handleKeyDown(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = true;
                e.preventDefault();
            }
            // R restart
            if(key === 'r' || key === 'R') {
                e.preventDefault();
                fullReset();
                playing = true;  // ensure active
            }
            // also if game over, any restart key works
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if(keys.hasOwnProperty(key)) {
                keys[key] = false;
                e.preventDefault();
            }
        }
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // restart button logic
        const restartBtn = document.getElementById('restartButton');
        restartBtn.addEventListener('click', () => {
            fullReset();
            playing = true;
        });
        
        // prevent touch context menu & canvas context
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // initialize game
        fullReset();   // sets aether, positions, score=0
        playing = true;
        
        // start loop
        requestAnimationFrame(gameUpdate);
    })();
</script>
</body>
</html>
