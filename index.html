<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VOID RUNNER: Abyss Protocol - Ultimate Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { overflow: hidden; background: #050510; font-family: 'Courier New', monospace; color: #0ff; width: 100vw; height: 100vh; position: fixed; }
        #gameContainer { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #050510; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ui-layer > * { pointer-events: auto; }
        #mainMenu { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050510; z-index: 100; position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; }
        .menu-title { font-size: 2rem; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 0.5rem; text-align: center; }
        .menu-subtitle { color: #888; margin-bottom: 1rem; font-size: 0.8rem; text-align: center; }
        .menu-btn { background: rgba(0,255,255,0.2); border: 2px solid #0ff; color: #0ff; padding: 10px 20px; margin: 5px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .menu-btn:hover { background: rgba(0,255,255,0.4); transform: scale(1.02); }
        .menu-btn.premium { border-color: gold; color: gold; }
        #hud { display: none; padding: 10px; position: absolute; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 15; font-size: 0.8rem; }
        .hud-bar { display: inline-block; margin: 0 8px; }
        .health-bar, .energy-bar { display: inline-block; width: 100px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-left: 5px; }
        .health-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #f00, #ff6600); }
        .energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #0ff, #00ffff); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; overflow-y: auto; }
        .overlay.active { display: flex; }
        .overlay-title { font-family: 'Courier New', monospace; font-size: 1.8rem; color: #0ff; margin-bottom: 1rem; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 700px; max-height: 60vh; overflow-y: auto; }
        .grid-item { background: rgba(0,255,255,0.1); border: 1px solid #0ff; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .grid-item:hover { background: rgba(0,255,255,0.2); transform: scale(1.02); }
        #notificationArea { position: absolute; top: 80px; right: 10px; z-index: 60; max-width: 250px; }
        .notification { background: rgba(0,0,0,0.9); border-left: 4px solid #0ff; padding: 8px 12px; margin: 5px; border-radius: 0 8px 8px 0; animation: slideIn 0.3s ease-out; font-size: 0.8rem; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        #comboDisplay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; color: #0ff; text-shadow: 0 0 20px #0ff; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 45; white-space: nowrap; }
        #comboDisplay.show { opacity: 1; }
        .floating-text { position: absolute; font-size: 1rem; color: gold; pointer-events: none; animation: floatUp 1s forwards; z-index: 55; font-weight: bold; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        .damage-number { position: absolute; font-size: 1rem; color: #f00; pointer-events: none; animation: damageFloat 1s forwards; z-index: 55; font-weight: bold; }
        @keyframes damageFloat { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050510; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        .loading-bar { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loading-fill { height: 100%; width: 0%; background: #0ff; animation: loadingAnim 1.5s ease-in-out infinite; }
        @keyframes loadingAnim { 0% { width: 0%; } 50% { width: 100%; } 100% { width: 0%; } }
        #minimap { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 100px; background: rgba(0,0,0,0.7); border: 1px solid #0ff; border-radius: 8px; z-index: 20; }
        #weaponWheel { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0); width: 160px; height: 160px; background: rgba(0,0,0,0.9); border: 2px solid #0ff; border-radius: 50%; transition: transform 0.2s; z-index: 40; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
        #weaponWheel.active { transform: translateX(-50%) scale(1); }
        .weapon-slot { position: absolute; width: 45px; height: 45px; background: rgba(0,255,255,0.2); border: 1px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; }
        @media (max-width: 600px) { .menu-title { font-size: 1.3rem; } .menu-btn { padding: 8px 16px; font-size: 0.7rem; } .grid-container { grid-template-columns: repeat(2, 1fr); } .hud-bar { margin: 0 4px; font-size: 0.7rem; } .health-bar, .energy-bar { width: 60px; } }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap" width="150" height="100"></canvas>
    <div id="weaponWheel"><div class="weapon-slot" style="top:10px; left:57px;" onclick="window.game.selectWeapon(0)">1</div><div class="weapon-slot" style="bottom:10px; left:57px;" onclick="window.game.selectWeapon(1)">2</div><div class="weapon-slot" style="top:57px; left:10px;" onclick="window.game.selectWeapon(2)">3</div><div class="weapon-slot" style="top:57px; right:10px;" onclick="window.game.selectWeapon(3)">4</div></div>
    <div id="loadingScreen"><div class="menu-title">VOID RUNNER</div><div>INITIALIZING SYSTEMS...</div><div class="loading-bar"><div class="loading-fill"></div></div></div>
    
    <div id="mainMenu" class="ui-layer">
        <div class="menu-title">VOID RUNNER</div>
        <div class="menu-subtitle">ABYSS PROTOCOL v3.0.1</div>
        <button class="menu-btn" onclick="window.game.startStory()">▶ STORY MODE</button>
        <button class="menu-btn" onclick="window.game.startEndless()">∞ ENDLESS MODE</button>
        <button class="menu-btn" onclick="window.game.openArmory()">⚔ ARMORY</button>
        <button class="menu-btn" onclick="window.game.openSkillTree()">✦ SKILL TREE</button>
        <button class="menu-btn" onclick="window.game.openCrafting()">⚒ CRAFTING</button>
        <button class="menu-btn" onclick="window.game.openQuests()">📜 QUESTS</button>
        <button class="menu-btn" onclick="window.game.openAchievements()">🏆 ACHIEVEMENTS</button>
        <button class="menu-btn" onclick="window.game.openLeaderboard()">📊 LEADERBOARD</button>
        <button class="menu-btn" onclick="window.game.openGuild()">⚜ GUILD</button>
        <button class="menu-btn" onclick="window.game.openTournament()">🏁 TOURNAMENT</button>
        <button class="menu-btn" onclick="window.game.openBattlePass()">🎫 BATTLE PASS</button>
        <button class="menu-btn" onclick="window.game.openDaily()">🎁 DAILY REWARDS</button>
        <button class="menu-btn" onclick="window.game.openSettings()">⚙ SETTINGS</button>
        <button class="menu-btn premium" onclick="window.game.showPremium()">👑 PREMIUM</button>
        <button class="menu-btn" onclick="window.game.openIAPShop()">💎 SHOP</button>
        <button class="menu-btn" onclick="window.game.showAdRewardMenu()">📺 FREE REWARDS</button>
    </div>
    
    <div id="hud" class="ui-layer">
        <span class="hud-bar">❤️ <span id="healthVal">100</span></span>
        <span class="hud-bar">⚡ <span id="energyVal">100</span></span>
        <span class="hud-bar">💰 <span id="coinVal">0</span></span>
        <span class="hud-bar">💎 <span id="gemVal">0</span></span>
        <span class="hud-bar">🎯 <span id="scoreVal">0</span></span>
        <span class="hud-bar">🌊 <span id="waveVal">0</span></span>
        <span class="hud-bar">📊 Lv.<span id="levelVal">1</span></span>
    </div>
    
    <div id="pauseMenu" class="overlay"><div class="overlay-title">PAUSED</div><button class="menu-btn" onclick="window.game.resume()">RESUME</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="gameOver" class="overlay"><div class="overlay-title">GAME OVER</div><div id="finalScore" style="margin:10px">Score: 0</div><button class="menu-btn" onclick="window.game.restart()">TRY AGAIN</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="levelComplete" class="overlay"><div class="overlay-title">LEVEL COMPLETE</div><div id="levelRewards" style="margin:10px"></div><button class="menu-btn" onclick="window.game.nextLevel()">NEXT</button><button class="menu-btn" onclick="window.game.showMenu()">MENU</button></div>
    <div id="armory" class="overlay"><div class="overlay-title">ARMORY</div><div class="grid-container" id="armoryGrid"></div><button class="menu-btn" onclick="window.game.closeArmory()">CLOSE</button></div>
    <div id="skillTree" class="overlay"><div class="overlay-title">SKILL TREE</div><div>Points: <span id="skillPoints">0</span></div><canvas id="skillCanvas" width="600" height="400" style="border:1px solid #0ff; max-width:90%; background:#000;"></canvas><div id="skillDesc" style="color:#888; margin:10px; text-align:center;"></div><button class="menu-btn" onclick="window.game.closeSkillTree()">CLOSE</button></div>
    <div id="crafting" class="overlay"><div class="overlay-title">CRAFTING</div><div>Materials: <span id="materialDisplay"></span></div><div class="grid-container" id="craftingGrid"></div><button class="menu-btn" onclick="window.game.closeCrafting()">CLOSE</button></div>
    <div id="notificationArea"></div>
    <div id="comboDisplay"></div>
</div>

    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
    
    setupInput() {
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (e.code === 'Escape') this.pause();
            if (e.code === 'KeyR') this.fireSpecial();
            if (e.code === 'KeyQ') this.cycleWeapon(-1);
            if (e.code === 'KeyF') this.cycleWeapon(1);
            if (e.code === 'KeyW' || e.code === 'KeyWheel') this.showWeaponWheel();
        });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; if (e.code === 'KeyW') this.hideWeaponWheel(); });
        this.canvas.addEventListener('mousedown', (e) => { this.mouse.down = true; this.mouse.x = e.clientX; this.mouse.y = e.clientY; if (this.state === 'playing') this.fire(); });
        this.canvas.addEventListener('mouseup', () => { this.mouse.down = false; });
        this.canvas.addEventListener('mousemove', (e) => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; });
        this.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); this.touch.active = true; this.touch.x = e.touches[0].clientX; this.touch.y = e.touches[0].clientY; if (this.state === 'playing') this.fire(); });
        this.canvas.addEventListener('touchend', () => { this.touch.active = false; });
        this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (e.touches.length > 0) { this.touch.x = e.touches[0].clientX; this.touch.y = e.touches[0].clientY; } });
    }
    
    showWeaponWheel() { document.getElementById('weaponWheel').classList.add('active'); }
    hideWeaponWheel() { document.getElementById('weaponWheel').classList.remove('active'); }
    selectWeapon(index) { if (index < this.player.weapons.length) { this.player.weapon = this.player.weapons[index]; this.player.currentWeaponIndex = index; this.showNotification('Equipped: ' + this.weaponDefs[this.player.weapon].name, 'rare'); this.hideWeaponWheel(); } }
    
    loadGameData() {
        try {
            let saved = localStorage.getItem('voidRunner_save');
            if (saved) {
                let data = JSON.parse(saved);
                this.coins = data.coins || 100;
                this.gems = data.gems || 10;
                this.skillPoints = data.skillPoints || 0;
                this.skills = data.skills || {};
                this.materials = data.materials || { scrap: 0, crystal: 0, essence: 0, core: 0 };
                this.player.level = data.playerLevel || 1;
                this.player.xp = data.playerXp || 0;
                this.player.weapons = data.weapons || ['blaster'];
                this.player.skins = data.skins || ['default'];
                this.player.skin = data.skin || 'default';
                this.dailyStreak = data.dailyStreak || 0;
            }
        } catch(e) {}
    }
    
    saveGameData() {
        let data = {
            coins: this.coins, gems: this.gems, skillPoints: this.skillPoints, skills: this.skills,
            materials: this.materials, playerLevel: this.player.level, playerXp: this.player.xp,
            weapons: this.player.weapons, skins: this.player.skins, skin: this.player.skin,
            dailyStreak: this.dailyStreak
        };
        localStorage.setItem('voidRunner_save', JSON.stringify(data));
    }
    
    // ========== GAME STATE METHODS ==========
    startStory() { this.mode = 'story'; this.currentLevel = 1; this.chapter = 1; this.startLevel(); this.showNotification('Story Mode Started!', 'legendary'); }
    startEndless() { this.mode = 'endless'; this.currentLevel = 1; this.startLevel(); this.showNotification('Endless Mode Started!', 'legendary'); }
    
    startLevel() {
        this.state = 'playing';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        this.enemies = [];
        this.bosses = [];
        this.projectiles = [];
        this.particles = [];
        this.collectibles = [];
        this.platforms = [];
        this.wave = 1;
        this.spawnTimer = 0;
        this.score = 0;
        this.player.x = 100;
        this.player.y = 300;
        this.player.vx = 0;
        this.player.vy = 0;
        this.player.health = this.player.maxHealth;
        this.player.energy = this.player.maxEnergy;
        this.player.shield = 0;
        this.player.buffs = [];
        this.player.debuffs = [];
        this.player.invincible = 0;
        this.player.combo = 0;
        this.generateLevel();
        this.updateHUD();
        this.showNotification(`Level ${this.currentLevel} - ${this.getBiomeName()}`, 'epic');
    }
    
    getBiomeName() {
        let biomes = { neon_city: 'Neon City', scrapyard: 'Steel Graveyard', shadow_realm: 'Shadow Realm', crystal_cave: 'Crystal Depths', mech_factory: 'Mech Factory', void_heart: 'Void Heart', protocol_lab: 'Protocol Lab', eternal_void: 'Eternal Void' };
        return biomes[this.biome] || 'Neon City';
    }
    
    generateLevel() {
        this.levelWidth = 2000 + this.currentLevel * 300;
        this.platforms = [];
        this.platforms.push({ x: 0, y: this.canvas.height - 50, width: this.levelWidth, height: 50 });
        let platformCount = 8 + Math.floor(Math.random() * 8);
        for (let i = 0; i < platformCount; i++) {
            this.platforms.push({
                x: 100 + Math.random() * (this.levelWidth - 200),
                y: 150 + Math.random() * (this.canvas.height - 250),
                width: 60 + Math.random() * 100,
                height: 20
            });
        }
        let chapter = this.storyChapters[(this.chapter - 1) % this.storyChapters.length];
        this.biome = chapter ? chapter.biome : 'neon_city';
    }
    
    pause() { if (this.state === 'playing') { this.state = 'paused'; document.getElementById('pauseMenu').classList.add('active'); } }
    resume() { this.state = 'playing'; document.getElementById('pauseMenu').classList.remove('active'); }
    restart() { this.deaths++; this.startLevel(); document.getElementById('gameOver').classList.remove('active'); document.getElementById('levelComplete').classList.remove('active'); }
    
    nextLevel() {
        this.currentLevel++;
        if (this.mode === 'story' && this.currentLevel > (this.storyChapters[(this.chapter - 1) % this.storyChapters.length]?.levels || 3)) {
            this.chapter++;
            this.currentLevel = 1;
            this.showNotification(`Chapter ${this.chapter} Unlocked!`, 'legendary');
        }
        this.startLevel();
        document.getElementById('levelComplete').classList.remove('active');
    }
    
    gameOver() {
        this.state = 'gameover';
        document.getElementById('gameOver').classList.add('active');
        document.getElementById('finalScore').innerHTML = `Score: ${this.score}<br>Kills: ${this.totalKills}<br>Best Combo: ${this.bestCombo}`;
        this.saveGameData();
        this.showNotification('Game Over!', 'epic');
    }
    
    levelComplete() {
        this.state = 'levelcomplete';
        document.getElementById('levelComplete').classList.add('active');
        let rewardCoins = 100 * this.currentLevel;

        this.coins += rewardCoins;

        document.getElementById('levelRewards').innerHTML = `+${rewardCoins} Coins, +${rewardGems} Gems, +${100 * this.currentLevel} XP`;

    // ========== COMBAT METHODS ==========
    fire() {
        let w = this.weaponDefs[this.player.weapon];
        if (!w) return;
        let energyCost = 5;
        if (this.player.energy < energyCost) return;
        this.player.energy -= energyCost;
        
        let tx = (this.mouse.x || this.touch.x) + this.camera.x;
        let ty = (this.mouse.y || this.touch.y) + this.camera.y;
        
        if (this.settings.autoAim && this.enemies.length > 0) {
            let nearest = null, nearestDist = Infinity;
            this.enemies.forEach(e => {
                let d = Math.hypot(e.x - (this.player.x + 16), e.y - (this.player.y + 20));
                if (d < nearestDist && d < 300) { nearestDist = d; nearest = e; }
            });
            if (nearest) { tx = nearest.x; ty = nearest.y; }
        }
        
        let dx = tx - (this.player.x + 16);
        let dy = ty - (this.player.y + 20);
        let dist = Math.hypot(dx, dy);
        if (dist < 0.1) return;
        dx /= dist; dy /= dist;
        
        let pellets = w.pellets || 1;
        for (let i = 0; i < pellets; i++) {
            let angle = Math.atan2(dy, dx);
            if (w.spread) angle += (Math.random() - 0.5) * w.spread;
            let proj = {
                x: this.player.x + 16, y: this.player.y + 20,
                vx: Math.cos(angle) * (w.projectileSpeed || 10),
                vy: Math.sin(angle) * (w.projectileSpeed || 10),
                damage: w.damage, owner: 'player', color: '#0ff', size: 4, life: 60,
                pierce: w.pierce || 0, explosive: w.explosive || false, radius: w.radius || 60,
                homing: w.homing || false, chain: w.chain || false, chains: w.chains || 3,
                freeze: w.freeze || false, poison: w.poison || false, slow: w.slow || false,
                pull: w.pull || false, entropy: w.entropy || false, phase: w.phase || false, split: w.split || false
            };
            this.projectiles.push(proj);
        }
        this.createParticles(this.player.x + 16, this.player.y + 20, 3, '#0ff');
    }
    
    fireSpecial() {
        if (this.player.energy < 20) { this.showNotification('Not enough energy!', 'rare'); return; }
        this.player.energy -= 20;
        this.createExplosion(this.player.x + 16, this.player.y + 20, 150, 80);
        this.enemies.forEach(e => e.health -= 50);
        this.showNotification('VOID BURST!', 'legendary');
        this.shake = 10;
        this.flashIntensity = 0.5;
    }
    
    cycleWeapon(dir) {
        let idx = (this.player.currentWeaponIndex + dir + this.player.weapons.length) % this.player.weapons.length;
        this.player.currentWeaponIndex = idx;
        this.player.weapon = this.player.weapons[idx];
        this.showNotification('Weapon: ' + this.weaponDefs[this.player.weapon].name, 'rare');
    }
    
    addXP(amount) {
        let mult = this.premiumTier === 'premium' ? 1.5 : (this.premiumTier === 'vip' ? 2 : 1);
        this.player.xp += Math.floor(amount * mult);
        while (this.player.xp >= this.player.xpToNext) {
            this.player.xp -= this.player.xpToNext;
            this.player.level++;
            this.player.xpToNext = Math.floor(this.player.xpToNext * 1.2);
            this.skillPoints++;
            this.player.maxHealth += 5;
            this.player.health = this.player.maxHealth;
            this.showNotification(`LEVEL UP! Level ${this.player.level}`, 'legendary');
            this.createParticles(this.player.x, this.player.y, 20, '#0ff');
        }
        this.updateHUD();
    }
    
    // ========== UPDATE LOOP ==========
    update(dt) {
        if (this.state !== 'playing') return;
        if (dt > 0.1) dt = 0.1;
        
        // Movement
        let move = 0;
        if (this.keys['KeyA'] || this.keys['ArrowLeft']) move = -1;
        if (this.keys['KeyD'] || this.keys['ArrowRight']) move = 1;
        
        let speedBonus = this.player.buffs.reduce((s, b) => b.effect === 'speed' ? s * b.value : s, 1);
        this.player.vx += move * this.player.speed * speedBonus * 0.6 * dt;
        this.player.vx *= 0.9;
        this.player.x += this.player.vx * dt;
        this.player.vy += 0.8 * dt;
        this.player.y += this.player.vy * dt;
        
        // Jump
        if ((this.keys['KeyW'] || this.keys['ArrowUp'] || this.keys['Space']) && this.player.onGround) {
            this.player.vy = -this.player.jumpPower;
            this.player.onGround = false;
        }
        
        // Platform Collision
        this.player.onGround = false;
        for (let p of this.platforms) {
            if (this.player.x + this.player.width > p.x && this.player.x < p.x + p.width &&
                this.player.y + this.player.height > p.y && this.player.y + this.player.height < p.y + p.height + 10 && this.player.vy >= 0) {
                this.player.y = p.y - this.player.height;
                this.player.vy = 0;
                this.player.onGround = true;
            }
        }
        
        // Bounds
        this.player.x = Math.max(0, Math.min(this.player.x, this.levelWidth - this.player.width));
        if (this.player.y > this.canvas.height) this.player.health = 0;
        if (this.player.health <= 0) this.gameOver();
        if (move !== 0) this.player.facing = move;
        
        // Energy Regeneration
        if (this.player.energy < this.player.maxEnergy) this.player.energy += 0.15 * dt;
        
        // Invincibility
        if (this.player.invincible > 0) this.player.invincible -= dt;
        
        // Auto Fire
        let w = this.weaponDefs[this.player.weapon];
        if ((this.mouse.down || this.touch.active) && w && w.auto) this.fire();
        
        // Camera
        this.camera.x = this.player.x - this.canvas.width / 2;
        this.camera.x = Math.max(0, Math.min(this.camera.x, this.levelWidth - this.canvas.width));
        this.camera.y = this.player.y - this.canvas.height / 2;
        this.camera.y = Math.max(-200, Math.min(this.camera.y, 200));
        
        // Spawn Enemies
        this.spawnTimer += dt;
        if (this.spawnTimer >= this.spawnRate) {
            this.spawnTimer = 0;
            if (Math.random() < 0.7 && this.enemies.length < 15) this.spawnEnemy();
        }
        
        // Wave Progression
        if (this.enemies.length === 0 && this.bosses.length === 0 && this.wave > 1 && this.wave % 5 === 0) {
            this.wave++;
            this.showNotification(`Wave ${this.wave}`, 'epic');
        } else if (this.enemies.length === 0 && this.bosses.length === 0 && this.wave === 1) {
            this.wave++;
            this.showNotification(`Wave ${this.wave}`, 'epic');
        }
        
        // Update Entities
        this.updateProjectiles(dt);
        this.updateEnemies(dt);
        this.updateParticles(dt);
        this.updateCollectibles(dt);
        this.updateBuffs(dt);
        this.checkCollisions();
        
        // Combo Timer
        if (this.player.comboTimer > 0) {
            this.player.comboTimer -= dt;
            if (this.player.comboTimer <= 0) {
                if (this.player.combo > this.bestCombo) this.bestCombo = this.player.combo;
                this.player.combo = 0;
            }
        }
        
        // Screen Effects
        if (this.shake > 0) this.shake *= 0.9;
        if (this.flashIntensity > 0) this.flashIntensity *= 0.95;
        if (this.bloomIntensity > 0) this.bloomIntensity *= 0.98;
        
        // Level Complete
        if (this.wave > 5 && this.enemies.length === 0 && this.mode === 'story') this.levelComplete();
        
        this.updateHUD();
    }
    
    updateProjectiles(dt) {
        for (let i = 0; i < this.projectiles.length; i++) {
            let p = this.projectiles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            
            // Homing
            if (p.homing && p.owner === 'player') {
                let nearest = null, nearestDist = Infinity;
                this.enemies.forEach(e => {
                    let d = Math.hypot(e.x - p.x, e.y - p.y);
                    if (d < nearestDist) { nearestDist = d; nearest = e; }
                });
                if (nearest && nearestDist < 200) {
                    let angle = Math.atan2(nearest.y - p.y, nearest.x - p.x);
                    p.vx += Math.cos(angle) * 3 * dt;
                    p.vy += Math.sin(angle) * 3 * dt;
                    let speed = Math.hypot(p.vx, p.vy);
                    if (speed > 12) { p.vx = (p.vx / speed) * 12; p.vy = (p.vy / speed) * 12; }
                }
            }
            
            if (p.life <= 0 || p.x < 0 || p.x > this.levelWidth || p.y < 0 || p.y > this.canvas.height) {
                if (p.explosive) this.createExplosion(p.x, p.y, p.radius, p.damage);
                this.projectiles.splice(i, 1);
                i--;
            }
        }
    }
    
    updateEnemies(dt) {
        for (let i = 0; i < this.enemies.length; i++) {
            let e = this.enemies[i];
            let type = this.enemyTypes[e.type];
            if (!type) continue;
            
            let dx = this.player.x + 16 - e.x;
            let dy = this.player.y + 20 - e.y;
            let dist = Math.hypot(dx, dy);
            
            switch (type.behavior) {
                case 'chase':
                    if (dist > 10) { e.vx = (dx / dist) * type.speed; e.vy = (dy / dist) * type.speed; }
                    break;
                case 'patrol':
                    e.vx = Math.sin(Date.now() * 0.002) * type.speed;
                    break;
                case 'fly':
                    e.vx = Math.sin(Date.now() * 0.003 + i) * type.speed;
                    e.vy = Math.cos(Date.now() * 0.002 + i) * type.speed * 0.5;
                    break;
                case 'tank':
                    if (Math.abs(dx) > 50) e.vx = Math.sign(dx) * type.speed;
                    else e.vx = 0;
                    break;
                case 'snipe':
                    if (dist < 400 && Math.random() < 0.01 * dt) {
                        this.projectiles.push({ x: e.x, y: e.y, vx: (dx/dist) * 12, vy: (dy/dist) * 12, damage: type.damage, owner: 'enemy', color: '#f00', size: 5, life: 90 });
                    }
                    break;
                case 'dash':
                    if (!e.dashing && Math.random() < 0.01 * dt) {
                        e.dashing = 20;
                        e.vx = (dx / dist) * type.speed * 3;
                        e.vy = (dy / dist) * type.speed * 3;
                    }
                    if (e.dashing) { e.dashing -= dt; if (e.dashing <= 0) e.dashing = 0; }
                    else { e.vx *= 0.95; e.vy *= 0.95; }
                    break;
                case 'spawn':
                    if (!e.spawnTimer) e.spawnTimer = 0;
                    e.spawnTimer += dt;
                    if (e.spawnTimer >= 5) { e.spawnTimer = 0; this.spawnEnemyAt('drone', e.x, e.y); }
                    break;
                case 'heal':
                    this.enemies.forEach(ally => {
                        if (ally !== e && ally.health < this.enemyTypes[ally.type].health) {
                            let hd = Math.hypot(ally.x - e.x, ally.y - e.y);
                            if (hd < 100) ally.health = Math.min(ally.health + 1 * dt, this.enemyTypes[ally.type].health);
                        }
                    });
                    break;
                default:
                    if (dist > 10) { e.vx = (dx / dist) * type.speed; e.vy = (dy / dist) * type.speed; }
            }
            
            e.x += e.vx * dt;
            e.y += e.vy * dt;
            e.x = Math.max(0, Math.min(e.x, this.levelWidth));
            e.y = Math.max(0, Math.min(e.y, this.canvas.height - 50));
            
            // Enemy Hit Player
            if (Math.hypot(this.player.x + 16 - e.x, this.player.y + 20 - e.y) < 25 && this.player.invincible <= 0) {
                let dmg = type.damage;
                if (this.player.shield > 0) {
                    let absorb = Math.min(this.player.shield, dmg);
                    this.player.shield -= absorb;
                    dmg -= absorb;
                    this.createFloatingText(e.x, e.y, 'SHIELD', '#88f');
                }
                this.player.health -= dmg;
                this.player.invincible = 30;
                this.shake = 3;
                this.createParticles(this.player.x, this.player.y, 8, '#f00');
                if (this.player.health <= 0) this.gameOver();
            }
        }
    }
    
    updateParticles(dt) {
        for (let i = 0; i < this.particles.length; i++) {
            let p = this.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            if (p.life <= 0) { this.particles.splice(i, 1); i--; }
        }
    }
    
    updateCollectibles(dt) {
        for (let i = 0; i < this.collectibles.length; i++) {
            let c = this.collectibles[i];
            if (Math.hypot(this.player.x + 16 - c.x, this.player.y + 20 - c.y) < 30) {
                if (c.type === 'coin') this.coins += c.value;
                if (c.type === 'gem') this.gems += c.value;
                if (c.type === 'health') this.player.health = Math.min(this.player.health + c.value, this.player.maxHealth);
                if (c.type === 'energy') this.player.energy = Math.min(this.player.energy + c.value, this.player.maxEnergy);
                if (c.type === 'buff') this.applyBuff(c.buffName);
                this.createFloatingText(c.x, c.y, '+' + (c.value || c.buffName), '#ffd700');
                this.collectibles.splice(i, 1);
                i--;
            }
        }
    }
    
    updateBuffs(dt) {
        for (let i = 0; i < this.player.buffs.length; i++) {
            let b = this.player.buffs[i];
            b.timer -= dt;
            if (b.effect === 'heal') this.player.health = Math.min(this.player.health + b.value * dt, this.player.maxHealth);
            if (b.timer <= 0) { this.player.buffs.splice(i, 1); this.showNotification(b.name + ' expired', 'rare'); i--; }
        }
        for (let i = 0; i < this.player.debuffs.length; i++) {
            let d = this.player.debuffs[i];
            d.timer -= dt;
            if (d.effect === 'poison') this.player.health -= d.value * dt;
            if (d.timer <= 0) { this.player.debuffs.splice(i, 1); i--; }
        }
    }
    
    checkCollisions() {
        for (let pi = 0; pi < this.projectiles.length; pi++) {
            let p = this.projectiles[pi];
            if (p.owner !== 'player') continue;
            
            for (let ei = 0; ei < this.enemies.length; ei++) {
                let e = this.enemies[ei];
                if (Math.hypot(p.x - e.x, p.y - e.y) < 20) {
                    let damage = p.damage * this.player.damageMultiplier;
                    if (Math.random() < this.player.critChance) {
                        damage *= this.player.critDamage;
                        this.createFloatingText(e.x, e.y, 'CRIT!', '#ffd700');
                    }
                    let berserk = this.player.buffs.find(b => b.effect === 'damage');
                    if (berserk) damage *= berserk.value;
                    damage = Math.floor(damage);
                    e.health -= damage;
                    if (this.settings.damageNums) this.createDamageNumber(e.x, e.y, damage);
                    this.createParticles(e.x, e.y, 5, '#fff');
                    
                    let lifesteal = this.player.buffs.find(b => b.effect === 'lifesteal');
                    if (lifesteal) this.player.health = Math.min(this.player.health + Math.floor(damage * lifesteal.value), this.player.maxHealth);
                    
                    if (p.pierce !== undefined) { p.pierce--; if (p.pierce < 0) p.life = 0; }
                    else p.life = 0;
                    
                    if (e.health <= 0) this.killEnemy(e, ei--);
                    break;
                }
            }
        }
    }
    
    killEnemy(e, index) {
        let type = this.enemyTypes[e.type];
        if (!type) return;
        
        this.score += type.score;
        this.coins += Math.floor(type.score / 10);
        this.addXP(type.xp);
        this.totalKills++;
        this.player.combo++;
        this.player.comboTimer = 180;
        if (this.player.combo > 2 && this.player.combo % 5 === 0) this.showCombo(this.player.combo);
        
        if (Math.random() < 0.2) this.collectibles.push({ x: e.x, y: e.y, type: 'coin', value: 5 });
        if (Math.random() < 0.05) this.collectibles.push({ x: e.x, y: e.y, type: 'gem', value: 1 });
        if (Math.random() < 0.1) this.collectibles.push({ x: e.x, y: e.y, type: 'health', value: 15 });
        if (Math.random() < 0.05 && this.player.energy < this.player.maxEnergy - 20) this.collectibles.push({ x: e.x, y: e.y, type: 'energy', value: 20 });
        
        this.createParticles(e.x, e.y, 15, type.color);
        this.enemies.splice(index, 1);
        this.updateQuestProgress('kill', 1);
        this.checkAchievement('kills', this.totalKills);
        this.checkAchievement('combo', this.player.combo);
    }
    
    spawnEnemy() {
        let types = ['drone', 'sentinel', 'tank', 'flyer', 'sniper'];
        let type = types[Math.floor(Math.random() * types.length)];
        if (this.wave > 3) types.push('assassin', 'spawner');
        if (this.wave > 5) types.push('jumper', 'leech');
        if (this.wave > 8) types.push('elite_drone', 'elite_tank');
        this.spawnEnemyAt(type, this.player.x + (Math.random() > 0.5 ? 1 : -1) * (400 + Math.random() * 200), 100 + Math.random() * (this.canvas.height - 200));
    }
    
    spawnEnemyAt(type, x, y) {
        let t = this.enemyTypes[type];
        if (!t) return;
        this.enemies.push({ type: type, x: x, y: y, vx: 0, vy: 0, health: t.health, maxHealth: t.health, speed: t.speed, damage: t.damage });
    }
    
    applyBuff(buffName) {
        let buff = { ...this.buffTypes[buffName], timer: this.buffTypes[buffName].duration };
        this.player.buffs.push(buff);
        this.showNotification(buff.name + ' activated!', 'rare');
    }
    
    // ========== VISUAL EFFECTS ==========
    createExplosion(x, y, radius, damage) {
        this.createParticles(x, y, 30, '#f80');
        this.shake = 8;
        for (let e of this.enemies) {
            let dist = Math.hypot(e.x - x, e.y - y);
            if (dist < radius) e.health -= Math.floor(damage * (1 - dist / radius));
        }
    }
    
    createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x: x, y: y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5 - 2,
                life: 20 + Math.random() * 20, color: color, size: 2 + Math.random() * 3
            });
        }
    }
    
    createFloatingText(x, y, text, color) {
        let el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = (x - this.camera.x) + 'px';
        el.style.top = (y - this.camera.y) + 'px';
        el.style.color = color || '#0ff';
        document.getElementById('gameContainer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    createDamageNumber(x, y, damage) {
        let el = document.createElement('div');
        el.className = 'damage-number';
        el.innerText = Math.floor(damage);
        el.style.left = (x - this.camera.x + (Math.random() - 0.5) * 15) + 'px';
        el.style.top = (y - this.camera.y) + 'px';
        document.getElementById('gameContainer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    showCombo(combo) {
        let d = document.getElementById('comboDisplay');
        d.innerText = combo + 'x COMBO!';
        d.classList.add('show');
        setTimeout(() => d.classList.remove('show'), 800);
    }
    
    showNotification(text, type) {
        let area = document.getElementById('notificationArea');
        let n = document.createElement('div');
        n.className = 'notification';
        n.innerText = text;
        if (type === 'legendary') n.style.borderLeftColor = '#ffd700';
        else if (type === 'epic') n.style.borderLeftColor = '#a0f';
        else if (type === 'rare') n.style.borderLeftColor = '#08f';
        area.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
    
    // ========== RENDERING ==========
    render() {
        let ctx = this.ctx;
        let w = this.canvas.width;
        let h = this.canvas.height;
        ctx.clearRect(0, 0, w, h);
        
        // Background
        let grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#0a0a1a');
        grad.addColorStop(1, '#050510');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        
        ctx.save();
        if (this.shake > 0) ctx.translate((Math.random() - 0.5) * this.shake, (Math.random() - 0.5) * this.shake);
        ctx.translate(-this.camera.x, -this.camera.y);
        
        // Platforms
        ctx.fillStyle = 'rgba(0,255,255,0.15)';
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        for (let p of this.platforms) {
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.strokeRect(p.x, p.y, p.width, p.height);
        }
        
        // Collectibles
        for (let c of this.collectibles) {
            if (c.type === 'coin') { ctx.fillStyle = '#ffd700'; ctx.fillRect(c.x - 5, c.y - 5, 10, 10); }
            if (c.type === 'gem') { ctx.fillStyle = '#0ff'; ctx.fillRect(c.x - 5, c.y - 5, 10, 10); }
            if (c.type === 'health') { ctx.fillStyle = '#f00'; ctx.fillRect(c.x - 5, c.y - 5, 10, 10); }
            if (c.type === 'energy') { ctx.fillStyle = '#0ff'; ctx.fillRect(c.x - 5, c.y - 5, 10, 10); }
        }
        
        // Enemies
        for (let e of this.enemies) {
            let t = this.enemyTypes[e.type];
            ctx.fillStyle = t.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = t.color;
            ctx.fillRect(e.x - 15, e.y - 15, 30, 30);
            ctx.shadowBlur = 0;
            // Health Bar
            let percent = e.health / e.maxHealth;
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x - 15, e.y - 22, 30, 5);
            ctx.fillStyle = '#f00';
            ctx.fillRect(e.x - 15, e.y - 22, 30 * percent, 5);
        }
        
        // Projectiles
        for (let p of this.projectiles) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
        }
        
        // Particles
        for (let p of this.particles) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        
        // Player
        let skinColors = { default: '#0ff', neon: '#0ff', gold: '#ffd700', void: '#a0f' };
        ctx.fillStyle = skinColors[this.player.skin] || '#0ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#0ff';
        if (this.player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.5;
        ctx.fillRect(this.player.x, this.player.y, 32, 42);
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.player.x + (this.player.facing > 0 ? 20 : 4), this.player.y + 8, 8, 6);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.player.x + (this.player.facing > 0 ? 28 : -8), this.player.y + 16, 12, 6);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        
        // Shield
        if (this.player.shield > 0) {
            ctx.beginPath();
            ctx.arc(this.player.x + 16, this.player.y + 21, 22, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(136,136,255,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // Buff Indicators
        this.player.buffs.forEach((b, i) => {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(this.player.x + 16 + Math.cos(Date.now() * 0.005 + i) * 18, this.player.y + 21 + Math.sin(Date.now() * 0.005 + i) * 18, 5, 0, Math.PI * 2);
            ctx.fill();
        });
        
        ctx.restore();
        
        // Flash
        if (this.flashIntensity > 0) {
            ctx.fillStyle = `rgba(255,255,255,${this.flashIntensity})`;
            ctx.fillRect(0, 0, w, h);
        }
        
        // Minimap
        if (this.settings.minimap) this.renderMinimap();
    }
    
    renderMinimap() {
        let mm = document.getElementById('minimap');
        let mctx = mm.getContext('2d');
        mctx.fillStyle = 'rgba(0,0,0,0.8)';
        mctx.fillRect(0, 0, 150, 100);
        let scaleX = 150 / this.levelWidth;
        let scaleY = 100 / this.canvas.height;
        mctx.fillStyle = '#0ff';
        mctx.fillRect(this.player.x * scaleX - 2, this.player.y * scaleY - 2, 4, 4);
        mctx.fillStyle = '#f00';
        for (let e of this.enemies) mctx.fillRect(e.x * scaleX - 1, e.y * scaleY - 1, 2, 2);
        mctx.fillStyle = '#ffd700';
        for (let c of this.collectibles) mctx.fillRect(c.x * scaleX, c.y * scaleY, 2, 2);
    }
    
    renderMenuBackground() {
        let ctx = this.ctx;
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        for (let i = 0; i < 60; i++) {
            let x = (Date.now() * 0.5 + i * 137) % this.canvas.width;
            let y = (Date.now() * 0.3 + i * 89) % this.canvas.height;
            ctx.fillStyle = `rgba(0,255,255,${0.1 + Math.sin(Date.now() * 0.002 + i) * 0.1})`;
            ctx.fillRect(x, y, 2, 2);
        }
    }
    
    // ========== UI METHODS ==========
    openArmory() {
        let grid = document.getElementById('armoryGrid');
        grid.innerHTML = '';
        for (let [id, w] of Object.entries(this.weaponDefs)) {
            let owned = this.player.weapons.includes(id);
            let equipped = this.player.weapon === id;
            grid.innerHTML += `<div class="grid-item" style="${equipped ? 'border-color:#0f0' : ''}" onclick="window.game.equipWeapon('${id}')">
                ${w.name}<br><span style="color:#888;font-size:0.7rem;">${w.rarity}</span>
                ${owned ? (equipped ? '<span style="color:#0f0;"> ✓</span>' : '') : '<span style="color:#f00;"> 🔒</span>'}
            </div>`;
        }
        document.getElementById('armory').classList.add('active');
    }
    closeArmory() { document.getElementById('armory').classList.remove('active'); }
    equipWeapon(id) {
        if (!this.player.weapons.includes(id)) {
            if (this.coins >= (this.weaponDefs[id].cost || 0)) {
                this.coins -= this.weaponDefs[id].cost;
                this.player.weapons.push(id);
                this.showNotification('Purchased: ' + this.weaponDefs[id].name, 'legendary');
            } else { this.showNotification('Not enough coins!', 'rare'); return; }
        }
        this.player.weapon = id;
        this.player.currentWeaponIndex = this.player.weapons.indexOf(id);
        this.showNotification('Equipped: ' + this.weaponDefs[id].name, 'rare');
        this.updateHUD();
        this.closeArmory();
    }
    
    openSkillTree() {
        document.getElementById('skillPoints').innerText = this.skillPoints;
        this.renderSkillTree();
        document.getElementById('skillTree').classList.add('active');
    }
    closeSkillTree() { document.getElementById('skillTree').classList.remove('active'); }
    renderSkillTree() {
        let canvas = document.getElementById('skillCanvas');
        let ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 400;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 600, 400);
        ctx.fillStyle = '#0ff';
        ctx.font = '12px monospace';
        ctx.fillText('COMBAT SKILLS', 20, 30);
        ctx.fillText('SURVIVAL SKILLS', 220, 30);
        ctx.fillText('AGILITY SKILLS', 420, 30);
        let y = 60;
        for (let skill of this.skillTree.combat) {
            let level = this.skills[skill.id] || 0;
            ctx.fillStyle = level >= skill.max ? '#0f0' : (this.skillPoints >= skill.cost ? '#0ff' : '#888');
            ctx.fillText(`${skill.name} Lv.${level}/${skill.max} (${skill.cost} SP)`, 20, y);
            y += 25;
        }
        y = 60;
        for (let skill of this.skillTree.survival) {
            let level = this.skills[skill.id] || 0;
            ctx.fillStyle = level >= skill.max ? '#0f0' : (this.skillPoints >= skill.cost ? '#0ff' : '#888');
            ctx.fillText(`${skill.name} Lv.${level}/${skill.max} (${skill.cost} SP)`, 220, y);
            y += 25;
        }
        y = 60;
        for (let skill of this.skillTree.agility) {
            let level = this.skills[skill.id] || 0;
            ctx.fillStyle = level >= skill.max ? '#0f0' : (this.skillPoints >= skill.cost ? '#0ff' : '#888');
            ctx.fillText(`${skill.name} Lv.${level}/${skill.max} (${skill.cost} SP)`, 420, y);
            y += 25;
        }
        canvas.onclick = (e) => {
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            if (x > 20 && x < 200) {
                let idx = Math.floor((y - 60) / 25);
                if (idx >= 0 && idx < this.skillTree.combat.length) this.buySkill(this.skillTree.combat[idx]);
            } else if (x > 220 && x < 400) {
                let idx = Math.floor((y - 60) / 25);
                if (idx >= 0 && idx < this.skillTree.survival.length) this.buySkill(this.skillTree.survival[idx]);
            } else if (x > 420 && x < 600) {
                let idx = Math.floor((y - 60) / 25);
                if (idx >= 0 && idx < this.skillTree.agility.length) this.buySkill(this.skillTree.agility[idx]);
            }
        };
    }
    buySkill(skill) {
        if (this.skillPoints < skill.cost) { this.showNotification('Not enough skill points!', 'rare'); return; }
        let level = this.skills[skill.id] || 0;
        if (level >= skill.max) { this.showNotification('Max level reached!', 'rare'); return; }
        this.skillPoints -= skill.cost;
        this.skills[skill.id] = level + 1;
        if (skill.effect === 'maxHealth') this.player.maxHealth += skill.value;
        if (skill.effect === 'maxEnergy') this.player.maxEnergy += skill.value;
        if (skill.effect === 'critChance') this.player.critChance += skill.value;
        if (skill.effect === 'critDamage') this.player.critDamage += skill.value;
        if (skill.effect === 'speed') this.player.speed += this.player.speed * skill.value;
        if (skill.effect === 'luck') this.player.luck += skill.value;
        this.showNotification(skill.name + ' upgraded!', 'legendary');
        this.renderSkillTree();
        document.getElementById('skillPoints').innerText = this.skillPoints;
    }
    
    openCrafting() {
        document.getElementById('materialDisplay').innerHTML = `Scrap:${this.materials.scrap} Crystal:${this.materials.crystal} Essence:${this.materials.essence} Core:${this.materials.core}`;
        let grid = document.getElementById('craftingGrid');
        grid.innerHTML = '';
        for (let r of this.recipes) {
            let canCraft = Object.entries(r.materials).every(([m, a]) => this.materials[m] >= a) && this.coins >= r.cost;
            grid.innerHTML += `<div class="grid-item" style="${!canCraft ? 'opacity:0.5' : ''}" onclick="window.game.craftItem('${r.id}')">
                ${r.name}<br><span style="color:#888;font-size:0.7rem;">${Object.entries(r.materials).map(([m,a])=>`${m}:${a}`).join(' ')} | ${r.cost} coins</span>
            </div>`;
        }
        document.getElementById('crafting').classList.add('active');
    }
    closeCrafting() { document.getElementById('crafting').classList.remove('active'); }
    craftItem(id) {
        let recipe = this.recipes.find(r => r.id === id);
        if (!recipe) return;
        let canCraft = Object.entries(recipe.materials).every(([m, a]) => this.materials[m] >= a) && this.coins >= recipe.cost;
        if (!canCraft) { this.showNotification('Insufficient materials or coins!', 'rare'); return; }
        Object.entries(recipe.materials).forEach(([m, a]) => this.materials[m] -= a);
        this.coins -= recipe.cost;
        if (recipe.result === 'weapon' && !this.player.weapons.includes(recipe.id)) this.player.weapons.push(recipe.id);
        if (recipe.result === 'artifact' && !this.player.artifacts.includes(recipe.id)) this.player.artifacts.push(recipe.id);
        this.showNotification('Crafted: ' + recipe.name, 'legendary');
        this.updateHUD();
        this.openCrafting();
    }
    
    openQuests() {
        let msg = 'QUESTS:\n';
        for (let q of this.quests) msg += `${q.name}: ${q.progress}/${q.target} - ${q.completed ? 'COMPLETE' : 'In Progress'}\n`;
        alert(msg);
    }
    openAchievements() {
        let msg = 'ACHIEVEMENTS:\n';
        for (let a of this.achievements) msg += `${a.name}: ${a.progress}/${a.target} - ${a.completed ? '✓' : '✗'} (${a.reward.coins ? '+' + a.reward.coins + ' Coins' : ''} ${a.reward.gems ? '+' + a.reward.gems + ' Gems' : ''})\n`;
        alert(msg);
    }
    openLeaderboard() {
        let msg = 'LEADERBOARD:\n';
        for (let l of this.leaderboardData.score) msg += `#${l.rank} ${l.name}: ${l.score}\n`;
        alert(msg);
    }
    openGuild() { alert(`GUILD: ${this.guildData.name} Lv.${this.guildData.level}\nPerks: ${this.guildData.perks.join(', ')}`); }
    openTournament() { alert(`TOURNAMENT: ${this.tournamentData.name}\nYour Rank: #${this.tournamentData.myRank}\nYour Score: ${this.tournamentData.myScore}`); }
    openBattlePass() { alert(`BATTLE PASS: Tier ${this.bpTier}\nPremium: ${this.bpPremium ? 'Active' : 'Inactive'}`); }
    openDaily() {
        if (!this.dailyClaimed) {
            this.coins += 100;
            this.gems += 10;
            this.dailyClaimed = true;
            this.dailyStreak++;
            this.showNotification('Daily reward claimed! +100 Coins, +10 Gems', 'legendary');
            this.updateHUD();
        } else { this.showNotification('Already claimed today!', 'rare'); }
    }
    openSettings() { alert('Settings coming soon!'); }
    showPremium() { alert('PREMIUM MEMBERSHIP\n- 2x coins and gems\n- No ads\n- Exclusive skins\n- 20% more XP\n- Premium badge'); }
    openIAPShop() { alert('SHOP\n- 100 Coins: $0.99\n- 500 Coins: $4.99\n- 1,200 Coins: $9.99\n- Starter Pack: $2.99\n- Premium: $4.99/month'); }
    showAdRewardMenu() {
        this.showNotification('Watch ad for +50 Coins! (simulated)', 'legendary');
        this.coins += 50;
        this.updateHUD();
        this.adsWatched++;
    }
    
    updateQuestProgress(type, amount) {
        for (let q of this.quests) {
            if (q.completed) continue;
            if ((type === 'kill' && q.type === 'kill') || (type === 'collect' && q.type === 'collect')) {
                q.progress += amount;
                if (q.progress >= q.target) {
                    q.completed = true;
                    this.coins += q.reward.coins || 0;
                    this.gems += q.reward.gems || 0;
                    this.addXP(q.reward.xp || 0);
                    this.showNotification('Quest complete: ' + q.name, 'legendary');
                }
            }
        }
    }
    
    checkAchievement(type, value) {
        for (let a of this.achievements) {
            if (a.completed) continue;
            if (type === 'kills' && a.id === 'hunter') a.progress = value;
            if (type === 'kills' && a.id === 'first_blood') a.progress = value;
            if (type === 'combo' && a.id === 'combo10') a.progress = Math.max(a.progress, value);
            if (type === 'coins' && a.id === 'millionaire') a.progress = value;
            if (a.progress >= a.target && !a.completed) {
                a.completed = true;
                this.coins += a.reward.coins || 0;
                this.gems += a.reward.gems || 0;
                this.showNotification('Achievement Unlocked: ' + a.name, 'legendary');
            }
        }
    }
    
    loop(timestamp) {
        let dt = Math.min((timestamp - (this.lastTime || timestamp)) / 16.67, 3);
        this.lastTime = timestamp;
        if (this.state === 'playing') { this.update(dt); this.render(); }
        else if (this.state === 'menu') { this.renderMenuBackground(); }
        requestAnimationFrame((t) => this.loop(t));
    }
}

let game;
window.onload = () => {
    game = new VoidRunnerUltimate();
    window.game = game;
};
</script>
