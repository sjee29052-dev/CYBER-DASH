<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHADOW DASH ULTRA</title>
    <!-- Fonts preloaded for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Minimal but complete CSS – matches your original design */
        :root {
            --n: #00f5ff;
            --a: #ff2d78;
            --g: #ffd700;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
        }
        #app {
            position: relative;
            width: 480px; height: 820px;
            background: #010a14; /* Background ensures no full transparency */
            overflow: hidden;
            border: 1px solid rgba(0,245,255,.3);
            box-shadow: 0 0 120px rgba(0,245,255,.18), 0 0 280px rgba(0,0,80,.9), inset 0 0 120px rgba(0,0,0,.95);
            transform-origin: top center;
        }
        .scr {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            opacity: 1; transition: opacity .3s;
            background: transparent;
            pointer-events: none;
        }
        .scr.active {
            opacity: 1;
            pointer-events: auto;
        }
        .scr:not(.active) {
            opacity: 0;
            pointer-events: none;
        }
        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 80px; line-height: .88; letter-spacing: 6px;
            background: linear-gradient(155deg, #fff 0%, #00f5ff 45%, #ff2d78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .btn {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 4px;
            cursor: pointer;
            border: 2px solid var(--n);
            color: var(--n);
            background: transparent;
            padding: 15px 60px;
            margin: 10px;
            font-size: 22px;
            transition: all .2s;
        }
        .btn:hover { background: var(--n); color: #000; }
        .cbar {
            display: flex; align-items: center; gap: 7px;
            background: rgba(255,215,0,.07);
            border: 1px solid rgba(255,215,0,.28);
            border-radius: 24px;
            padding: 6px 16px;
            margin: 15px 0;
        }
        .cdot {
            width: 14px; height: 14px;
            background: var(--g); border-radius: 50%;
            box-shadow: 0 0 9px var(--g);
        }
        .cnum {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px; color: var(--g); letter-spacing: 2px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- MAIN MENU -->
    <div id="scr-menu" class="scr active">
        <div class="logo">SHADOW<br>DASH</div>
        <div style="font-family:'Orbitron',monospace; font-size:10px; letter-spacing:7px; color:rgba(0,245,255,.4); margin:5px 0;">ULTRA EDITION</div>
        <div class="cbar">
            <div class="cdot"></div>
            <div class="cnum" id="menu-coins">0</div>
        </div>
        <button class="btn" onclick="startGame()">START RUN</button>
    </div>

    <!-- GAME OVER (fake) -->
    <div id="scr-gameover" class="scr">
        <div style="font-family:'Orbitron',monospace; font-size:12px; color:var(--a); letter-spacing:4px; margin-bottom:10px;">RUN COMPLETE</div>
        <div style="font-family:'Bebas Neue',cursive; font-size:72px; color:#fff; line-height:1; text-shadow:0 0 40px rgba(255,45,120,.5);" id="go-score">0</div>
        <button class="btn" onclick="showMenu()">CONTINUE</button>
    </div>
</div>

<script>
    // Safe localStorage with fallback
    let coins = 0;
    try { coins = parseInt(localStorage.getItem('sd_coins') || '0', 10); } catch(e) {}

    function updateCoins() {
        document.getElementById('menu-coins').textContent = coins;
    }

    function addCoins(n) {
        coins += n;
        try { localStorage.setItem('sd_coins', coins); } catch(e) {}
        updateCoins();
    }

    function showMenu() {
        document.getElementById('scr-gameover').classList.remove('active');
        document.getElementById('scr-menu').classList.add('active');
    }

    function startGame() {
        document.getElementById('scr-menu').classList.remove('active');
        // Simulate a short game run
        setTimeout(() => {
            const score = Math.floor(Math.random() * 4000) + 1000;
            document.getElementById('go-score').textContent = score;
            addCoins(Math.floor(Math.random() * 100));
            document.getElementById('scr-gameover').classList.add('active');
        }, 2000);
    }

    // Responsive scaling
    function resize() {
        const app = document.getElementById('app');
        const w = window.innerWidth;
        const h = window.innerHeight;
        const ratio = 480 / 820;
        let appW, appH, scale;
        if (w / h > ratio) {
            appH = h;
            appW = appH * ratio;
        } else {
            appW = w;
            appH = appW / ratio;
        }
        appW = Math.max(appW, 200);
        appH = Math.max(appH, 340);
        scale = appW / 480;
        app.style.width = appW + 'px';
        app.style.height = appH + 'px';
        app.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resize);
    resize();

    // Init
    updateCoins();
</script>
</body>
</html>
