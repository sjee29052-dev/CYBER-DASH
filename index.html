<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#010610">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SHADOW DASH ULTRA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
html,body{touch-action:manipulation;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--n:#00f5ff;--a:#ff2d78;--g:#ffd700;--p:#b44fff;--gr:#00ff88;--o:#ff8c00;--gl:rgba(255,255,255,.04);--gln:rgba(255,255,255,.08);}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;user-select:none;}
#app{position:relative;width:480px;height:820px;overflow:hidden;border:1px solid rgba(0,245,255,.3);
  box-shadow:0 0 120px rgba(0,245,255,.18),0 0 280px rgba(0,0,80,.9),inset 0 0 120px rgba(0,0,0,.95);transform-origin:top center;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#gc{z-index:2;}#bg{z-index:1;}
#app::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:90;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.028) 3px,rgba(0,0,0,.028) 6px);}
/* SCREENS */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  z-index:10;transition:opacity .32s,transform .32s;background:transparent;}
.scr.hide{display:none!important;}
.si{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
  width:100%;height:100%;overflow-y:auto;padding:22px 18px 80px;
  scrollbar-width:thin;scrollbar-color:rgba(0,245,255,.3) transparent;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
.si::-webkit-scrollbar{width:3px;}
.si::-webkit-scrollbar-thumb{background:rgba(0,245,255,.3);border-radius:2px;}
/* LOGO */
.logo{font-family:'Bebas Neue',cursive;font-size:80px;line-height:.88;letter-spacing:6px;text-align:center;
  background:linear-gradient(155deg,#fff 0%,#00f5ff 45%,#ff2d78 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(0,245,255,.45));}
.logo-tag{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:7px;color:rgba(0,245,255,.4);margin:3px 0 2px;}
.logo-ver{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:5px;color:var(--g);text-shadow:0 0 18px var(--g);}
/* BUTTONS */
.btn{font-family:'Bebas Neue',cursive;letter-spacing:4px;cursor:pointer;border:none;outline:none;
  position:relative;overflow:hidden;transition:all .18s;}
.bp{background:transparent;border:2px solid var(--n);color:var(--n);font-size:22px;
  padding:15px 62px;overflow:hidden;}
.bp::before{content:'';position:absolute;inset:0;background:var(--n);transform:translateX(-105%);transition:transform .2s;}
.bp:hover::before,.bp:active::before{transform:none;}
.bp:hover,.bp:active{color:#000;}
.bp.gold{border-color:var(--g);color:var(--g);}.bp.gold::before{background:var(--g);}
.bp.red{border-color:var(--a);color:var(--a);}.bp.red::before{background:var(--a);}
.bp.pur{border-color:var(--p);color:var(--p);}.bp.pur::before{background:var(--p);}
.bp.grn{border-color:var(--gr);color:var(--gr);}.bp.grn::before{background:var(--gr);}
.bp.sm{font-size:14px;padding:9px 26px;}
.bp.xs{font-size:11px;padding:6px 16px;}
/* NAV GRID */
.ngrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;margin:10px 0;}
.nb{background:var(--gl);border:1px solid var(--gln);color:rgba(255,255,255,.6);
  font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;padding:13px 4px 9px;
  cursor:pointer;transition:all .2s;text-align:center;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.nb .ni{font-size:22px;line-height:1;}
.nb:hover,.nb:active{border-color:var(--n);color:var(--n);background:rgba(0,245,255,.07);transform:translateY(-2px);}
.nb.rn:active{background:rgba(255,45,120,.2) !important;transform:scale(.97) !important;}
.nb.rn:hover{border-color:var(--a);color:var(--a);background:rgba(255,45,120,.07);}
/* COIN BAR */
.cbar{display:flex;align-items:center;gap:7px;background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.28);border-radius:24px;padding:5px 14px;margin:5px 0;}
.cdot{width:13px;height:13px;background:var(--g);border-radius:50%;box-shadow:0 0 9px var(--g);}
.cnum{font-family:'Bebas Neue',cursive;font-size:19px;color:var(--g);letter-spacing:2px;}
/* HUD */
#hud{position:absolute;inset:0;pointer-events:none;z-index:15;display:none;}
#hs-wrap{position:absolute;top:11px;left:14px;}
#hb-wrap{position:absolute;top:11px;right:14px;text-align:right;}
#hc-wrap{position:absolute;top:11px;left:50%;transform:translateX(-50%);}
.hv{font-family:'Bebas Neue',cursive;font-size:38px;color:#fff;text-shadow:0 0 18px var(--n);line-height:1;}
.hl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;}
#hb-wrap .hv{font-size:21px;color:var(--g);text-shadow:0 0 11px var(--g);}
#hc-wrap .hv{font-size:19px;color:var(--g);}
#combo-hud{position:absolute;top:66px;right:13px;font-family:'Bebas Neue',cursive;font-size:20px;color:var(--a);text-shadow:0 0 13px var(--a);transition:opacity .25s;opacity:0;}

#pubar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.pu{width:40px;height:40px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:17px;border:2px solid rgba(255,255,255,.1);background:rgba(0,0,0,.6);opacity:.28;transition:all .25s;position:relative;overflow:hidden;}
.pu.on{opacity:1;border-color:var(--g);box-shadow:0 0 14px rgba(255,215,0,.35);}
.pu .pt{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--g);transform-origin:left;border-radius:0 0 6px 6px;}
#boss-wrap{position:absolute;top:60px;left:14px;right:14px;display:none;}
#boss-lbl{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:4px;color:#ff2020;margin-bottom:3px;animation:fl .4s infinite alternate;}
@keyframes fl{from{opacity:1}to{opacity:.5}}
#boss-track{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
#boss-fill{height:100%;background:linear-gradient(90deg,#ff2020,#ff8c00);border-radius:4px;transition:width .08s;}

/* SHOP / PANELS */
.ptitle{font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:5px;color:var(--g);text-shadow:0 0 24px var(--g);margin-bottom:4px;}
.tabrow{display:flex;gap:5px;margin:6px 0 10px;flex-wrap:wrap;justify-content:center;}
.tab{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:3px;padding:6px 13px;
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.3);cursor:pointer;border-radius:3px;transition:all .2s;}
.tab.on{border-color:var(--n);color:var(--n);background:rgba(0,245,255,.07);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;width:100%;}
.card{background:var(--gl);border:1px solid var(--gln);border-radius:10px;padding:13px 9px;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .22s;position:relative;}
.card:hover,.card:active{border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.07);transform:translateY(-2px);}
.card.owned{border-color:var(--gr);}
.card.equipped{border-color:var(--g)!important;}
.cico{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:2px;}
.cname{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:#fff;}
.cdesc{font-size:9px;color:rgba(255,255,255,.32);text-align:center;line-height:1.4;}
.cprice{font-family:'Bebas Neue',cursive;font-size:15px;color:var(--g);letter-spacing:2px;}
.badge{position:absolute;top:5px;right:5px;font-size:7px;letter-spacing:1px;padding:2px 5px;border-radius:3px;font-weight:700;}
.beq{background:var(--g);color:#000;left:5px;right:auto;}
/* LB */
.lb-head{width:100%;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;
  padding:10px 14px;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:8px;margin-bottom:10px;}
.lb-stat{text-align:center;}
.lb-sv{font-family:'Bebas Neue',cursive;font-size:30px;color:var(--g);}
.lb-sl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.28);}
.lb-div{background:rgba(255,255,255,.1);}
.lbrow{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;margin-bottom:6px;
  border:1px solid transparent;transition:all .2s;position:relative;overflow:hidden;}
.lbrow::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.04),transparent);pointer-events:none;}
.lbrow.lbg{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.28);}
.lbrow.lbs{background:rgba(180,180,200,.05);border-color:rgba(180,180,200,.18);}
.lbrow.lbb{background:rgba(205,127,50,.05);border-color:rgba(205,127,50,.18);}
.lbrow.lbm{background:rgba(0,245,255,.05);border-color:rgba(0,245,255,.28);box-shadow:0 0 18px rgba(0,245,255,.08);}
.lbrow.lbn{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);}
.lb-rn{font-family:'Bebas Neue',cursive;font-size:20px;width:30px;text-align:center;color:rgba(255,255,255,.3);}
.lb-rn.gc{color:var(--g);text-shadow:0 0 10px var(--g);}
.lb-rn.sc{color:#ccc;}.lb-rn.bc{color:#cd7f32;}
.lb-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.lb-info{flex:1;min-width:0;}
.lb-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-sub{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:1px;}


.lb-sc{text-align:right;flex-shrink:0;}
.lb-scn{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--g);letter-spacing:2px;}
/* LOG */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;width:100%;margin-bottom:12px;}
.sc{background:var(--gl);border:1px solid var(--gln);border-radius:8px;padding:11px;text-align:center;}
.sv{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--n);}
.sl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.28);}
.rune{background:var(--gl);border:1px solid var(--gln);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:11px;width:100%;}
.rune:hover{border-color:rgba(0,245,255,.22);}
.runnum{font-family:'Bebas Neue',cursive;font-size:26px;color:rgba(255,255,255,.18);width:34px;text-align:center;}
.rund{flex:1;}
.runsc{font-family:'Bebas Neue',cursive;font-size:20px;color:#fff;}
.runm{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:1px;}
/* MISSIONS */
.mcard{background:var(--gl);border:1px solid rgba(180,79,255,.16);border-radius:9px;padding:13px;display:flex;align-items:center;gap:11px;margin-bottom:7px;width:100%;}
.mcard.done{border-color:rgba(255,215,0,.3);}
.mcard.claimed{opacity:.4;}
.mico{font-size:26px;width:38px;text-align:center;flex-shrink:0;}
.mbody{flex:1;}
.mname{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:#fff;}
.mdesc{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.mbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden;}
.mfill{height:100%;background:linear-gradient(90deg,var(--p),var(--a));border-radius:2px;transition:width .4s;}
.mcard.done .mfill{background:linear-gradient(90deg,var(--g),var(--gr));}
.clbtn{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;padding:6px 11px;border-radius:4px;cursor:pointer;border:none;background:var(--g);color:#000;transition:all .15s;}
.mrew{font-family:'Bebas Neue',cursive;font-size:13px;color:rgba(255,215,0,.45);letter-spacing:2px;}
/* ACHIEVEMENTS */
.acard{background:var(--gl);border:1px solid rgba(255,215,0,.1);border-radius:9px;padding:11px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.acard.u{border-color:rgba(255,215,0,.38);background:rgba(255,215,0,.055);}
.acard.lk{opacity:.32;filter:grayscale(.8);}
.aico{font-size:26px;}.aname{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:#fff;text-align:center;}
.adesc{font-size:8px;color:rgba(255,255,255,.28);text-align:center;}
/* SETTINGS */
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;
  background:var(--gl);border:1px solid var(--gln);border-radius:7px;margin-bottom:7px;width:100%;}
.slbl{font-size:13px;letter-spacing:1px;color:rgba(255,255,255,.5);}
.toggle{width:42px;height:22px;border-radius:11px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);cursor:pointer;position:relative;transition:all .2s;}
.toggle.on{background:var(--n);border-color:var(--n);box-shadow:0 0 10px rgba(0,245,255,.35);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;}
.toggle.on::after{transform:translateX(20px);}
/* GAME OVER */
.gowrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:28px 18px;}
.gotag{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:var(--a);margin-bottom:5px;}
.goscore{font-family:'Bebas Neue',cursive;font-size:92px;color:#fff;line-height:1;text-shadow:0 0 55px rgba(255,45,120,.5);}
.gobest{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--g);letter-spacing:3px;}
.gonew{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:5px;color:var(--gr);animation:gp 1s infinite;}
@keyframes gp{0%,100%{opacity:1}50%{opacity:.4}}
.godiv{width:230px;height:1px;margin:16px 0;background:linear-gradient(90deg,transparent,rgba(0,245,255,.28),transparent);}
.gostats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;margin-bottom:16px;}
.gostat{background:var(--gl);border:1px solid var(--gln);border-radius:7px;padding:9px 5px;text-align:center;}
.gosv{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--n);}
.gosl{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.28);}
.rvbox{background:rgba(255,215,0,.05);border:2px solid rgba(255,215,0,.28);border-radius:7px;padding:12px 18px;margin-bottom:11px;text-align:center;width:100%;}
.rvbox p,.rvbox div{font-size:11px;color:rgba(255,255,255,.38);letter-spacing:1px;margin-bottom:8px;}
/* TOAST */
#toast{position:absolute;top:88px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:3px;
  color:#000;background:var(--g);padding:9px 24px;border-radius:4px;z-index:200;opacity:0;transition:opacity .28s;pointer-events:none;white-space:nowrap;}
/* HDivider */
.hdiv{width:100%;height:1px;background:var(--gln);margin:10px 0;}

/* ── V6 MODE CARDS ─────────────────────────────────── */
.mode-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;cursor:pointer;transition:all .22s;margin-bottom:10px;width:100%;}
.mode-card:hover,.mode-card:active{transform:translateY(-2px);}
.mode-card.mc-endless:hover{border-color:rgba(0,245,255,.45);box-shadow:0 6px 24px rgba(0,245,255,.1);}
.mode-card.mc-timeatk:hover{border-color:rgba(255,140,0,.45);box-shadow:0 6px 24px rgba(255,140,0,.1);}
.mode-card.mc-bossrush:hover{border-color:rgba(255,45,120,.45);box-shadow:0 6px 24px rgba(255,45,120,.1);}
.mc-row{display:flex;align-items:center;gap:14px;}
.mc-ico{font-size:34px;width:48px;text-align:center;flex-shrink:0;}
.mc-info{flex:1;}
.mc-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;}
.mc-desc{font-size:11px;color:rgba(255,255,255,.38);letter-spacing:.5px;margin-top:2px;}
.mc-best{font-family:'Bebas Neue',cursive;font-size:12px;color:rgba(255,215,0,.55);margin-top:4px;}
.mc-badge{font-family:'Bebas Neue',cursive;font-size:10px;letter-spacing:2px;padding:3px 9px;border-radius:3px;flex-shrink:0;}
/* ── V6 TIMER HUD ──────────────────────────────────── */
#h-timer{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;display:none;}
#h-timer .hv{font-size:42px;color:#ff8c00;text-shadow:0 0 22px #ff8c00;}
#h-timer.urg .hv{color:#ff2d78;text-shadow:0 0 22px #ff2d78;animation:tpu .5s infinite;}
@keyframes tpu{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#h-wave{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;display:none;}
#h-wave .hv{font-size:28px;color:#ff2d78;text-shadow:0 0 18px #ff2d78;}

/* ── V6 DAILY POPUP ────────────────────────────────── */
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:60;display:none;align-items:center;justify-content:center;}
.popup-box{background:linear-gradient(160deg,#060e22,#0a1530);border:1px solid rgba(0,245,255,.22);border-radius:14px;padding:22px 18px;width:min(390px,94%);text-align:center;box-shadow:0 0 60px rgba(0,245,255,.1);}
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0 14px;}
.dd{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:7px 3px;text-align:center;}
.dd.dp{border-color:rgba(0,255,136,.28);background:rgba(0,255,136,.06);}
.dd.dt{border-color:#ffd700;background:rgba(255,215,0,.1);animation:ddg .8s infinite alternate;}
@keyframes ddg{from{box-shadow:0 0 6px rgba(255,215,0,.2)}to{box-shadow:0 0 20px rgba(255,215,0,.45)}}
.dd.df{opacity:.3;}
.dd-n{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.3);}
.dd-e{font-size:15px;line-height:1.2;}
.dd-a{font-family:'Bebas Neue',cursive;font-size:11px;color:#ffd700;}
/* ── V6 VIP SCREEN ─────────────────────────────────── */
.vip-hero{text-align:center;padding:14px;background:linear-gradient(160deg,rgba(255,170,0,.08),rgba(255,215,0,.04));border:1px solid rgba(255,170,0,.22);border-radius:12px;margin-bottom:12px;width:100%;}
.vip-crown{font-size:46px;margin-bottom:5px;}
.vip-htitle{font-family:'Bebas Neue',cursive;font-size:40px;letter-spacing:6px;background:linear-gradient(135deg,#ffaa00,#ffd700,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.vip-price{font-family:'Bebas Neue',cursive;font-size:24px;color:#ffaa00;letter-spacing:3px;}
.vip-perks{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;margin-bottom:12px;}
.vip-perk{background:rgba(255,170,0,.05);border:1px solid rgba(255,170,0,.16);border-radius:8px;padding:11px;text-align:center;}
.vp-ico{font-size:22px;margin-bottom:3px;}.vp-name{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:#ffaa00;}
.vp-desc{font-size:9px;color:rgba(255,255,255,.28);}
/* ── V6 VICTORY ────────────────────────────────────── */
.vic-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:22px 16px;text-align:center;}
/* ── V6 AD BOX ON GAME OVER ────────────────────────── */
.ad-revive-box{background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.18);border-radius:8px;padding:10px;margin-bottom:9px;text-align:center;width:100%;cursor:pointer;transition:all .2s;}
.ad-revive-box:hover{border-color:rgba(0,245,255,.4);background:rgba(0,245,255,.08);}
