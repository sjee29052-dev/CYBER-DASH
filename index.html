<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CYBER DASH ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation}
body{display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace}
#app{position:relative;width:390px;height:844px;overflow:hidden;background:#000913}
canvas{position:absolute;top:0;left:0;width:390px;height:844px;pointer-events:none}
#bgc{z-index:1}#gc{z-index:2}#pc{z-index:3}
.scr{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.off{display:none!important}
.sbg{position:absolute;inset:0;background:rgba(0,9,19,.96);z-index:-1}
/* HOME */
.logo{font-size:3.2rem;font-weight:900;letter-spacing:.22em;line-height:.85;background:linear-gradient(135deg,#fff 0%,#63caff 40%,#a855f7 75%,#ff4757 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(99,202,255,.4))}
.curr-row{display:flex;gap:8px;margin:10px 0 12px}
.curr{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:7px 14px;cursor:pointer}
.hbtn{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:16px 8px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s}
.hbtn:active{transform:scale(.96);background:rgba(99,202,255,.07);border-color:rgba(99,202,255,.3)}
.hbtn-i{font-size:1.6rem;line-height:1}
.hbtn-l{font-size:.5rem;letter-spacing:.15em;color:rgba(255,255,255,.38)}
/* BUTTONS */
.btn{font-family:'Orbitron',monospace;cursor:pointer;border:none;border-radius:10px;transition:all .18s;letter-spacing:.15em}
.btn:active{transform:scale(.97)}
.btn-play{background:linear-gradient(135deg,#63caff,#a855f7);color:#fff;padding:19px;font-size:.8rem;font-weight:700;width:100%;box-shadow:0 0 30px rgba(99,202,255,.25),inset 0 1px 0 rgba(255,255,255,.2)}
.btn-gold{background:linear-gradient(135deg,#ffd166,#cc8800);color:#000;padding:12px 22px;font-size:.62rem;font-weight:700}
.btn-back{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);padding:13px;font-size:.58rem;width:100%;border-radius:10px;cursor:pointer;margin-top:8px}
.btn-cyan{background:rgba(99,202,255,.08);border:1px solid rgba(99,202,255,.25);color:#63caff;padding:11px 18px;font-size:.58rem}
.btn-purple{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);color:#a855f7;padding:11px 18px;font-size:.58rem}
.btn-red{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);color:#ff4757;padding:11px 18px;font-size:.58rem}
/* CARDS */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .2s;position:relative}
.card:active{transform:scale(.97)}
.card.active{border-color:rgba(255,209,102,.45);background:rgba(255,209,102,.04)}
.card.owned{border-color:rgba(0,255,136,.2)}
/* INPUTS */
.inp{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(99,202,255,.18);border-radius:7px;color:#fff;font-family:'Orbitron',monospace;font-size:.65rem;padding:9px 13px;outline:none;letter-spacing:.1em}
.inp:focus{border-color:rgba(99,202,255,.5)}
.inp::placeholder{color:rgba(255,255,255,.18)}
/* TOGGLE */
.tog{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.tog.on{background:#63caff;border-color:#63caff}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}
/* PANEL */
.panel{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;margin-bottom:9px;width:100%}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;width:100%}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;width:100%}
/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{font-size:.5rem;letter-spacing:.12em;padding:7px 12px;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.28);cursor:pointer;border-radius:6px;transition:all .15s}
.tab.on{border-color:rgba(99,202,255,.4);color:#63caff;background:rgba(99,202,255,.07)}
/* HUD */
#hud{position:absolute;inset:0;z-index:10;pointer-events:none;display:none}
.hud-sc{font-size:1.6rem;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 18px rgba(99,202,255,.4)}
.hud-lbl{font-size:.42rem;letter-spacing:.25em;color:rgba(255,255,255,.28);margin-bottom:2px}
#pubar{display:flex;gap:5px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:5px 9px}
.pu{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:.8rem;opacity:.28;transition:all .2s;position:relative;overflow:hidden}
.pu.on{opacity:1;border-color:rgba(255,209,102,.5);background:rgba(255,209,102,.08)}
.pt{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,#63caff,#ffd166);transform-origin:left;border-radius:2px}
#boss-bar{position:absolute;top:64px;left:16px;right:16px;display:none}
/* TOAST */
#toast{position:absolute;top:80px;left:50%;transform:translateX(-50%) translateY(-6px);font-size:.58rem;letter-spacing:.12em;background:rgba(2,8,20,.96);border:1px solid rgba(255,255,255,.1);color:#fff;padding:8px 20px;border-radius:8px;z-index:200;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* OVERLAYS */
.ov{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center}
.ov.show{display:flex}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.92)}
.ov-box{background:linear-gradient(160deg,#04091a,#060d1e);border:1px solid rgba(99,202,255,.2);border-radius:16px;padding:22px 18px;width:350px;position:relative;z-index:1;box-shadow:0 0 80px rgba(0,0,0,.9)}
/* GAME OVER */
.go-sc{font-size:4.5rem;font-weight:900;line-height:1;background:linear-gradient(155deg,#fff 0%,#63caff 55%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* SPECIAL */
#boss-warn{position:absolute;inset:0;z-index:35;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}
#boss-warn.show{display:flex}
.bw-txt{font-size:3.5rem;font-weight:900;letter-spacing:.4em;color:#ff4757;text-shadow:0 0 50px rgba(255,71,87,.7);animation:bwsh .08s infinite alternate}
@keyframes bwsh{from{transform:translateX(-3px)}to{transform:translateX(3px)}}
@keyframes blk{from{opacity:1}to{opacity:.2}}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.05)}}
/* INTRO */
#intro{position:absolute;inset:0;z-index:300;background:#000;cursor:pointer}
/* OVERLAYS FOR GAME */
#rage-ov{position:absolute;inset:0;z-index:45;display:none;align-items:center;justify-content:center;background:rgba(255,0,0,.1);pointer-events:none}
#anomaly-ov{position:absolute;inset:0;z-index:38;display:none;align-items:center;justify-content:center;pointer-events:none}
#ls-ov{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;pointer-events:none}
/* STREAMER */
#streamer-ov{position:absolute;inset:0;z-index:85;pointer-events:none;display:none}
/* CHAT */
#chat-ov{position:absolute;inset:0;z-index:65;background:rgba(0,9,19,.97);display:none;flex-direction:column}
/* RTC */
#rtc-ov{position:absolute;inset:0;z-index:68;background:rgba(0,9,19,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
/* PHOTO */
#photo-ov{position:absolute;inset:0;z-index:90;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center}
/* AD */
#ad-banner{position:absolute;bottom:0;left:0;right:0;height:50px;background:rgba(0,9,19,.9);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;z-index:25;transition:transform .3s}
#ad-banner.hide{transform:translateY(100%)}
/* LB ROWS */
.lb-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;margin-bottom:5px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.lb-row.g{background:rgba(255,209,102,.06);border-color:rgba(255,209,102,.22)}
.lb-row.s{background:rgba(192,192,192,.04);border-color:rgba(192,192,192,.14)}
.lb-row.b{background:rgba(205,127,50,.04);border-color:rgba(205,127,50,.13)}
.lb-row.me{background:rgba(99,202,255,.05);border-color:rgba(99,202,255,.2)}
/* MISSION CARD */
.mis-c{width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.025);border:1px solid rgba(168,85,247,.1);border-radius:10px;padding:12px;margin-bottom:7px}
/* PACK */
.pack{width:100%;display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:14px;cursor:pointer;transition:all .18s;margin-bottom:7px;position:relative;overflow:hidden}
.pack:active{transform:scale(.98)}
.pack.feat{border-color:rgba(255,154,60,.35);background:linear-gradient(135deg,rgba(255,154,60,.06),rgba(255,209,102,.04))}
/* BAR */
.bar{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:4px 0}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
/* RESPONSIVE */
@media(max-width:410px){#app{width:100vw;height:100svh}canvas{width:100vw!important;height:100svh!important}}
</style>
</head>
<body>
<div id="app">
<canvas id="bgc" width="390" height="844"></canvas>
<canvas id="gc"  width="390" height="844"></canvas>
<canvas id="pc"  width="390" height="844" style="z-index:3"></canvas>

<!-- HUD -->
<div id="hud">
  <div style="position:absolute;top:0;left:0;right:0;height:72px;background:linear-gradient(to bottom,rgba(0,9,19,.88),transparent);display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px 0">
    <div><div class="hud-lbl">SCORE</div><div class="hud-sc" id="h-sc">0</div></div>
    <div style="display:flex;align-items:center;gap:5px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);border-radius:20px;padding:5px 11px;margin-top:7px">
      <div style="width:9px;height:9px;background:radial-gradient(circle at 35% 35%,#fff8bb,#ffd166,#cc9900);border-radius:50%"></div>
      <span style="font-size:.75rem;font-weight:700;color:#ffd166" id="h-coins">0</span>
    </div>
    <div style="text-align:right"><div class="hud-lbl">BEST</div><div style="font-size:.95rem;font-weight:700;color:#63caff" id="h-best">0</div></div>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:78px;background:linear-gradient(to top,rgba(0,9,19,.8),transparent);display:flex;align-items:flex-end;justify-content:center;padding-bottom:13px">
    <div id="pubar">
      <div class="pu" id="pu0">🛡<div class="pt" id="pt0" style="transform:scaleX(0)"></div></div>
      <div class="pu" id="pu1">🧲<div class="pt" id="pt1" style="transform:scaleX(0)"></div></div>
      <div class="pu" id="pu2">⚡<div class="pt" id="pt2" style="transform:scaleX(0)"></div></div>
      <div class="pu" id="pu3">👻<div class="pt" id="pt3" style="transform:scaleX(0)"></div></div>
      <div class="pu" id="pu4">💣<div class="pt" id="pt4" style="transform:scaleX(0)"></div></div>
      <div class="pu" id="pu5">✨<div class="pt" id="pt5" style="transform:scaleX(0)"></div></div>
    </div>
  </div>
  <div id="boss-bar">
    <div style="font-size:.42rem;letter-spacing:.25em;color:#ff4757;margin-bottom:4px;animation:blk .5s infinite alternate" id="boss-lbl">⚠ BOSS</div>
    <div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden"><div id="boss-fill" style="height:100%;width:100%;background:linear-gradient(to right,#ff4757,#ff6b81);border-radius:3px;transition:width .1s"></div></div>
  </div>
  <div id="combo-hud" style="position:absolute;top:68px;right:14px;font-size:.78rem;font-weight:700;letter-spacing:.12em;color:#ff6b9d;opacity:0;transition:opacity .3s;background:rgba(0,0,0,.4);border:1px solid rgba(255,107,157,.2);border-radius:6px;padding:4px 9px"></div>
  <div id="ta-timer" style="position:absolute;top:58px;left:50%;transform:translateX(-50%);font-size:1.85rem;font-weight:900;color:#ff9a3c;display:none"></div>
  <div id="zone-hud" style="position:absolute;top:8px;right:13px;font-size:.48rem;letter-spacing:.15em;background:rgba(0,0,0,.4);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.07);display:none;pointer-events:none"></div>
  <div id="dash-hud" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-size:.48rem;letter-spacing:.15em;display:none;background:rgba(0,0,0,.4);border-radius:9px;padding:3px 9px;border:1px solid rgba(99,202,255,.15);pointer-events:none">⚡ DASH READY</div>
  <div id="narrator-hud" style="position:absolute;top:70px;left:50%;transform:translateX(-50%);font-size:.52rem;letter-spacing:.1em;color:rgba(255,255,255,.7);background:rgba(0,9,19,.85);border:1px solid rgba(99,202,255,.15);border-radius:18px;padding:5px 14px;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none"></div>
  <div id="lvl-hud" style="position:absolute;top:9px;left:13px;font-size:.48rem;letter-spacing:.15em;color:rgba(255,255,255,.3);background:rgba(0,0,0,.4);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.07);pointer-events:none">LVL 1</div>
  <div id="wx-hud" style="position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:1rem;opacity:.35;pointer-events:none">🌙</div>
  <div id="fps-hud" style="position:absolute;top:4px;left:4px;font-size:.52rem;font-family:monospace;color:rgba(255,255,255,.22);pointer-events:none"></div>
  <div id="monarch-hud" style="position:absolute;bottom:60px;right:13px;font-size:.55rem;letter-spacing:.12em;color:#ffd166;display:none;pointer-events:none"></div>
</div>

<!-- BOSS WARN -->
<div id="boss-warn">
  <div style="text-align:center">
    <div style="font-size:.55rem;letter-spacing:.4em;color:rgba(255,71,87,.7);animation:blk .4s infinite alternate;margin-bottom:6px">— WARNING —</div>
    <div class="bw-txt">BOSS!</div>
    <div style="font-size:.7rem;letter-spacing:.2em;color:rgba(255,154,60,.8);margin-top:6px" id="bw-wave">WAVE 1</div>
  </div>
</div>

<!-- SYSTEM OVERLAYS -->
<div id="rage-ov"><div style="font-size:2.5rem;font-weight:900;letter-spacing:.3em;color:#ff4757;text-shadow:0 0 40px rgba(255,71,87,.8);animation:blk .2s infinite alternate">🔥 RAGE MODE</div></div>
<div id="anomaly-ov"><div style="text-align:center;animation:blk .4s infinite alternate"><div style="font-size:.75rem;letter-spacing:.35em;color:rgba(255,71,87,.8)">⚠ ANOMALY ⚠</div><div style="font-size:1.35rem;font-weight:900;color:#ff4757;margin-top:4px" id="anomaly-nm">RED SKY</div></div></div>
<div id="ls-ov"><div style="text-align:center"><div style="font-size:2rem;font-weight:900;letter-spacing:.25em;color:#ff4757;animation:blk .3s infinite alternate">⚠ LAST STAND</div><div style="font-size:.8rem;letter-spacing:.18em;color:rgba(255,255,255,.6);margin-top:5px">CATCH THE HEART!</div><div style="font-size:1.4rem;color:#ff4757;margin-top:8px" id="ls-timer">3</div></div></div>

<!-- AD BANNER -->
<div id="ad-banner" class="hide"><div style="font-size:.5rem;letter-spacing:.2em;color:rgba(255,255,255,.12)">[ ADVERTISEMENT — REMOVE WITH NEON PASS ]</div></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- DAILY OVERLAY -->
<div class="ov" id="daily-ov" style="z-index:70">
  <div class="ov-bg"></div>
  <div class="ov-box" style="text-align:center">
    <div style="font-size:1.1rem;font-weight:900;letter-spacing:.25em;color:#ffd166;margin-bottom:3px">DAILY LOGIN</div>
    <div style="font-size:.45rem;letter-spacing:.25em;color:rgba(255,255,255,.25);margin-bottom:14px" id="dl-streak">STREAK: 1</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px" id="dl-grid"></div>
    <div id="dl-reward" style="font-size:.72rem;font-weight:700;color:#ffd166;margin-bottom:14px"></div>
    <button onclick="el('daily-ov').classList.remove('show')" class="btn btn-gold">COLLECT REWARD</button>
  </div>
</div>

<!-- GAMBLE OVERLAY -->
<div class="ov" id="gamble-ov" style="z-index:72;background:rgba(0,0,0,.96)">
  <div style="text-align:center;padding:28px 20px;width:320px;position:relative;z-index:1">
    <div style="font-size:1.2rem;font-weight:900;letter-spacing:.2em;color:#ffd166;margin-bottom:5px">💀 DOUBLE OR NOTHING</div>
    <div style="font-size:.6rem;letter-spacing:.12em;color:rgba(255,255,255,.35);margin-bottom:14px">50% CHANCE TO DOUBLE YOUR COINS</div>
    <div style="font-size:2.2rem;color:#ffd166;margin-bottom:12px" id="gamble-amt">+0</div>
    <div id="gamble-wheel" style="font-size:3rem;margin-bottom:12px">🎰</div>
    <div id="gamble-result" style="font-size:.85rem;letter-spacing:.18em;min-height:22px;margin-bottom:14px"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-gold" onclick="doGamble()" id="gamble-btn">🎲 GAMBLE!</button>
      <button onclick="closeGamble()" style="background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);padding:11px 18px;font-size:.58rem;border-radius:10px;cursor:pointer">SKIP</button>
    </div>
  </div>
</div>

<!-- MODIFIER OVERLAY -->
<div class="ov" id="mod-ov" style="z-index:58">
  <div class="ov-bg"></div>
  <div class="ov-box">
    <div style="font-size:1.1rem;font-weight:900;letter-spacing:.22em;color:#fff;text-align:center;margin-bottom:12px">SELECT MODIFIER</div>
    <div id="mod-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px"></div>
    <button class="btn" onclick="startWithMod('none')" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:12px;font-size:.58rem;border-radius:10px;cursor:pointer">▶ NO MODIFIER</button>
  </div>
</div>

<!-- PAYMENT OVERLAY -->
<div class="ov" id="pay-ov" style="z-index:75">
  <div class="ov-bg"></div>
  <div class="ov-box">
    <div style="font-size:.95rem;font-weight:900;letter-spacing:.18em;color:#fff;text-align:center;margin-bottom:3px" id="pay-title">PURCHASE</div>
    <div style="font-size:2rem;color:#ffd166;text-align:center;margin-bottom:14px" id="pay-price">$0.00</div>
    <input class="inp" id="pay-card" placeholder="CARD NUMBER (DEMO)" maxlength="19" style="margin-bottom:8px">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="inp" placeholder="MM/YY" maxlength="5" style="flex:1">
      <input class="inp" placeholder="CVC" maxlength="3" style="width:80px">
    </div>
    <div id="pay-status" style="font-size:.52rem;letter-spacing:.1em;color:#63caff;text-align:center;min-height:18px;margin-bottom:10px"></div>
    <button class="btn btn-play" onclick="processPayment()" id="pay-btn" style="font-size:.75rem;padding:15px">💳 PAY NOW</button>
    <button onclick="closePayment()" class="btn-back">CANCEL</button>
  </div>
</div>

<!-- PHOTO MODE -->
<div id="photo-ov">
  <div style="font-size:.7rem;letter-spacing:.2e
